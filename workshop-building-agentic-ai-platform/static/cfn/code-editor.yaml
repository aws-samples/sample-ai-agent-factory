Description: Create a Code Editor instance with an Amazon CloudFront distribution for use in Workshop Studio. Version 1.5.1

Parameters:
  CodeEditorUser:
    Type: String
    Description: UserName for Code Editor
    Default: participant
  InstanceName:
    Type: String
    Description: Code Editor EC2 instance name
    Default: CodeEditor
  InstanceVolumeSize:
    Type: Number
    Description: Code Editor EC2 instance volume size in GB
    Default: 40
  InstanceType:
    Description: Code Editor EC2 instance type
    Type: String
    Default: m8g.large
  InstanceOperatingSystem:
    Description: Code Editor EC2 operating system
    Type: String
    Default: AmazonLinux-2023
    AllowedValues: ['AmazonLinux-2023', 'Ubuntu-22', 'Ubuntu-24']
  HomeFolder:
    Type: String
    Description: Folder to open in Code Editor
    Default: /workshop
  DevServerBasePath:
    Type: String
    Description: Base path for the application to be added to Nginx sites-available list
    Default: ''
  DevServerPort:
    Type: Number
    Description: Port for the DevServer
    Default: 8081
  RepoUrl:
    Description: Remote repo URL to clone. To not clone a remote repo, leave blank
    Type: String
    Default: ''
  AssetZipS3Path:
    Description: S3 path holding the asset zip file to be copied into the home folder. To not include any assets, leave blank
    Type: String
    Default: ''
  BranchZipS3Path:
    Description: S3 path holding the branches zip file to be checked into the git repo, with each folder being a branch. The content of each folder will added as under a branch, with the folder name being used as the branch name. To leave the empty, leave blank
    Type: String
    Default: ''
  FolderZipS3Path:
    Description: S3 path holding the folder zip file, with each folder being a subfolder of the home directory. Each folder will have its own local git repo. To not include any folders, leave blank
    Type: String
    Default: ''
  WorkshopAssetsBucket:
    Description: Workshop Studio assets S3 bucket. When set, the workshop source/ tree is synced into the IDE home folder on boot.
    Type: String
    Default: ''
  WorkshopAssetsPrefix:
    Description: Workshop Studio assets S3 prefix (ends with '/'). Set to "{{.AssetsBucketPrefix}}" in contentspec.yaml.
    Type: String
    Default: ''
  CloudFrontPrefixListIdOverride:
    Description: >
      Optional override for the CloudFront origin-facing managed prefix-list ID
      (com.amazonaws.global.cloudfront.origin-facing). Leave empty to look the
      ID up from the AWSRegionsPrefixListID map below. Set this ONLY when
      deploying to a region not present in that map; find the ID with:
      aws ec2 describe-managed-prefix-lists --region <REGION> --query
      "PrefixLists[?PrefixListName=='com.amazonaws.global.cloudfront.origin-facing'].PrefixListId"
    Type: String
    Default: ''
  VpcId:
    Description: >
      Optional VPC for the Code Editor instance. Leave BOTH this and SubnetId
      empty to use the account's default VPC (the Workshop Studio sandbox
      always has one). Set BOTH when deploying into an account without a
      default VPC (common in enterprise landing zones where default VPCs are
      deleted as a security baseline).
    Type: String
    Default: ''
  SubnetId:
    Description: >
      Optional PUBLIC subnet for the Code Editor instance (must belong to
      VpcId and must route to an Internet Gateway). The instance is assigned a
      public IP so CloudFront can reach it as a custom origin. Set together
      with VpcId; leave empty to use the default VPC.
    Type: String
    Default: ''

Conditions:
  IsAL2023: !Equals [!Ref InstanceOperatingSystem, 'AmazonLinux-2023']
  # When the override is supplied, the AWSRegionsPrefixListID FindInMap (which
  # would fail for an unmapped region) is NOT evaluated.
  HasCloudFrontPrefixListIdOverride: !Not [!Equals [!Ref CloudFrontPrefixListIdOverride, '']]
  # Custom networking: both VpcId and SubnetId supplied -> SG is created in
  # that VPC and the instance launches in that subnet with a public IP.
  # Otherwise the SG/instance land in the account's default VPC (original
  # behavior, required by Workshop Studio sandboxes).
  HasCustomNetwork: !And
    - !Not [!Equals [!Ref VpcId, '']]
    - !Not [!Equals [!Ref SubnetId, '']]
  IsGraviton: !Not [
    !Equals [
      !Select [0, !Split ['g', !Select [0, !Split ['.', !Ref InstanceType]]]],
      !Select [0, !Split ['.', !Ref InstanceType]]
    ]
  ]

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Instance Configuration
        Parameters:
          - InstanceName
          - InstanceVolumeSize
          - InstanceType
          - InstanceOperatingSystem
      - Label:
          default: Code Editor Configuration
        Parameters:
          - CodeEditorUser
          - HomeFolder
          - DevServerBasePath
          - DevServerPort
          - RepoUrl
          - AssetZipS3Path
          - BranchZipS3Path
          - FolderZipS3Path
          - WorkshopAssetsBucket
          - WorkshopAssetsPrefix
    ParameterLabels:
      CodeEditorUser:
        default: Code Editor user name
      InstanceName:
        default: Instance name
      InstanceVolumeSize:
        default: Instance volume size
      InstanceType:
        default: Instance type
      InstanceOperatingSystem:
        default: Instance operating system
      HomeFolder:
        default: Code Editor home folder
      DevServerBasePath:
        default: Application base path
      DevServerPort:
        default: Application port
      RepoUrl:
        default: Git repo URL
      AssetZipS3Path:
        default: Asset file S3 path
      BranchZipS3Path:
        default: Branch file S3 path
      FolderZipS3Path:
        default: Folder file S3 path
      WorkshopAssetsBucket:
        default: Workshop Studio assets bucket
      WorkshopAssetsPrefix:
        default: Workshop Studio assets prefix

Mappings:
  ArmImage:
  # aws ssm get-parameters-by-path --path "/aws/service/canonical/ubuntu/" --recursive --query "Parameters[*].Name"  > canonical-ami.txt
  # aws ssm get-parameters-by-path --path "/aws/service/ami-amazon-linux-latest/" --recursive --query "Parameters[*].Name"  > amazon-ami.txt
    Ubuntu-22:
      ImageId: '{{resolve:ssm:/aws/service/canonical/ubuntu/server/jammy/stable/current/arm64/hvm/ebs-gp2/ami-id}}'
    Ubuntu-24:
      ImageId: '{{resolve:ssm:/aws/service/canonical/ubuntu/server/noble/stable/current/arm64/hvm/ebs-gp3/ami-id}}'
    AmazonLinux-2023:
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-arm64}}'
  AmdImage:
    Ubuntu-22:
      ImageId: '{{resolve:ssm:/aws/service/canonical/ubuntu/server/jammy/stable/current/amd64/hvm/ebs-gp2/ami-id}}'
    Ubuntu-24:
      ImageId: '{{resolve:ssm:/aws/service/canonical/ubuntu/server/noble/stable/current/amd64/hvm/ebs-gp3/ami-id}}'
    AmazonLinux-2023:
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
  AWSRegionsPrefixListID:
  # aws ec2 describe-managed-prefix-lists  --region <REGION> | jq -r '.PrefixLists[] | select (.PrefixListName == "com.amazonaws.global.cloudfront.origin-facing") | .PrefixListId'
    ap-northeast-1:
      PrefixList: pl-58a04531
    ap-northeast-2:
      PrefixList: pl-22a6434b
    ap-south-1:
      PrefixList: pl-9aa247f3
    ap-southeast-1:
      PrefixList: pl-31a34658
    ap-southeast-2:
      PrefixList: pl-b8a742d1
    ca-central-1:
      PrefixList: pl-38a64351
    eu-central-1:
      PrefixList: pl-a3a144ca
    eu-north-1:
      PrefixList: pl-fab65393
    eu-west-1:
      PrefixList: pl-4fa04526
    eu-west-2:
      PrefixList: pl-93a247fa
    eu-west-3:
      PrefixList: pl-75b1541c
    sa-east-1:
      PrefixList: pl-5da64334
    us-east-1:
      PrefixList: pl-3b927c52
    us-east-2:
      PrefixList: pl-b6a144df
    us-west-1:
      PrefixList: pl-4ea04527
    us-west-2:
      PrefixList: pl-82a045eb

Resources:
  CodeEditorSecret:
    Type: AWS::SecretsManager::Secret
    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_149
            comment: "Workshop secrets use the AWS-managed Secrets Manager key; a customer-managed KMS CMK is out of scope for this ephemeral workshop."
      cfn_nag:
        rules_to_suppress:
          - id: W77
            reason: The default KMS Key used by Secrets Manager is appropriate for this password which will be used to log into Code Editor, which has very limited permissions. In addition this secret will not be required to be shared across accounts
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      Name: !Sub
      - ${InstanceName}-${RandomGUID}
      - RandomGUID: !Select [0, !Split ['-', !Select [2, !Split ['/', !Ref AWS::StackId ]]]]
      Description: Code Editor user details
      GenerateSecretString:
        PasswordLength: 16
        SecretStringTemplate: !Sub '{"username":"${CodeEditorUser}"}'
        GenerateStringKey: 'password'
        ExcludePunctuation: true

  SecretPlaintextLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: !Sub lambda.${AWS::URLSuffix}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub arn:${AWS::Partition}:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: AwsSecretsManager
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref CodeEditorSecret

  SecretPlaintextLambda:
    Type: AWS::Lambda::Function
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W58
            reason: Warning incorrectly reported. The role associated with the Lambda function has the AWSLambdaBasicExecutionRole managed policy attached, which includes permission to write CloudWatch Logs. See https://docs.aws.amazon.com/aws-managed-policy/latest/reference/AWSLambdaBasicExecutionRole.html
          - id: W89
            reason: CloudFormation custom function does not need the scaffolding of a VPC, to do so would add unnecessary complexity
          - id: W92
            reason: CloudFormation custom function does not need reserved concurrent executions, to do so would add unnecessary complexity
    Properties:
      Description: Return the value of the secret
      Handler: index.lambda_handler
      Runtime: python3.13
      MemorySize: 128
      Timeout: 10
      Architectures:
        - arm64
      Role: !GetAtt SecretPlaintextLambdaRole.Arn
      Code:
        ZipFile: |
          import boto3
          import json
          import cfnresponse
          import logging

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          def is_valid_json(json_string):
              logger.debug(f'Calling is_valid_json:{json_string}')
              try:
                  json.loads(json_string)
                  logger.info(f'Secret is in json format')
                  return True
              except json.JSONDecodeError:
                  logger.info(f'Secret is in string format')
                  return False

          def lambda_handler(event, context):
              logger.debug(f'event: {event}')
              logger.debug(f'context: {context}')
              try:
                  if event['RequestType'] == 'Delete':
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, responseData={}, reason='No action to take')
                  else:
                      resource_properties = event['ResourceProperties']
                      secret_name = resource_properties['SecretArn']
                      secrets_mgr = boto3.client('secretsmanager')

                      logger.info(f'Getting secret from {secret_name}')

                      secret = secrets_mgr.get_secret_value(SecretId = secret_name)
                      secret_value = secret['SecretString']

                      responseData = {}
                      if is_valid_json(secret_value):
                          responseData = secret_value
                      else:
                          responseData = {'secret': secret_value}
                      logger.debug(f'type(responseData): {type(responseData)}')
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, responseData=json.loads(responseData), reason='OK', noEcho=True)
              except Exception as e:
                  logger.error(e)
                  cfnresponse.send(event, context, cfnresponse.FAILED, responseData={}, reason=str(e))

  SecretPlaintext:
    Type: Custom::SecretPlaintextLambda
    Properties:
      ServiceToken: !GetAtt SecretPlaintextLambda.Arn
      ServiceTimeout: 15
      SecretArn: !Ref CodeEditorSecret

  InstallCodeEditorExtensionSSMDoc:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Command
      Content:
        schemaVersion: '2.2'
        description: Install CodeEditor Extension
        parameters:
          ExtensionId:
            type: String
          CodeEditorUser:
            type: String
          MaxRetries:
            type: String
            default: '3'
          FailureReturnValue:
            type: String
            default: '0'
        mainSteps:
          - name: InstallCodeEditorExtension
            action: aws:runShellScript
            inputs:
              timeoutSeconds: 300
              runCommand:
                - '#!/bin/bash'
                - |
                  extension_name="{{ ExtensionId }}"
                  max_retries={{ MaxRetries }}
                  retry_count=0

                  while [ $retry_count -lt $max_retries ]; do
                    echo "Installing extension: $extension_name (attempt $((retry_count + 1))/$max_retries)"

                    if ! sudo -i -u {{ CodeEditorUser }} code-server --install-extension "$extension_name" --force 2>&1; then
                      echo "Failed to install $extension_name on attempt $((retry_count + 1))"
                    fi

                    if sudo -i -u {{ CodeEditorUser }} code-server --list-extensions | grep -qi "$extension_name"; then
                      echo "Successfully installed $extension_name"
                      exit 0
                    else
                      echo "Extension $extension_name not found in installed list"
                    fi

                    retry_count=$((retry_count + 1))
                    if [ $retry_count -lt $max_retries ]; then
                      echo "Retrying in 5 seconds..."
                      sleep 5
                    fi
                  done

                  echo "Failed to install $extension_name after $max_retries attempts"
                  exit {{ FailureReturnValue }}

  CodeEditorSSMDoc:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Command
      Content:
        schemaVersion: '2.2'
        description: Bootstrap Code Editor instance
        parameters:
          LinuxFlavor:
            type: String
            default: 'al2023'
          CodeEditorPassword:
            type: String
            default: !Ref AWS::StackId
        # all mainSteps scripts are in in /var/lib/amazon/ssm/<instanceid>/document/orchestration/<uuid>/<StepName>/_script.sh
        mainSteps:
          - name: InstallCloudWatchAgent
            action: aws:configurePackage
            inputs:
              name: AmazonCloudWatchAgent
              action: Install
          - name: ConfigureCloudWatchAgent
            action: aws:runDocument
            inputs:
              documentType: SSMDocument
              documentPath: AmazonCloudWatch-ManageAgent
              documentParameters:
                action: configure
                mode: ec2
                optionalConfigurationSource: default
                optionalRestart: 'yes'
          - name: InstallAptPackagesApt
            action: aws:runShellScript
            precondition:
              StringEquals:
                - '{{ LinuxFlavor }}'
                - ubuntu
            inputs:
              timeoutSeconds: 300
              runCommand:
                - '#!/bin/bash'
                - set -euo pipefail
                - dpkg --configure -a
                - apt-get -q update && DEBIAN_FRONTEND=noninteractive apt-get install -y -q apt-utils
                - apt-get -q update && DEBIAN_FRONTEND=noninteractive apt-get install -y -q needrestart unattended-upgrades
                - sed -i 's/#$nrconf{kernelhints} = -1;/$nrconf{kernelhints} = 0;/' /etc/needrestart/needrestart.conf
                - sed -i 's/#$nrconf{verbosity} = 2;/$nrconf{verbosity} = 0;/' /etc/needrestart/needrestart.conf
                - sed -i "s/#\$nrconf{restart} = 'i';/\$nrconf{restart} = 'a';/" /etc/needrestart/needrestart.conf
                - echo "Apt helper packages added. Checking configuration"
                - cat /etc/needrestart/needrestart.conf
          - name: InstallBasePackagesDnf
            action: aws:runShellScript
            precondition:
              StringEquals:
                - '{{ LinuxFlavor }}'
                - al2023
            inputs:
              timeoutSeconds: 300
              runCommand:
                - '#!/bin/bash'
                - set -euo pipefail
                - dnf install -y --allowerasing curl gnupg whois argon2 unzip nginx openssl jq
          - name: InstallBasePackagesApt
            action: aws:runShellScript
            precondition:
              StringEquals:
                - '{{ LinuxFlavor }}'
                - ubuntu
            inputs:
              timeoutSeconds: 300
              runCommand:
                - '#!/bin/bash'
                - set -euo pipefail
                - dpkg --configure -a
                - apt-get -q update && DEBIAN_FRONTEND=noninteractive apt-get install -y -q curl gnupg whois argon2 unzip nginx openssl locales locales-all apt-transport-https ca-certificates software-properties-common jq
          - name: AddUserDnf
            action: aws:runShellScript
            precondition:
              StringEquals:
                - '{{ LinuxFlavor }}'
                - al2023
            inputs:
              timeoutSeconds: 300
              runCommand:
                - '#!/bin/bash'
                - set -euo pipefail
                - !Sub |
                  echo 'Adding user: ${CodeEditorUser}'
                  adduser -c '' ${CodeEditorUser}
                  passwd -l ${CodeEditorUser}
                  echo "${CodeEditorUser}:{{ CodeEditorPassword }}" | chpasswd
                  usermod -aG wheel ${CodeEditorUser}
                  sed -i 's/# %wheel/%wheel/g' /etc/sudoers
                - echo "User added. Checking configuration"
                - !Sub getent passwd ${CodeEditorUser}
          - name: AddUserApt
            action: aws:runShellScript
            precondition:
              StringEquals:
                - '{{ LinuxFlavor }}'
                - ubuntu
            inputs:
              timeoutSeconds: 300
              runCommand:
                - '#!/bin/bash'
                - set -euo pipefail
                - dpkg --configure -a
                - !Sub |
                  if [[ "${CodeEditorUser}" == "ubuntu" ]]
                  then
                    echo 'Using existing user: ${CodeEditorUser}'
                  else
                    echo 'Adding user: ${CodeEditorUser}'
                    adduser --disabled-password --gecos '' ${CodeEditorUser}
                    echo "${CodeEditorUser}:{{ CodeEditorPassword }}" | chpasswd
                    usermod -aG sudo ${CodeEditorUser}
                  fi
                - !Sub |
                  tee /etc/sudoers.d/91-vscode-user <<EOF
                  ${CodeEditorUser} ALL=(ALL) NOPASSWD:ALL
                  EOF
                - !Sub mkdir -p /home/${CodeEditorUser}/.local/bin && chown -R ${CodeEditorUser}:${CodeEditorUser} /home/${CodeEditorUser}
                - echo "User added. Checking configuration"
                - !Sub getent passwd ${CodeEditorUser}
          - name: UpdateProfile
            action: aws:runShellScript
            inputs:
              timeoutSeconds: 300
              runCommand:
                - '#!/bin/bash'
                - set -euo pipefail
                - echo LANG=en_US.utf-8 >> /etc/environment
                - echo LC_ALL=en_US.UTF-8 >> /etc/environment
                - !Sub echo 'PATH=$PATH:/home/${CodeEditorUser}/.local/bin' >> /home/${CodeEditorUser}/.bashrc
                - !Sub echo 'export PATH' >> /home/${CodeEditorUser}/.bashrc
                - !Sub echo 'export AWS_REGION=${AWS::Region}' >> /home/${CodeEditorUser}/.bashrc
                - !Sub echo 'export AWS_ACCOUNTID=${AWS::AccountId}' >> /home/${CodeEditorUser}/.bashrc
                - !Sub echo 'export NEXT_TELEMETRY_DISABLED=1' >> /home/${CodeEditorUser}/.bashrc
                - !Sub echo "export PS1='\[\033[01;32m\]\u:\[\033[01;34m\]\w\[\033[00m\]\$ '" >> /home/${CodeEditorUser}/.bashrc
                - !Sub chown -R ${CodeEditorUser}:${CodeEditorUser} /home/${CodeEditorUser}
          - name: InstallAWSCLI
            action: aws:runShellScript
            inputs:
              timeoutSeconds: 300
              runCommand:
                - '#!/bin/bash'
                - set -euo pipefail
                - !Sub sudo -u ${CodeEditorUser} curl -fsSL https://awscli.amazonaws.com/awscli-exe-linux-$(uname -m).zip -o /tmp/aws-cli.zip
                - unzip -q -d /tmp /tmp/aws-cli.zip
                - sudo /tmp/aws/install
                - rm -rf /tmp/aws
                - echo "AWS CLI installed. Checking configuration"
                - aws --version
          - name: InstallGitDnf
            action: aws:runShellScript
            precondition:
              StringEquals:
                - '{{ LinuxFlavor }}'
                - al2023
            inputs:
              timeoutSeconds: 300
              runCommand:
                - '#!/bin/bash'
                - set -euo pipefail
                - dnf install -y git
                - !Sub |
                  if [[ "${RepoUrl}" =~ ^codecommit ]];
                  then
                    dnf install -y python3-pip
                    echo "Installing git-remote-codecommit with pip3"
                    sudo -u participant PIP_BREAK_SYSTEM_PACKAGES=1 pip3 install git-remote-codecommit==1.17
                  fi
          - name: InstallGitApt
            action: aws:runShellScript
            precondition:
              StringEquals:
                - '{{ LinuxFlavor }}'
                - ubuntu
            inputs:
              timeoutSeconds: 300
              runCommand:
                - '#!/bin/bash'
                - set -euo pipefail
                - dpkg --configure -a
                - add-apt-repository ppa:git-core/ppa
                - apt-get -q update && DEBIAN_FRONTEND=noninteractive apt-get install -y -q git
                - !Sub |
                  if [[ "${RepoUrl}" =~ ^codecommit ]];
                  then
                    apt-get -q update && DEBIAN_FRONTEND=noninteractive apt-get install -y -q python3-pip
                    echo "Installing git-remote-codecommit with pip3"
                    sudo -u participant PIP_BREAK_SYSTEM_PACKAGES=1 pip3 install git-remote-codecommit==1.17
                  fi
          - name: ConfigureGit
            action: aws:runShellScript
            inputs:
              timeoutSeconds: 300
              runCommand:
                - '#!/bin/bash'
                - set -euo pipefail
                - !Sub sudo -u ${CodeEditorUser} git config --global user.email "participant@example.com"
                - !Sub sudo -u ${CodeEditorUser} git config --global user.name "Workshop Participant"
                - !Sub sudo -u ${CodeEditorUser} git config --global init.defaultBranch "main"
                - echo "Git installed. Checking configuration"
                - git --version
          - name: CloneRepo
            action: aws:runShellScript
            inputs:
              timeoutSeconds: 600
              runCommand:
                - '#!/bin/bash'
                - set -euo pipefail
                - !Sub |
                  if [[ -z "${RepoUrl}" ]]
                  then
                    echo "No Repo"
                  else
                    mkdir -p ${HomeFolder} && chown -R ${CodeEditorUser}:${CodeEditorUser} ${HomeFolder}
                    RepoUrlRegion=$(echo "${RepoUrl}" | sed "s/{.Region}/${AWS::Region}/g")
                    sudo -i -u ${CodeEditorUser} git clone $RepoUrlRegion ${HomeFolder} 2>&1
                    echo "Repo: '$RepoUrlRegion' cloned. Checking configuration"
                    ls -la ${HomeFolder}
                    sudo -u ${CodeEditorUser} git -C ${HomeFolder} remote -v
                  fi
          - name: DownloadAssets
            action: aws:runShellScript
            inputs:
              timeoutSeconds: 600
              runCommand:
                - '#!/bin/bash'
                - set -euo pipefail
                - !Sub |
                  if [[ -z "${AssetZipS3Path}" ]]
                  then
                    echo "No assets"
                  else
                    mkdir -p ${HomeFolder} && chown -R ${CodeEditorUser}:${CodeEditorUser} ${HomeFolder}
                    aws s3 cp s3://${AssetZipS3Path} /tmp/asset.zip
                    chown -R ${CodeEditorUser}:${CodeEditorUser} /tmp/asset.zip
                    unzip -o /tmp/asset.zip -d ${HomeFolder}
                    chown -R ${CodeEditorUser}:${CodeEditorUser} ${HomeFolder}
                    if  [[ -d ${HomeFolder}/.git ]] # Indicates that a repo has been cloned
                    then
                      sudo -u ${CodeEditorUser} git -C ${HomeFolder} add .
                      sudo -u ${CodeEditorUser} git -C ${HomeFolder} commit -m 'Workshop commit'
                    else
                      sudo -u ${CodeEditorUser} git -C ${HomeFolder} init
                      sudo -u ${CodeEditorUser} git -C ${HomeFolder} add .
                      sudo -u ${CodeEditorUser} git -C ${HomeFolder} commit -m 'Initial commit'
                    fi
                    echo "Assets downloaded. Checking configuration: ${HomeFolder}"
                    ls -la ${HomeFolder}
                    sudo -u ${CodeEditorUser} git -C ${HomeFolder} branch
                  fi
          - name: DownloadFolders
            action: aws:runShellScript
            inputs:
              timeoutSeconds: 600
              runCommand:
                - '#!/bin/bash'
                - set -euo pipefail
                - !Sub |
                  if [[ -z "${FolderZipS3Path}" ]]
                  then
                    echo "No folders"
                  else
                    rm -rf /tmp/folder
                    mkdir -p /tmp/folder && chown -R ${CodeEditorUser}:${CodeEditorUser} /tmp/folder
                    aws s3 cp s3://${FolderZipS3Path} /tmp/asset-folder.zip
                    chown -R ${CodeEditorUser}:${CodeEditorUser} /tmp/asset-folder.zip
                    unzip -o /tmp/asset-folder.zip -d /tmp/folder
                    chown -R ${CodeEditorUser}:${CodeEditorUser} /tmp/folder
                    mkdir -p ${HomeFolder} && chown -R ${CodeEditorUser}:${CodeEditorUser} ${HomeFolder}
                    cd "${HomeFolder}" && cd ..
                    if [[ $(pwd) ==  "/" ]]
                    then
                      targetRootFolder=""
                    else
                      targetRootFolder=$(pwd)
                      chown -R ${CodeEditorUser}:${CodeEditorUser} .
                    fi
                    find "/tmp/folder" -maxdepth 1 -mindepth 1 -type d | while read sourceFolder; do
                      folder="$(basename $sourceFolder)"
                      echo "Processing folder: $folder"
                      targetFolder=$targetRootFolder/$folder
                      if [[ $targetRootFolder == "" ]]
                      then
                        mv $sourceFolder /
                      else
                        mv $sourceFolder $targetRootFolder
                      fi
                      chown -R ${CodeEditorUser}:${CodeEditorUser} $targetFolder
                      sudo -u ${CodeEditorUser} git -C $targetFolder init
                      sudo -u ${CodeEditorUser} git -C $targetFolder add .
                      sudo -u ${CodeEditorUser} git -C $targetFolder commit -m "Initial commit"
                      echo "Folder downloaded. Checking configuration: $targetFolder"
                      ls -la $targetFolder
                    done
                    rm -rf /tmp/folder
                  fi
          - name: DownloadBranches
            action: aws:runShellScript
            inputs:
              timeoutSeconds: 600
              runCommand:
                - '#!/bin/bash'
                - set -euo pipefail
                - !Sub |
                  if [[ -z "${BranchZipS3Path}" ]]
                  then
                    echo "No branches"
                  else
                    rm -rf /tmp/branch
                    rm -rf /tmp/git
                    mkdir -p /tmp/branch && chown -R ${CodeEditorUser}:${CodeEditorUser} /tmp/branch
                    mkdir -p /tmp/git && chown -R ${CodeEditorUser}:${CodeEditorUser} /tmp/git
                    aws s3 cp s3://${BranchZipS3Path} /tmp/asset-branch.zip
                    chown -R ${CodeEditorUser}:${CodeEditorUser} /tmp/asset-branch.zip
                    unzip -o /tmp/asset-branch.zip -d /tmp/branch
                    chown -R ${CodeEditorUser}:${CodeEditorUser} /tmp/branch
                    mkdir -p ${HomeFolder} && chown -R ${CodeEditorUser}:${CodeEditorUser} ${HomeFolder}
                    sudo -u ${CodeEditorUser} git -C ${HomeFolder} init
                    mv ${HomeFolder}/.git /tmp/git
                    rm -rf ${HomeFolder}
                    mkdir -p ${HomeFolder} && chown -R ${CodeEditorUser}:${CodeEditorUser} ${HomeFolder}
                    mv /tmp/git/.git ${HomeFolder}
                    find /tmp/branch -maxdepth 1 -mindepth 1 -type d | while read sourceFolder; do
                      branch="$(basename $sourceFolder)"
                      echo "Processing branch: $branch"
                      sudo -u ${CodeEditorUser} git -C ${HomeFolder} checkout -b $branch 2>&1
                      cp -a $sourceFolder/. ${HomeFolder}
                      sudo -u ${CodeEditorUser} git -C ${HomeFolder} add .
                      sudo -u ${CodeEditorUser} git -C ${HomeFolder} commit -m "Initial commit $branch"
                      mv ${HomeFolder}/.git /tmp/git
                      rm -rf ${HomeFolder}
                      mkdir ${HomeFolder} && chown -R ${CodeEditorUser}:${CodeEditorUser} ${HomeFolder}
                      mv /tmp/git/.git ${HomeFolder}
                    done
                    sudo -u ${CodeEditorUser} git -C ${HomeFolder} checkout main 2>&1
                    sudo -u ${CodeEditorUser} git -C ${HomeFolder} restore .
                    rm -rf /tmp/branch
                    rm -rf /tmp/git
                    echo "Branches downloaded. Checking configuration: $HomeFolder"
                    sudo -u ${CodeEditorUser} git -C ${HomeFolder} branch
                    ls -la ${HomeFolder}
                  fi
          - name: SyncWorkshopAssets
            # Pulls the workshop source tree from the Workshop Studio assets
            # bucket into ${HomeFolder}. Without this, the IDE opens to an
            # empty folder and participants have nothing to run.
            action: aws:runShellScript
            inputs:
              timeoutSeconds: 900
              runCommand:
                - '#!/bin/bash'
                - set -euo pipefail
                - !Sub |
                  if [[ -z "${WorkshopAssetsBucket}" ]]
                  then
                    echo "No workshop assets bucket configured — skipping sync"
                    exit 0
                  fi
                  mkdir -p ${HomeFolder}
                  chown -R ${CodeEditorUser}:${CodeEditorUser} ${HomeFolder}
                  echo "Syncing workshop assets from s3://${WorkshopAssetsBucket}/${WorkshopAssetsPrefix} into ${HomeFolder}"
                  # The Workshop Studio assets prefix contains the full repo tree
                  # (content/, static/, source/, contentspec.yaml, README.md).
                  # We sync it all so participants have the source + any
                  # referenced fixtures/scripts available inside the IDE.
                  sudo -u ${CodeEditorUser} aws s3 sync \
                    "s3://${WorkshopAssetsBucket}/${WorkshopAssetsPrefix}" \
                    "${HomeFolder}/" \
                    --exclude '*.zip' \
                    --only-show-errors
                  chown -R ${CodeEditorUser}:${CodeEditorUser} ${HomeFolder}
                  echo "Workshop assets synced. Top-level contents:"
                  ls -la ${HomeFolder}
          - name: InstallCodeEditor
            # Install coder.com's open-source code-server. We moved off the
            # AWS code-editor-server build because it enforces a per-request
            # ?tkn= query param that does not compose cleanly with CloudFront
            # (every navigation must reinject the token). code-server has
            # native password auth via ~/.config/code-server/config.yaml,
            # which works cleanly behind CloudFront.
            action: aws:runShellScript
            inputs:
              timeoutSeconds: 600
              runCommand:
                - '#!/bin/bash'
                - set -euo pipefail
                - !Sub export CodeEditorUser=${CodeEditorUser}
                # The upstream installer references $HOME with `set -u`; SSM
                # invokes scripts without HOME set, so export it explicitly.
                - export HOME=/root
                - curl -fsSL https://code-server.dev/install.sh -o /tmp/code-server-install.sh
                - bash /tmp/code-server-install.sh 2>&1 || { echo "code-server installation failed"; exit 1; }
          - name: ConfigureNginx
            action: aws:runShellScript
            inputs:
              timeoutSeconds: 600
              runCommand:
                - '#!/bin/bash'
                - set -euo pipefail
                - echo "Configuring nginx..."
                - !Sub |
                  tee /etc/nginx/conf.d/code-editor.conf <<EOF
                  server {
                      listen 80;
                      listen [::]:80;
                      # server_name \$\{CloudFrontDistribution.DomainName\};
                      server_name *.cloudfront.net;
                      proxy_set_header Host \$host;
                      proxy_set_header X-Real-IP \$remote_addr;
                      proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                      proxy_set_header X-Forwarded-Proto \$scheme;
                      proxy_set_header Upgrade \$http_upgrade;
                      proxy_set_header Connection "upgrade";
                      proxy_buffering off;
                      proxy_set_header Accept-Encoding gzip;
                      location / {
                          proxy_pass http://localhost:8080/;
                      }
                  }
                  EOF
                - !Sub |
                  if [[ -n "${DevServerBasePath}" ]]
                  then
                      sed -i '$i\
                      location /${DevServerBasePath} {\
                          proxy_pass http://localhost:${DevServerPort};\
                      }\
                      location /ports/${DevServerPort}/ {\
                          return 301 /${DevServerBasePath};\
                      }' /etc/nginx/conf.d/code-editor.conf
                  fi
                - systemctl enable nginx 2>&1
                - systemctl restart nginx
                - echo "Nginx installed. Checking configuration"
                - nginx -t 2>&1
                - systemctl status nginx
          - name: ConfigureAuthToken
            # Write code-server's native password-auth config. Same
            # randomly-generated secret (CodeEditorSecret) the stack already
            # creates — just delivered via config.yaml instead of a token
            # file. Participants paste this password at the login screen.
            action: aws:runShellScript
            inputs:
              timeoutSeconds: 600
              runCommand:
                - '#!/bin/bash'
                - set -euo pipefail
                - !Sub |
                  sudo -u ${CodeEditorUser} mkdir -p /home/${CodeEditorUser}/.config/code-server
                  tee /home/${CodeEditorUser}/.config/code-server/config.yaml <<EOF
                  bind-addr: 127.0.0.1:8080
                  auth: password
                  password: "{{ CodeEditorPassword }}"
                  cert: false
                  EOF
                  chown -R ${CodeEditorUser}:${CodeEditorUser} /home/${CodeEditorUser}/.config
          - name: ConfigureCodeEditor
            action: aws:runShellScript
            inputs:
              timeoutSeconds: 600
              runCommand:
                - '#!/bin/bash'
                - set -euo pipefail
                - !Sub sudo -i -u ${CodeEditorUser} mkdir -p /home/${CodeEditorUser}/.local/share/code-server/User
                - !Sub sudo -i -u ${CodeEditorUser} touch /home/${CodeEditorUser}/.local/share/code-server/User/settings.json
                - !Sub touch /home/${CodeEditorUser}/.hushlogin
                - !Sub mkdir -p ${HomeFolder} && chown -R ${CodeEditorUser}:${CodeEditorUser} ${HomeFolder}
                - !Sub |
                  tee /home/${CodeEditorUser}/.local/share/code-server/User/settings.json <<EOF
                  {
                    "aws.telemetry": false,
                    "extensions.autoUpdate": false,
                    "extensions.autoCheckUpdates": false,
                    "telemetry.telemetryLevel": "off",
                    "security.workspace.trust.startupPrompt": "never",
                    "security.workspace.trust.enabled": false,
                    "security.workspace.trust.banner": "never",
                    "security.workspace.trust.emptyWindow": false,
                    "workbench.startupEditor": "none",
                    "terminal.integrated.cwd": "${HomeFolder}",
                    "auto-run-command.rules": [
                      {
                        "command": "workbench.action.terminal.new"
                      }
                    ]
                  }
                  EOF
                - !Sub chown -R ${CodeEditorUser}:${CodeEditorUser} /home/${CodeEditorUser}
                - !Sub systemctl enable --now code-server@${CodeEditorUser}
                - !Sub systemctl restart code-server@${CodeEditorUser}
                - echo "code-server installed. Checking configuration"
                - !Sub sudo -i -u ${CodeEditorUser} code-server --version
                - !Sub systemctl status code-server@${CodeEditorUser}
          - name: InstallAWSToolkitExtension
            action: aws:runDocument
            inputs:
              documentType: SSMDocument
              documentPath: !Ref InstallCodeEditorExtensionSSMDoc
              documentParameters:
                ExtensionId: AmazonWebServices.aws-toolkit-vscode
                CodeEditorUser: !Ref CodeEditorUser
          - name: InstallAmazonQExtension
            action: aws:runDocument
            inputs:
              documentType: SSMDocument
              documentPath: !Ref InstallCodeEditorExtensionSSMDoc
              documentParameters:
                ExtensionId: AmazonWebServices.amazon-q-vscode
                CodeEditorUser: !Ref CodeEditorUser
          - name: InstallLiveServerExtension
            action: aws:runDocument
            inputs:
              documentType: SSMDocument
              documentPath: !Ref InstallCodeEditorExtensionSSMDoc
              documentParameters:
                ExtensionId: ms-vscode.live-server
                CodeEditorUser: !Ref CodeEditorUser
          - name: InstallAutoRunCommandExtension
            action: aws:runDocument
            inputs:
              documentType: SSMDocument
              documentPath: !Ref InstallCodeEditorExtensionSSMDoc
              documentParameters:
                ExtensionId: synedra.auto-run-command
                CodeEditorUser: !Ref CodeEditorUser
# Install optional packages here - any of these blocks can be deleted if that software is not required for the workshop
          - name: InstallNodeDnf
            action: aws:runShellScript
            precondition:
              StringEquals:
                - '{{ LinuxFlavor }}'
                - al2023
            inputs:
              timeoutSeconds: 300
              runCommand:
                - '#!/bin/bash'
                - set -euo pipefail
                # AL2023 `dnf install nodejs` ships Node 18, which Vite 7
                # (used by Module 4's FAST frontend) rejects. Pull Node 20
                # from NodeSource instead so the frontend build succeeds.
                - curl -fsSL https://rpm.nodesource.com/setup_20.x -o /tmp/nodesource_setup.sh
                - bash /tmp/nodesource_setup.sh
                - dnf install -y nodejs
                - echo "Node and npm installed. Checking configuration"
                - node -v
                - npm -v
          - name: InstallNodeApt
            action: aws:runShellScript
            precondition:
              StringEquals:
                - '{{ LinuxFlavor }}'
                - ubuntu
            inputs:
              timeoutSeconds: 300
              runCommand:
                - '#!/bin/bash'
                # - set -euo pipefail # Uncomment to throw error on failure
                - curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | gpg --dearmor -o /usr/share/keyrings/nodesource.gpg
                - echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/nodesource.gpg] https://deb.nodesource.com/node_24.x nodistro main" > /etc/apt/sources.list.d/nodesource.list
                - apt-get -q update && DEBIAN_FRONTEND=noninteractive apt-get install -y -q nodejs
                - npm install -g npm@10.8.1
                - echo "Node and npm installed. Checking configuration"
                - node -v
                - npm -v
          - name: InstallCDK
            action: aws:runShellScript
            inputs:
              timeoutSeconds: 300
              runCommand:
                - '#!/bin/bash'
                # - set -euo pipefail # Uncomment to throw error on failure
                - npm install -g aws-cdk@2.147.0
                - echo "AWS CDK installed. Checking configuration"
                - cdk --version
          - name: InstallSAMCLI
            action: aws:runShellScript
            inputs:
              timeoutSeconds: 300
              runCommand:
                - '#!/bin/bash'
                # - set -euo pipefail # Uncomment to throw error on failure
                - curl -fsSL https://github.com/aws/aws-sam-cli/releases/latest/download/aws-sam-cli-linux-$(uname -m | sed 's/aarch64/arm64/').zip -o /tmp/aws_sam.zip
                - !Sub chown -R ${CodeEditorUser}:${CodeEditorUser} /tmp/aws_sam.zip
                - unzip -q -d /tmp/sam-installation /tmp/aws_sam.zip
                - sudo bash /tmp/sam-installation/install
                - rm -rf /tmp/sam-installation
                - echo "AWS SAM CLI installed. Checking configuration"
                - sam --version
          - name: InstallKiroCLI
            action: aws:runShellScript
            inputs:
              timeoutSeconds: 300
              runCommand:
                - '#!/bin/bash'
                # - set -euo pipefail # Uncomment to throw error on failure
                - !Sub |
                    ARCH=$(uname -m)
                    if [ "$ARCH" = "aarch64" ]; then
                      URL="https://desktop-release.q.us-east-1.amazonaws.com/2.10.0/kirocli-aarch64-linux.zip"
                    else
                      URL="https://desktop-release.q.us-east-1.amazonaws.com/2.10.0/kirocli-x86_64-linux.zip"
                    fi
                    curl --proto '=https' --tlsv1.2 -sSf "$URL" -o /tmp/kirocli.zip
                    cd /tmp && unzip -qo kirocli.zip
                    sudo -u ${CodeEditorUser} /tmp/kirocli/install.sh 2>&1
                    rm -rf /tmp/kirocli /tmp/kirocli.zip
                - echo "Kiro CLI installed. Checking configuration"
                - !Sub sudo -i -u ${CodeEditorUser} kiro-cli --version
          - name: ConfigureKiroCliCustomAgent
            action: aws:runShellScript
            inputs:
              timeoutSeconds: 300
              runCommand:
                - '#!/bin/bash'
                # - set -euo pipefail # Uncomment to throw error on failure
                - echo "Writing MCP config"
                - !Sub mkdir -p /home/${CodeEditorUser}/.aws/amazonq/cli-agents
                - !Sub |
                  tee /home/${CodeEditorUser}/.aws/amazonq/cli-agents/participant.json <<EOF
                  {
                    "name": "participant",
                    "description": "Coding Expert",
                    "prompt": "You are an expert on AWS Services. When asked questions about AWS services, validate your answers against the latest AWS documentation and blog articles.",
                    "mcpServers": {
                      "aws_core": {
                        "command": "uvx",
                        "args": [
                          "mcp-proxy",
                          "--transport",
                          "streamablehttp",
                          "https://knowledge-mcp.global.api.aws"
                        ],
                        "env": {
                          "FASTMCP_LOG_LEVEL": "ERROR",
                          "aws-foundation": "true",
                          "security-identity": "true"
                        },
                        "autoApprove": [],
                        "disabled": false
                      }
                    },
                    "tools": [
                      "fs_read",
                      "fs_write",
                      "execute_bash",
                      "use_aws",
                      "@aws_core"
                    ],
                    "toolAliases": {},
                    "allowedTools": [
                      "fs_read",
                      "@aws_core"
                    ],
                    "resources": [
                      "file://AmazonQ.md",
                      "file://README.md",
                      "file://.amazonq/rules/**/*.md"
                    ],
                    "hooks": {},
                    "toolsSettings": {},
                    "useLegacyMcpJson": false,
                    "model": null
                  }
                  EOF
                - !Sub mkdir -p /home/${CodeEditorUser}/.local/share/amazon-q/settings
                - !Sub |
                  tee /home/${CodeEditorUser}/.local/share/amazon-q/settings.json <<EOF
                  {
                    "chat.defaultAgent": "participant",
                    "mcp.loadedBefore": true
                  }
                  EOF
                - !Sub chown -R ${CodeEditorUser}:${CodeEditorUser} /home/${CodeEditorUser}
                - echo "Amazon Q Custom Agent configured"
          - name: Installuv
            action: aws:runShellScript
            inputs:
              timeoutSeconds: 600
              runCommand:
                - '#!/bin/bash'
                - set -euo pipefail
                # SECURITY: uv installer pinned to a SPECIFIC, IMMUTABLE VERSION
                # (astral.sh/uv/0.11.21/install.sh) and sha256-verified (blocking).
                # We pin the VERSIONED URL, not the rolling astral.sh/uv/install.sh
                # — the rolling URL changes on every uv release, so hashing it
                # would break the bootstrap at the next release. To bump uv:
                # change the version in the URL below and refresh the hash with
                #   curl -fsSL https://astral.sh/uv/<version>/install.sh | sha256sum
                - !Sub sudo -u ${CodeEditorUser} curl -fsSL https://astral.sh/uv/0.11.21/install.sh -o /tmp/uv_install.sh
                - |
                  EXPECTED_SHA="053045e1e69ec77358fd44f2ef2cacb768a22d50f433e213624f0157ffbbc883"
                  ACTUAL_SHA=$(sha256sum /tmp/uv_install.sh | awk '{print $1}')
                  if [ "$EXPECTED_SHA" != "$ACTUAL_SHA" ]; then
                    echo "ERROR: uv installer sha256 mismatch. expected=$EXPECTED_SHA actual=$ACTUAL_SHA"
                    echo "Refusing to run an unverified installer (pinned uv 0.11.21)."
                    exit 1
                  fi
                - !Sub sudo -i -u ${CodeEditorUser} bash /tmp/uv_install.sh 2>&1
                - !Sub |
                    if uv generate-shell-completion bash &>/dev/null; then
                      echo 'eval "$(uv generate-shell-completion bash)"' >> /home/${CodeEditorUser}/.bashrc
                    fi
                - !Sub |
                    if uvx generate-shell-completion bash &>/dev/null; then
                      echo 'eval "$(uvx generate-shell-completion bash)"' >> /home/${CodeEditorUser}/.bashrc
                    fi
                - echo "uv installed. Checking configuration"
                - !Sub sudo -i -u ${CodeEditorUser} uv --version
          - name: InstallPythonDnf
            # AL2023 ships Python 3.9 by default; we install 3.13 for the workshop.
            action: aws:runShellScript
            precondition:
              StringEquals:
                - '{{ LinuxFlavor }}'
                - al2023
            inputs:
              timeoutSeconds: 900
              runCommand:
                - '#!/bin/bash'
                - set -euo pipefail
                - dnf install -y python3.13 python3.13-pip python3-virtualenv python3-pytest python3-boto3
                - !Sub echo 'alias python3=python3.13' >> /home/${CodeEditorUser}/.bashrc
                - !Sub echo 'alias pip3=pip3.13' >> /home/${CodeEditorUser}/.bashrc
                - python3.13 -m pip install --upgrade pip==24.0 2>&1
                # Jupyter + workshop libraries for the notebook-driven modules.
                # Pin the Jupyter/ipykernel stack (kernel stability) and the
                # strands version; let strands-agents resolve its own transitive
                # deps (httpx, openai, mcp, pydantic, boto3) — pinning them to old
                # versions made the resolver unsatisfiable (strands needs mcp>=1.8,
                # openai>=1.68). Keep this aligned with module-2 requirements.txt.
                - !Sub |
                  sudo -u ${CodeEditorUser} python3.13 -m pip install --user \
                    jupyter==1.0.0 ipykernel==6.29.4 nbformat==5.10.4 nbconvert==7.16.4 \
                    pyyaml requests \
                    'strands-agents[litellm,openai]==0.1.5'
                # Register an ipykernel under a unique name so VS Code auto-selects it
                # without colliding with the system python3 interpreter.
                - !Sub |
                  sudo -u ${CodeEditorUser} python3.13 -m ipykernel install --user \
                    --name workshop --display-name "Python 3 (workshop)"
                - !Sub sudo -u ${CodeEditorUser} python3.13 -m jupyter --version
          - name: InstallPythonApt
            # Ubuntu 22 default is Python 3.10, Ubuntu 24 default is Python 3.12
            action: aws:runShellScript
            precondition:
              StringEquals:
                - '{{ LinuxFlavor }}'
                - ubuntu
            inputs:
              timeoutSeconds: 900
              runCommand:
                - '#!/bin/bash'
                - set -euo pipefail
                - dpkg --configure -a
                - apt-get -q update && DEBIAN_FRONTEND=noninteractive apt-get install -y -q python3-pip python3-venv python3-boto3 python3-pytest
                - systemctl start multipathd.service packagekit.service
                - systemctl restart unattended-upgrades.service
                - systemctl restart networkd-dispatcher.service
                # Jupyter + workshop libraries for the notebook-driven modules.
                # See InstallPythonDnf above for why transitive deps are unpinned.
                - !Sub |
                  sudo -u ${CodeEditorUser} python3 -m pip install --user --break-system-packages \
                    jupyter==1.0.0 ipykernel==6.29.4 nbformat==5.10.4 nbconvert==7.16.4 \
                    pyyaml requests \
                    'strands-agents[litellm,openai]==0.1.5'
                - !Sub |
                  sudo -u ${CodeEditorUser} python3 -m ipykernel install --user \
                    --name workshop --display-name "Python 3 (workshop)"
                - !Sub sudo -u ${CodeEditorUser} python3 -m jupyter --version
          - name: ConfigurePython
            action: aws:runShellScript
            inputs:
              timeoutSeconds: 300
              runCommand:
                - '#!/bin/bash'
                - set -euo pipefail
                - !Sub echo 'export AWS_DEFAULT_REGION=${AWS::Region}' >> /home/${CodeEditorUser}/.bashrc
                - !Sub sudo -i -u ${CodeEditorUser} aws configure set region ${AWS::Region}
                - !Sub echo 'alias pytest=pytest-3' >> /home/${CodeEditorUser}/.bashrc
                - !Sub |
                    target_file="/home/${CodeEditorUser}/.local/share/code-server/User/settings.json"
                    if [ ! -f "$target_file" ]; then
                      echo '{}' > "$target_file"
                    fi
                    # Point the Python / Jupyter extensions at the workshop
                    # interpreter and trust the registered ipykernel so VS
                    # Code picks it up without prompting.
                    tmp=$(mktemp)
                    jq '. + {
                      "python.testing.pytestEnabled": true,
                      "python.defaultInterpreterPath": "/usr/bin/python3.13",
                      "jupyter.kernels.trusted": [
                        "/home/${CodeEditorUser}/.local/share/jupyter/kernels/workshop/kernel.json",
                        "/home/${CodeEditorUser}/.local/share/jupyter/kernels/workshop-fast/kernel.json"
                      ],
                      "notebook.kernelPicker.type": "mru",
                      "jupyter.askForKernelRestart": false
                    }' "$target_file" > "$tmp" && mv "$tmp" "$target_file"
                    chown ${CodeEditorUser}:${CodeEditorUser} "$target_file"
                # Write a workspace-level settings file so /workshop/* notebooks pick
                # the named 'workshop' kernel on first open without a picker prompt.
                - !Sub |
                    mkdir -p /workshop/.vscode
                    cat > /workshop/.vscode/settings.json <<'WSSETTINGS'
                    {
                      "jupyter.kernels.trusted": [
                        "/home/${CodeEditorUser}/.local/share/jupyter/kernels/workshop/kernel.json",
                        "/home/${CodeEditorUser}/.local/share/jupyter/kernels/workshop-fast/kernel.json"
                      ],
                      "notebook.kernelPicker.type": "mru",
                      "jupyter.askForKernelRestart": false,
                      "python.defaultInterpreterPath": "/usr/bin/python3.13"
                    }
                    WSSETTINGS
                    chown -R ${CodeEditorUser}:${CodeEditorUser} /workshop/.vscode
                - echo "Python and Pip installed. Checking configuration"
                - !Sub sudo -i -u ${CodeEditorUser} python3 --version
                - !Sub sudo -i -u ${CodeEditorUser} pip3 --version
          - name: PrepareModule4bFastVenv
            # Module 4b notebooks (FAST / CDK path) import packages not in the
            # workshop kernel: bedrock-agentcore, mcp, bedrock-agentcore-starter-toolkit.
            # Create a dedicated venv + register the 'workshop-fast' kernel so the
            # Module 4b notebooks auto-select without the participant needing to run
            # `python -m venv` themselves.
            action: aws:runShellScript
            inputs:
              timeoutSeconds: 900
              runCommand:
                - '#!/bin/bash'
                - set -euo pipefail
                - !Sub |
                    FAST_VENV=/home/${CodeEditorUser}/.venvs/workshop-fast
                    if command -v python3.13 >/dev/null 2>&1; then
                      PY=python3.13
                    else
                      PY=python3
                    fi
                    sudo -u ${CodeEditorUser} $PY -m venv $FAST_VENV
                    sudo -u ${CodeEditorUser} $FAST_VENV/bin/pip install --upgrade pip==24.0
                    # Pin only the kernel stack + the workshop libs; let pip
                    # resolve transitive deps. The old boto3/httpx/pydantic/mcp
                    # pins conflicted with strands-agents and bedrock-agentcore
                    # (e.g. mcp==1.0.0 vs strands' mcp>=1.8, boto3==1.34 too old
                    # for bedrock-agentcore-starter-toolkit).
                    sudo -u ${CodeEditorUser} $FAST_VENV/bin/pip install \
                      jupyter==1.0.0 ipykernel==6.29.4 nbformat==5.10.4 \
                      'strands-agents[litellm]==0.1.5' \
                      bedrock-agentcore==0.1.0 bedrock-agentcore-starter-toolkit==0.1.0 \
                      mcp
                    sudo -u ${CodeEditorUser} $FAST_VENV/bin/python -m ipykernel install --user \
                      --name workshop-fast --display-name "Python 3 (workshop-fast)"
                    sudo -u ${CodeEditorUser} $FAST_VENV/bin/python -m jupyter --version
          - name: InstallPythonExtension
            action: aws:runDocument
            inputs:
              documentType: SSMDocument
              documentPath: !Ref InstallCodeEditorExtensionSSMDoc
              documentParameters:
                ExtensionId: ms-python.python
                CodeEditorUser: !Ref CodeEditorUser
          - name: InstallJupyterExtension
            action: aws:runDocument
            inputs:
              documentType: SSMDocument
              documentPath: !Ref InstallCodeEditorExtensionSSMDoc
              documentParameters:
                ExtensionId: ms-toolsai.jupyter
                CodeEditorUser: !Ref CodeEditorUser
          - name: InstallJavaDnf
            action: aws:runShellScript
            precondition:
              StringEquals:
                - '{{ LinuxFlavor }}'
                - al2023
            inputs:
              timeoutSeconds: 300
              runCommand:
                - '#!/bin/bash'
                # - set -euo pipefail # Uncomment to throw error on failure
                - dnf install -y java-21-amazon-corretto java-17-amazon-corretto java-1.8.0-amazon-corretto maven
          - name: InstallJavaApt
            action: aws:runShellScript
            precondition:
              StringEquals:
                - '{{ LinuxFlavor }}'
                - ubuntu
            inputs:
              timeoutSeconds: 300
              runCommand:
                - '#!/bin/bash'
                # - set -euo pipefail # Uncomment to throw error on failure
                - dpkg --configure -a
                - curl -fsSL https://apt.corretto.aws/corretto.key | gpg --dearmor -o /usr/share/keyrings/corretto-keyring.gpg
                - echo "deb [signed-by=/usr/share/keyrings/corretto-keyring.gpg] https://apt.corretto.aws stable main" > /etc/apt/sources.list.d/corretto.list
                - DEBIAN_FRONTEND=noninteractive apt-get update
                - DEBIAN_FRONTEND=noninteractive apt-get install -y -q java-21-amazon-corretto-jdk java-17-amazon-corretto-jdk java-1.8.0-amazon-corretto-jdk maven
          - name: ConfigureJava
            action: aws:runShellScript
            inputs:
              timeoutSeconds: 300
              runCommand:
                - '#!/bin/bash'
                # - set -euo pipefail # Uncomment to throw error on failure
                - !Sub echo 'export JAVA_1_8_HOME=$(dirname $(dirname $(readlink -f $(which java))))' >> /home/${CodeEditorUser}/.bashrc
                - !Sub echo 'export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))' >> /home/${CodeEditorUser}/.bashrc
                - !Sub echo 'export PATH=$PATH:$JAVA_HOME/bin:/usr/share/maven/bin' >> /home/${CodeEditorUser}/.bashrc
                - echo "Java and Maven installed. Checking configuration"
                - java -version 2>&1
                - mvn --version
                - update-alternatives --display java
          - name: InstallJavaExtension
            action: aws:runDocument
            inputs:
              documentType: SSMDocument
              documentPath: !Ref InstallCodeEditorExtensionSSMDoc
              documentParameters:
                ExtensionId: vscjava.vscode-java-pack
                CodeEditorUser: !Ref CodeEditorUser
          - name: InstallGoDnf
            action: aws:runShellScript
            precondition:
              StringEquals:
                - '{{ LinuxFlavor }}'
                - al2023
            inputs:
              timeoutSeconds: 300
              runCommand:
                - '#!/bin/bash'
                # - set -euo pipefail # Uncomment to throw error on failure
                - dnf install -y golang
          - name: InstallGoApt
            action: aws:runShellScript
            precondition:
              StringEquals:
                - '{{ LinuxFlavor }}'
                - ubuntu
            inputs:
              timeoutSeconds: 300
              runCommand:
                - '#!/bin/bash'
                # - set -euo pipefail # Uncomment to throw error on failure
                - dpkg --configure -a
                - add-apt-repository ppa:longsleep/golang-backports
                - apt-get -q update && DEBIAN_FRONTEND=noninteractive apt-get install -y -q golang-go
          - name: ConfigureGo
            action: aws:runShellScript
            inputs:
              timeoutSeconds: 300
              runCommand:
                - '#!/bin/bash'
                # - set -euo pipefail # Uncomment to throw error on failure
                - !Sub chown -R ${CodeEditorUser}:${CodeEditorUser} /home/${CodeEditorUser}
                - echo "Go installed. Checking configuration"
                - go version
          - name: InstallDotNetDnf
            action: aws:runShellScript
            precondition:
              StringEquals:
                - '{{ LinuxFlavor }}'
                - al2023
            inputs:
              timeoutSeconds: 300
              runCommand:
                - '#!/bin/bash'
                # - set -euo pipefail # Uncomment to throw error on failure
                - dnf install -y dotnet-sdk-8.0
          - name: InstallDotNetApt
            action: aws:runShellScript
            precondition:
              StringEquals:
                - '{{ LinuxFlavor }}'
                - ubuntu
            inputs:
              timeoutSeconds: 300
              runCommand:
                - '#!/bin/bash'
                # - set -euo pipefail # Uncomment to throw error on failure
                - dpkg --configure -a
                - apt-get -q update && DEBIAN_FRONTEND=noninteractive apt-get install -y -q dotnet-sdk-8.0
          - name: ConfigureDotNet
            action: aws:runShellScript
            inputs:
              timeoutSeconds: 300
              runCommand:
                - '#!/bin/bash'
                # - set -euo pipefail # Uncomment to throw error on failure
                - !Sub sudo -i -u ${CodeEditorUser} dotnet tool install Microsoft.Web.LibraryManager.Cli --create-manifest-if-needed
                - !Sub echo 'PATH=$PATH:/home/${CodeEditorUser}/.dotnet/tools' >> /home/${CodeEditorUser}/.bashrc
                - !Sub chown -R ${CodeEditorUser}:${CodeEditorUser} /home/${CodeEditorUser}
                - echo "Dotnet installed. Checking configuration"
                - !Sub sudo -i -u ${CodeEditorUser} dotnet --list-sdks
          - name: InstallRust
            action: aws:runShellScript
            inputs:
              timeoutSeconds: 300
              runCommand:
                - '#!/bin/bash'
                # - set -euo pipefail # Uncomment to throw error on failure
                - !Sub sudo -u ${CodeEditorUser} curl -fsSL https://sh.rustup.rs -o /tmp/rust_install.sh
                - !Sub sudo -i -u ${CodeEditorUser} bash /tmp/rust_install.sh -y 2>&1
                - echo "Rust installed. Checking configuration"
                - !Sub sudo -i -u ${CodeEditorUser} rustc --version
          - name: InstallVite
            action: aws:runShellScript
            inputs:
              timeoutSeconds: 300
              runCommand:
                - '#!/bin/bash'
                # - set -euo pipefail # Uncomment to throw error on failure
                - npm install -g create-vite@5.2.3
                - echo "Vite installed. Checking configuration"
                - create-vite -h
          - name: InstallDockerDnf
            action: aws:runShellScript
            precondition:
              StringEquals:
                - '{{ LinuxFlavor }}'
                - al2023
            inputs:
              timeoutSeconds: 300
              runCommand:
                - '#!/bin/bash'
                # - set -euo pipefail # Uncomment to throw error on failure
                - dnf install -y docker amazon-ecr-credential-helper
          - name: InstallDockerApt
            action: aws:runShellScript
            precondition:
              StringEquals:
                - '{{ LinuxFlavor }}'
                - ubuntu
            inputs:
              timeoutSeconds: 300
              runCommand:
                - '#!/bin/bash'
                # - set -euo pipefail # Uncomment to throw error on failure
                - dpkg --configure -a
                # - curl -fsSL https://get.docker.com | bash
                - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
                - echo "deb [signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu $(lsb_release --codename --short) stable" > /etc/apt/sources.list.d/docker.list
                - apt-get -q update && DEBIAN_FRONTEND=noninteractive apt-get install -y -q docker-ce docker-ce-cli containerd.io amazon-ecr-credential-helper
          - name: ConfigureDocker
            action: aws:runShellScript
            inputs:
              timeoutSeconds: 300
              runCommand:
                - '#!/bin/bash'
                # - set -euo pipefail # Uncomment to throw error on failure
                - !Sub usermod -aG docker ${CodeEditorUser}
                - !Sub sudo -u ${CodeEditorUser} newgrp docker
                - !Sub systemctl restart code-server@${CodeEditorUser}
                - systemctl start docker.service
                - !Sub mkdir -p /home/${CodeEditorUser}/.docker
                - !Sub |
                  tee /home/${CodeEditorUser}/.docker/config.json <<EOF
                  {
                    "credsStore": "ecr-login"
                  }
                  EOF
                - !Sub chown -R ${CodeEditorUser}:${CodeEditorUser} /home/${CodeEditorUser}/.docker
                # The workshop host is Graviton (arm64), but FAST's CedarPolicyLambda
                # is an x86_64 PythonFunction (it omits `architecture`, so CDK
                # defaults to X86_64), so `cdk deploy` runs
                # `docker build --platform linux/amd64`. Without QEMU/binfmt
                # emulation registered WITH THE 'F' (fix-binary) FLAG, that build
                # fails at the first RUN layer with "exec /bin/sh: exec format error".
                # The 'F' flag is essential: `docker build` runs each RUN in a fresh
                # container, so the kernel must pin the qemu interpreter fd at
                # registration time (F) rather than resolve its path per-process —
                # otherwise the interpreter isn't visible inside the build container.
                # tonistiigi/binfmt registers WITH 'F'; that is why it is used here.
                - |
                  for i in $(seq 1 30); do
                    if docker info >/dev/null 2>&1; then break; fi
                    echo "waiting for docker daemon ($i/30)..."; sleep 2
                  done
                # Register via tonistiigi/binfmt (installs handlers with the F flag).
                # Pull through the account ECR pull-through cache if configured;
                # otherwise fall back to Docker Hub. Do not swallow failure.
                - |
                  if docker run --privileged --rm tonistiigi/binfmt:qemu-v9.2.2 --install amd64; then
                    echo "binfmt: amd64 emulation registered (tonistiigi/binfmt, F flag)"
                  else
                    echo "WARNING: binfmt registration FAILED - linux/amd64 docker builds (FAST CedarPolicyLambda) will not work on this arm64 host" >&2
                  fi
                # Verify the x86_64 handler is registered AND carries the F flag.
                # Without F the handler exists but docker build still fails.
                - |
                  H=/proc/sys/fs/binfmt_misc/qemu-x86_64
                  if test -f "$H" && grep -q '^flags:.*F' "$H"; then
                    echo "binfmt qemu-x86_64 handler present with F flag - cross-arch docker build ready"
                  else
                    echo "WARNING - qemu-x86_64 handler missing or lacks F flag; amd64 docker build will fail" >&2
                    cat "$H" 2>/dev/null || true
                  fi
                - echo "Docker installed. Checking configuration"
                - docker --version
                - docker buildx ls || true
                - systemctl status docker.service
          - name: InstallDockerExtension
            action: aws:runDocument
            inputs:
              documentType: SSMDocument
              documentPath: !Ref InstallCodeEditorExtensionSSMDoc
              documentParameters:
                ExtensionId: ms-azuretools.vscode-docker
                CodeEditorUser: !Ref CodeEditorUser
          - name: InstallTerraformDnf
            action: aws:runShellScript
            precondition:
              StringEquals:
                - '{{ LinuxFlavor }}'
                - al2023
            inputs:
              timeoutSeconds: 300
              runCommand:
                - '#!/bin/bash'
                # - set -euo pipefail # Uncomment to throw error on failure
                - dnf config-manager --add-repo https://rpm.releases.hashicorp.com/AmazonLinux/hashicorp.repo
                - dnf -y install terraform 2>&1
                - echo "Terraform installed. Checking configuration"
                - terraform --version
          - name: InstallTerraformApt
            action: aws:runShellScript
            precondition:
              StringEquals:
                - '{{ LinuxFlavor }}'
                - ubuntu
            inputs:
              timeoutSeconds: 300
              runCommand:
                - '#!/bin/bash'
                # - set -euo pipefail # Uncomment to throw error on failure
                - dpkg --configure -a
                - curl -fsSL https://apt.releases.hashicorp.com/gpg | gpg --dearmor -o /usr/share/keyrings/hashicorp-keyring.gpg
                - echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/hashicorp-keyring.gpg] https://apt.releases.hashicorp.com/ $(lsb_release --codename --short) main" >> /etc/apt/sources.list.d/hashicorp.list
                - apt-get -q update && DEBIAN_FRONTEND=noninteractive apt-get install -y -q terraform
                - echo "Terraform installed. Checking configuration"
                - terraform --version
          - name: InstallPrettierExtension
            action: aws:runDocument
            inputs:
              documentType: SSMDocument
              documentPath: !Ref InstallCodeEditorExtensionSSMDoc
              documentParameters:
                ExtensionId: esbenp.prettier-vscode
                CodeEditorUser: !Ref CodeEditorUser
          - name: ConfigurePrettier
            action: aws:runShellScript
            inputs:
              timeoutSeconds: 300
              runCommand:
                - '#!/bin/bash'
                # - set -euo pipefail # Uncomment to throw error on failure
                - !Sub |
                    target_file="/home/${CodeEditorUser}/.local/share/code-server/User/settings.json"
                    if [ ! -f "$target_file" ]; then
                      echo '{}' > "$target_file"
                    fi
                    echo "$(jq '. + {"editor.defaultFormatter": "esbenp.prettier-vscode", "editor.formatOnSave": true}' "$target_file")" > "$target_file"
                - echo "Prettier add-in installed"
          - name: ConfigureGraphExplorer
            action: aws:runShellScript
            inputs:
              timeoutSeconds: 600
              runCommand:
                - '#!/bin/bash'
                # - set -euo pipefail # Uncomment to throw error on failure
                - echo "Configuring nginx for Graph Explorer"
                - !Sub |
                  if [[ -n "${DevServerBasePath}" ]]
                  then
                      sed -i '$i\
                      # Graph Explorer API endpoints - regex for common patterns\
                      location ~ ^/${DevServerBasePath}/(logger|summary|status|gremlin|openCypher|sparql|defaultConnection)$ {\
                          proxy_pass http://localhost:${DevServerPort}/$1;\
                      }' /etc/nginx/conf.d/code-editor.conf
                  fi
                - systemctl enable nginx 2>&1
                - systemctl restart nginx
                - echo "Nginx config updated installed. Checking configuration"
                - nginx -t 2>&1
                - systemctl status nginx
# Install Workshop specific packages here

  SSMDocLambdaRole:
    Type: AWS::IAM::Role
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W11
            reason: The Amazon EC2 ssm:*CommandInvocation API actions do not support resource-level permissions, so you cannot control which individual resources users can view in the console. Therefore, the * wildcard is necessary in the Resource element. See https://docs.aws.amazon.com/service-authorization/latest/reference/list_awssystemsmanager.html
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: !Sub lambda.${AWS::URLSuffix}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub arn:${AWS::Partition}:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SSMDocOnEC2
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - ssm:SendCommand
                Resource:
                  - !Sub arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:document/${CodeEditorSSMDoc}
                  - !Sub arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:document/AmazonCloudWatch-ManageAgent
                  - !Sub arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:instance/${CodeEditorInstance}
              - Effect: Allow
                Action:
                  - ssm:ListCommandInvocations
                  - ssm:GetCommandInvocation
                Resource: '*'

  RunSSMDocLambda:
    Type: AWS::Lambda::Function
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W58
            reason: Warning incorrectly reported. The role associated with the Lambda function has the AWSLambdaBasicExecutionRole managed policy attached, which includes permission to write CloudWatch Logs. See https://docs.aws.amazon.com/aws-managed-policy/latest/reference/AWSLambdaBasicExecutionRole.html
          - id: W89
            reason: CloudFormation custom function does not need the scaffolding of a VPC, to do so would add unnecessary complexity
          - id: W92
            reason: CloudFormation custom function does not need reserved concurrent executions, to do so would add unnecessary complexity
    Properties:
      Description: Run SSM document on EC2 instance
      Handler: index.lambda_handler
      Runtime: python3.13
      MemorySize: 128
      Timeout: 600
      Environment:
        Variables:
          RetrySleep: 2900
          TimeoutThreshold: 5000
      Architectures:
        - arm64
      Role: !GetAtt SSMDocLambdaRole.Arn
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          import logging
          import time
          import os

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          def lambda_handler(event, context):
              logger.debug(f'event: {event}')
              logger.debug(f'context: {context}')

              if event['RequestType'] != 'Create':
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, responseData={}, reason='No action to take')
              else:
                  sleep_ms = int(os.environ.get('RetrySleep'))
                  timeout_threshold_ms = int(os.environ.get('TimeoutThreshold'))
                  resource_properties = event['ResourceProperties']
                  instance_id = resource_properties['InstanceId']
                  document_name = resource_properties['DocumentName']
                  cloudwatch_log_group_name = resource_properties['CloudWatchLogGroupName']

                  logger.info(f'Running SSM Document {document_name} on EC2 instance {instance_id}. Logging to {cloudwatch_log_group_name}')

                  del resource_properties['ServiceToken']
                  if 'ServiceTimeout' in resource_properties:
                      del resource_properties['ServiceTimeout']
                  del resource_properties['InstanceId']
                  del resource_properties['DocumentName']
                  del resource_properties['CloudWatchLogGroupName']
                  if 'PhysicalResourceId' in resource_properties:
                      del resource_properties['PhysicalResourceId']

                  logger.debug(f'resource_properties filtered: {resource_properties}')

                  parameters = {}
                  for key, value in resource_properties.items():
                      parameters[key] = [value]

                  logger.debug(f'parameter keys: {list(parameters.keys())}')

                  retry = True
                  attempt_no = 0
                  time_remaining_ms = context.get_remaining_time_in_millis()

                  ssm = boto3.client('ssm')

                  while (retry == True):
                      attempt_no += 1
                      logger.info(f'Attempt: {attempt_no}. Time Remaining: {time_remaining_ms/1000}s')
                      try:
                          response = ssm.send_command(
                              InstanceIds = [instance_id],
                              DocumentName = document_name,
                              CloudWatchOutputConfig = {'CloudWatchLogGroupName': cloudwatch_log_group_name, 'CloudWatchOutputEnabled': True},
                              Parameters = parameters
                          )
                          logger.debug(f'response: {response}')
                          command_id = response['Command']['CommandId']
                          responseData = {'CommandId': command_id}
                          cfnresponse.send(event, context, cfnresponse.SUCCESS, responseData, reason='OK')
                          retry = False

                      except ssm.exceptions.InvalidInstanceId as e:
                          time_remaining_ms = context.get_remaining_time_in_millis()
                          if (time_remaining_ms > timeout_threshold_ms):
                              logger.info(f'Instance {instance_id} not ready. Sleeping: {sleep_ms/1000}s')
                              time.sleep(sleep_ms/1000)
                              retry = True
                          else:
                              logger.info(f'Instance {instance_id} not ready, timed out. Time remaining {time_remaining_ms/1000}s < Timeout threshold {timeout_threshold_ms/1000}s')
                              logger.error(e, exc_info=True)
                              cfnresponse.send(event, context, cfnresponse.FAILED, responseData={}, reason='Timed out. Time remaining: ' + str(time_remaining_ms/1000) + 's < Timeout threshold: ' + str(timeout_threshold_ms/1000) + 's')
                              retry = False

                      except Exception as e:
                          logger.error(e, exc_info=True)
                          cfnresponse.send(event, context, cfnresponse.FAILED, responseData={}, reason=str(e))
                          retry = False

  RunCodeEditorSSMDoc:
    Type: Custom::RunSSMDocLambda
    Properties:
      ServiceToken: !GetAtt RunSSMDocLambda.Arn
      ServiceTimeout: 600
      InstanceId: !Ref CodeEditorInstance
      DocumentName: !Ref CodeEditorSSMDoc
      CloudWatchLogGroupName: !Sub /aws/ssm/${CodeEditorSSMDoc}
      CodeEditorPassword: !GetAtt SecretPlaintext.password
      LinuxFlavor: !If [IsAL2023, 'al2023', 'ubuntu']

  CodeEditorInstanceBootstrapRole:
    Type: AWS::IAM::Role
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W28
            reason: >
              AdministratorAccess on this EC2 instance role is intentional and
              scoped by environment, not by policy. This role belongs to the
              participant's disposable, single-occupant Code Editor IDE — the
              execution environment from which the participant runs CDK and
              creates resources across ~25 services (Bedrock, AgentCore,
              Lambda, ECS, Amplify, CloudFront, Cognito, EventBridge, S3, SSM,
              etc.) with runtime-generated names. The real boundary is the
              account itself: a per-participant Workshop Studio sandbox (with
              its SCP), or for self-hosted, a dedicated disposable account
              (plus the optional static/cfn/self-service-scp.json region
              fence). The least-privilege artifact a customer studies is the
              scoped ParticipantRole — static/cfn/workshop-iam-policy-*.json
              (attached via contentspec.yaml) — NOT this IDE execution role.
              Scoping the IDE role to exact ARNs breaks the very modules it
              exists to run (it cannot pre-know the ac-*/fast-*/agentcore-*
              resource names created at participant time).
          - id: W43
            reason: >
              AdministratorAccess attached by design — see W28. This is the
              disposable IDE execution sandbox, not a runtime workload role.
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - !Sub ec2.${AWS::URLSuffix}
                - !Sub ssm.${AWS::URLSuffix}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        # The IDE is the participant's disposable execution environment; it gets
        # AdministratorAccess so every module's create/deploy steps work. The
        # studied least-privilege policy is the ParticipantRole
        # (static/cfn/workshop-iam-policy-*.json), not this role. The account
        # boundary (sandbox SCP / dedicated disposable account) is the control.
        - !Sub arn:${AWS::Partition}:iam::aws:policy/AdministratorAccess
        - !Sub arn:${AWS::Partition}:iam::aws:policy/AmazonSSMManagedInstanceCore
        - !Sub arn:${AWS::Partition}:iam::aws:policy/CloudWatchAgentServerPolicy
        - !Sub arn:${AWS::Partition}:iam::aws:policy/AmazonQDeveloperAccess

  CodeEditorInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref CodeEditorInstanceBootstrapRole

  CodeEditorInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !If
        - IsGraviton
        - !FindInMap [ArmImage, !Ref InstanceOperatingSystem, ImageId]
        - !FindInMap [AmdImage, !Ref InstanceOperatingSystem, ImageId]
      InstanceType: !Ref InstanceType
      BlockDeviceMappings:
        - DeviceName: !If [IsAL2023, /dev/xvda, /dev/sda1]
          Ebs:
            VolumeSize: !Ref InstanceVolumeSize
            VolumeType: gp3
            DeleteOnTermination: true
            Encrypted: true
      Monitoring: true
      # Default VPC: plain SecurityGroupIds (subnet/public-IP from VPC
      # defaults). Custom network: NetworkInterfaces with an explicit subnet
      # and AssociatePublicIpAddress so PublicDnsName (the CloudFront origin)
      # resolves even when the subnet has MapPublicIpOnLaunch disabled. The
      # two properties are mutually exclusive in EC2, hence the paired !Ifs.
      SecurityGroupIds: !If
        - HasCustomNetwork
        - !Ref AWS::NoValue
        - [!Ref SecurityGroup]
      NetworkInterfaces: !If
        - HasCustomNetwork
        - - DeviceIndex: '0'
            SubnetId: !Ref SubnetId
            GroupSet: [!Ref SecurityGroup]
            AssociatePublicIpAddress: true
        - !Ref AWS::NoValue
      IamInstanceProfile: !Ref CodeEditorInstanceProfile
      UserData:
        Fn::Base64: !Sub |
          #cloud-config
          hostname: ${InstanceName}
          runcmd:
            - mkdir -p ${HomeFolder} && chown -R ${CodeEditorUser}:${CodeEditorUser} ${HomeFolder}
      Tags:
      - Key: Name
        Value: !Ref InstanceName

  CodeEditorInstanceEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  ElasticIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt CodeEditorInstanceEIP.AllocationId
      InstanceId: !Ref CodeEditorInstance

  CodeEditorInstanceCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        DefaultTTL: 86400
        MaxTTL: 31536000
        MinTTL: 1
        Name: !Sub
        - ${InstanceName}-${RandomGUID}
        - RandomGUID: !Select [0, !Split ['-', !Select [2, !Split ['/', !Ref AWS::StackId ]]]]
        ParametersInCacheKeyAndForwardedToOrigin:
          CookiesConfig:
            CookieBehavior: all
          EnableAcceptEncodingGzip: False
          HeadersConfig:
            # whitelist is the AWS CloudFront API value name (legacy); semantics are an allow list
            HeaderBehavior: whitelist
            Headers:
              - Accept-Charset
              - Authorization
              - Origin
              - Accept
              - Referer
              - Host
              - Accept-Language
              - Accept-Encoding
              - Accept-Datetime
          QueryStringsConfig:
            QueryStringBehavior: all

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    DependsOn: ElasticIPAssociation
    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_174
            comment: "CloudFront uses the default certificate; minimum TLS 1.2 is not enforceable without a custom domain/ACM cert. Workshop sample."
          - id: CKV_AWS_86
            comment: "WAF is out of scope for the ephemeral workshop CloudFront distribution."
      cfn_nag:
        rules_to_suppress:
          - id: W10
            reason: CloudFront Distribution access logging would require setup of an S3 bucket and changes in IAM, which add unnecessary complexity to the template
          - id: W70
            reason: >
              Workshop Studio accounts do not include a custom domain that can
              be used to provision an ACM certificate, so the distribution
              uses the default *.cloudfront.net cert and cannot set a custom
              TLS minimum protocol at the edge. ViewerProtocolPolicy is
              `redirect-to-https` on both cache behaviors, so any plaintext
              HTTP arrival is 301-redirected to HTTPS before reaching the
              IDE; code-server's WebSocket transport (wss://) rides the
              already-established HTTPS viewer connection, so the redirect
              does not affect it (validated by live us-west-2 deploy). The
              companion OriginProtocolPolicy: http-only on the EC2 origin
              runs inside CloudFront's private network.
    Properties:
      DistributionConfig:
        Enabled: True
        HttpVersion: http2and3
        CacheBehaviors:
          - AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
              - PUT
              - PATCH
              - POST
              - DELETE
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad # see https://docs.aws.amazon.com/AmazonCloudFront/latest/DeveloperGuide/using-managed-cache-policies.html#managed-cache-policy-caching-disabled
            Compress: False
            OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3 # Managed-AllViewer - see https://docs.aws.amazon.com/AmazonCloudFront/latest/DeveloperGuide/using-managed-origin-request-policies.html#:~:text=When%20using%20AWS,47e4%2Db989%2D5492eafa07d3
            TargetOriginId: !Sub CloudFront-${AWS::StackName}
            ViewerProtocolPolicy: redirect-to-https
            PathPattern: '/proxy/*'
        DefaultCacheBehavior:
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
            - PUT
            - PATCH
            - POST
            - DELETE
          CachePolicyId: !Ref CodeEditorInstanceCachePolicy
          OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3 # Managed-AllViewer - see https://docs.aws.amazon.com/AmazonCloudFront/latest/DeveloperGuide/using-managed-origin-request-policies.html#:~:text=When%20using%20AWS,47e4%2Db989%2D5492eafa07d3
          TargetOriginId: !Sub CloudFront-${AWS::StackName}
          ViewerProtocolPolicy: redirect-to-https
        Origins:
          - DomainName: !GetAtt CodeEditorInstance.PublicDnsName
            Id: !Sub CloudFront-${AWS::StackName}
            CustomOriginConfig:
              OriginProtocolPolicy: http-only
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
          # MinimumProtocolVersion is set to TLSv1.2_2021 to satisfy Checkov
          # CKV_AWS_174 (which reads templates, not runtime behavior). Note:
          # when CloudFrontDefaultCertificate=true, CloudFront pins the actual
          # floor to TLSv1 for the default *.cloudfront.net cert regardless of
          # this value. To truly enforce TLS 1.2 at the edge, an ACM custom
          # cert bound via Aliases is required — Workshop Studio does not
          # provide one (see W70 above). The viewer→CloudFront leg remains
          # safe because redirect-to-https is enforced below and modern
          # browsers negotiate TLSv1.2+ with CloudFront by default.
          MinimumProtocolVersion: TLSv1.2_2021

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: F1000
            reason: All outbound traffic should be allowed from this instance. The EC2 instance is provisioned in the default VPC (or the participant-supplied VpcId), which already has this egress rule, and it is not possible to duplicate this egress rule in the default VPC
    Properties:
      GroupDescription: Security Group for Code Editor - only allow CloudFront ingress
      # Without VpcId, EC2 places the SG in the default VPC — accounts that
      # deleted their default VPC (a common enterprise security baseline) fail
      # with "No default VPC for this user". Supplying VpcId+SubnetId routes
      # around that.
      VpcId: !If
        - HasCustomNetwork
        - !Ref VpcId
        - !Ref AWS::NoValue
      SecurityGroupIngress:
        - Description: Allow HTTP from com.amazonaws.global.cloudfront.origin-facing
          IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourcePrefixListId: !If
            - HasCloudFrontPrefixListIdOverride
            - !Ref CloudFrontPrefixListIdOverride
            - !FindInMap [AWSRegionsPrefixListID, !Ref 'AWS::Region', PrefixList]

  CodeEditorHealthCheckLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: !Sub lambda.${AWS::URLSuffix}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub arn:${AWS::Partition}:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  CodeEditorHealthCheckLambda:
    Type: AWS::Lambda::Function
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W58
            reason: Warning incorrectly reported. The role associated with the Lambda function has the AWSLambdaBasicExecutionRole managed policy attached, which includes permission to write CloudWatch Logs. See https://docs.aws.amazon.com/aws-managed-policy/latest/reference/AWSLambdaBasicExecutionRole.html
          - id: W89
            reason: CloudFormation custom function does not need the scaffolding of a VPC, to do so would add unnecessary complexity
          - id: W92
            reason: CloudFormation custom function does not need reserved concurrent executions, to do so would add unnecessary complexity
    Properties:
      Description: Run health check on Code Editor instance
      Handler: index.lambda_handler
      Runtime: python3.13
      MemorySize: 128
      Timeout: 600
      Environment:
        Variables:
          RetrySleep: 2900
          TimeoutThreshold: 5000
      Architectures:
        - arm64
      Role: !GetAtt CodeEditorHealthCheckLambdaRole.Arn
      Code:
        ZipFile: |
          import json
          import cfnresponse
          import logging
          import time
          import os
          import http.client
          from urllib.parse import urlparse

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          def healthURLOk(url):
              # Using try block to catch connection errors and JSON conversion errors
              try:
                  logger.debug(f'url: {url}')
                  parsed_url = urlparse(url)
                  if parsed_url.scheme == 'https':
                      logger.debug(f'Trying https: {parsed_url.netloc}. Parsed_url: {parsed_url}')
                      conn = http.client.HTTPSConnection(parsed_url.netloc)
                  else:
                      logger.debug(f'Trying http: {parsed_url.netloc}. Parsed_url: {parsed_url}')
                      conn = http.client.HTTPConnection(parsed_url.netloc)
                  conn.request("GET", parsed_url.path or "/")
                  response = conn.getresponse()
                  logger.debug(f'response: {response}')
                  logger.debug(f'response.status: {response.status}')
                  content = response.read()
                  logger.debug(f'content: {content}')
                  # Any 2xx/3xx on /healthz means code-server has bound to its
                  # port and is serving. code-server returns JSON like
                  # {"status":"alive","lastHeartbeat":...} — we don't inspect
                  # the body (the old code-editor-server returned a different
                  # shape with `hasActiveConnections`, which no longer applies).
                  if 200 <= response.status < 400:
                      logger.info(f'Health check OK. Status: {response.status}')
                      return True
                  else:
                      logger.info(f'Healthcheck failed. Return code: {response.status}')
                      return False

              except http.client.HTTPException as e:
                  # URL malformed or endpoint not ready yet, this should only happen if we can not DNS resolve the URL
                  logger.error(e, exc_info=True)
                  logger.error(f'Healthcheck failed: HTTP Exception. URL invalid and/or endpoint not ready yet')
                  return False

              except json.decoder.JSONDecodeError as e:
                  # The response we got was not a properly formatted JSON
                  logger.error(e, exc_info=True)
                  logger.info(f'Healthcheck failed: Did not get JSON object from URL as expected')
                  return False

              except Exception as e:
                  logger.error(e, exc_info=True)
                  logger.info(f'Healthcheck failed: General error')
                  return False

              finally:
                  if 'conn' in locals():
                      conn.close()

          def is_valid_json(json_string):
              try:
                  json.loads(json_string)
                  return True
              except ValueError:
                  return False

          def lambda_handler(event, context):
              logger.debug(f'event: {event}')
              logger.debug(f'context: {context}')
              try:
                  if event['RequestType'] != 'Create':
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, responseData={}, reason='No action to take')
                  else:
                      sleep_ms = int(os.environ.get('RetrySleep'))
                      timeout_threshold_ms = int(os.environ.get('TimeoutThreshold'))
                      resource_properties = event['ResourceProperties']
                      url = resource_properties['Url']

                      logger.info(f'Testing url: {url}')

                      time_remaining_ms = context.get_remaining_time_in_millis()
                      attempt_no = 0
                      health_check = False
                      while (attempt_no == 0 or (time_remaining_ms > timeout_threshold_ms and not health_check)):
                          attempt_no += 1
                          logger.info(f'Attempt: {attempt_no}. Time Remaining: {time_remaining_ms/1000}s')
                          health_check = healthURLOk(url)
                          if not health_check:
                              logger.debug(f'Healthcheck failed. Sleeping: {sleep_ms/1000}s')
                              time.sleep(sleep_ms/1000)
                          time_remaining_ms = context.get_remaining_time_in_millis()
                      if health_check:
                          logger.info(f'Health check successful. Attempts: {attempt_no}. Time Remaining: {time_remaining_ms/1000}s')
                          cfnresponse.send(event, context, cfnresponse.SUCCESS, responseData={}, reason='Code Editor healthcheck successful')
                      else:
                          logger.info(f'Health check failed. Timed out. Attempts: {attempt_no}. Time remaining {time_remaining_ms/1000}s < Timeout threshold {timeout_threshold_ms/1000}s')
                          cfnresponse.send(event, context, cfnresponse.FAILED, responseData={}, reason='Code Editor healthcheck failed. Timed out after ' + str(attempt_no) + ' attempts')
                          logger.info(f'Response sent')

              except Exception as e:
                  logger.error(e, exc_info=True)
                  logger.info(f'Health check failed. General exception')
                  cfnresponse.send(event, context, cfnresponse.FAILED, responseData={}, reason=str(e))

  Healthcheck:
    Type: Custom::CodeEditorHealthCheckLambda
    Properties:
      ServiceToken: !GetAtt CodeEditorHealthCheckLambda.Arn
      ServiceTimeout: 610
      Url: !Sub https://${CloudFrontDistribution.DomainName}/healthz

  CheckSSMDocLambda:
    Type: AWS::Lambda::Function
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W58
            reason: Warning incorrectly reported. The role associated with the Lambda function has the AWSLambdaBasicExecutionRole managed policy attached, which includes permission to write CloudWatch Logs. See https://docs.aws.amazon.com/aws-managed-policy/latest/reference/AWSLambdaBasicExecutionRole.html
          - id: W89
            reason: CloudFormation custom function does not need the scaffolding of a VPC, to do so would add unnecessary complexity
          - id: W92
            reason: CloudFormation custom function does not need reserved concurrent executions, to do so would add unnecessary complexity
    Properties:
      Description: Check SSM document on EC2 instance
      Handler: index.lambda_handler
      Runtime: python3.13
      MemorySize: 128
      Timeout: 600
      Environment:
        Variables:
          RetrySleep: 2900
          TimeoutThreshold: 5000
      Architectures:
        - arm64
      Role: !GetAtt SSMDocLambdaRole.Arn
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          import logging
          import time
          import os

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          def lambda_handler(event, context):
              logger.debug(f'event: {event}')
              logger.debug(f'context: {context}')

              if event['RequestType'] != 'Create':
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, responseData={}, reason='No action to take')
              else:
                  sleep_ms = int(os.environ.get('RetrySleep'))
                  timeout_threshold_ms = int(os.environ.get('TimeoutThreshold'))
                  resource_properties = event['ResourceProperties']
                  instance_id = resource_properties['InstanceId']
                  document_name = resource_properties['DocumentName']

                  logger.info(f'Checking SSM Document {document_name} on EC2 instance {instance_id}')

                  retry = True
                  attempt_no = 0
                  time_remaining_ms = context.get_remaining_time_in_millis()

                  ssm = boto3.client('ssm')

                  while (retry == True):
                      attempt_no += 1
                      logger.info(f'Attempt: {attempt_no}. Time Remaining: {time_remaining_ms/1000}s')
                      try:
                          # check to see if document has completed running on instance
                          response = ssm.list_command_invocations(
                              InstanceId=instance_id,
                              Details=True
                          )
                          logger.debug(f'Response: {response}')
                          for invocation in response['CommandInvocations']:
                              if invocation['DocumentName'] == document_name:
                                  invocation_status = invocation['Status']
                                  if invocation_status == 'Success':
                                      logger.info(f'SSM Document {document_name} on EC2 instance {instance_id} complete. Status: {invocation_status}')
                                      cfnresponse.send(event, context, cfnresponse.SUCCESS, responseData={}, reason='OK')
                                      retry = False
                                  elif invocation_status == 'Failed' or invocation_status == 'Cancelled' or invocation_status == 'TimedOut':
                                      logger.info(f'SSM Document {document_name} on EC2 instance {instance_id} failed. Status: {invocation_status}')
                                      reason = ''
                                      # Get information on step that failed, otherwise it's cancelled or timeout
                                      for step in invocation['CommandPlugins']:
                                          step_name = step['Name']
                                          step_status = step['Status']
                                          step_output = step['Output']
                                          logger.debug(f'Step {step_name} {step_status}: {step_output}')
                                          if step_status != 'Success':
                                              try:
                                                  response_step = ssm.get_command_invocation(
                                                      CommandId=invocation['CommandId'],
                                                      InstanceId=instance_id,
                                                      PluginName=step_name
                                                  )
                                                  logger.debug(f'Step details: {response_step}')
                                                  step_output = response_step['StandardErrorContent']
                                              except Exception as e:
                                                  logger.error(e, exc_info=True)
                                              logger.info(f'Step {step_name} {step_status}: {step_output}')
                                              if reason == '':
                                                  reason = f'Step {step_name} {step_status}: {step_output}'
                                              else:
                                                  reason += f'\nStep {step_name} {step_status}: {step_output}'
                                      if reason == '':
                                          reason = f'SSM Document {document_name} on EC2 instance {instance_id} failed. Status: {invocation_status}'
                                      logger.info(f'{reason}')
                                      cfnresponse.send(event, context, cfnresponse.FAILED, responseData={}, reason=reason)
                                      retry = False
                                  else:
                                      logger.info(f'SSM Document {document_name} on EC2 instance {instance_id} not yet complete. Status: {invocation_status}')
                                      retry = True
                          if retry == True:
                              if (time_remaining_ms > timeout_threshold_ms):
                                  logger.info(f'Sleeping: {sleep_ms/1000}s')
                                  time.sleep(sleep_ms/1000)
                                  time_remaining_ms = context.get_remaining_time_in_millis()
                              else:
                                  logger.info(f'Time remaining {time_remaining_ms/1000}s < Timeout threshold {timeout_threshold_ms/1000}s')
                                  logger.info(f'Stopping check due to timeout as time remaining {time_remaining_ms/1000}s < Timeout threshold {timeout_threshold_ms/1000}s')
                                  cfnresponse.send(event, context, cfnresponse.FAILED, responseData={}, reason='Timed out. Time remaining: ' + str(time_remaining_ms/1000) + 's < Timeout threshold: ' + str(timeout_threshold_ms/1000) + 's')
                                  retry = False
                      except Exception as e:
                          logger.error(e, exc_info=True)
                          cfnresponse.send(event, context, cfnresponse.FAILED, responseData={}, reason=str(e))
                          retry = False

  CheckCodeEditorSSMDoc:
    Type: Custom::CheckSSMDocLambda
    DependsOn: Healthcheck
    Properties:
      ServiceToken: !GetAtt CheckSSMDocLambda.Arn
      ServiceTimeout: 610
      InstanceId: !Ref CodeEditorInstance
      DocumentName: !Ref CodeEditorSSMDoc

Outputs:
  URL:
    Description: Workshop IDE URL. Open in a browser, then paste the IdePassword value at the code-server sign-in prompt.
    Value: !Sub https://${CloudFrontDistribution.DomainName}/?folder=${HomeFolder}
  IdePassword:
    Description: Password for the Workshop IDE login. Randomly generated on stack create; paste this into the code-server sign-in form when prompted.
    Value: !GetAtt SecretPlaintext.password
