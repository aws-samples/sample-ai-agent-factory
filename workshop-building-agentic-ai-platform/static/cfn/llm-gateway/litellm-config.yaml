# LiteLLM Proxy Configuration
# This file defines the models, guardrails, and settings for the LLM Gateway.
# It is loaded by the LiteLLM proxy at startup.
#
# All models use the Bedrock Converse API via IAM task role auth.
# Participants must enable model access in Amazon Bedrock > Model Access
# before using each model.

