general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY  # upstream LiteLLM field name (not renamable); this is the proxy admin key

litellm_settings:
  cache: true
  num_retries: 2
  request_timeout: 60
  drop_params: true

# Guardrails are configured in Step 5 of the workshop.
