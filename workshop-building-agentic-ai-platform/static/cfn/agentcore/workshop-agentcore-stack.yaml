AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AgentCore Stack — AgentCore Registry, Gateway, and WorkloadIdentity resources
  for Module 3b/4b. Imports shared Cognito identity from Registry stack and
  shared Lambda tools from Tools Gateway stack.

Parameters:
  EnvironmentName:
    Type: String
    Default: workshop
    Description: Environment name prefix for all resources.
  Boto3LayerBucket:
    Type: String
    Description: S3 bucket containing the boto3 Lambda Layer zip (boto3-lambda-layer.zip)
    Default: ''
  Boto3LayerKey:
    Type: String
    Description: S3 key for the boto3 Lambda Layer zip
    Default: agentcore/boto3-lambda-layer.zip

Conditions:
  HasBoto3Layer: !Not [!Equals [!Ref Boto3LayerBucket, '']]

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Environment
        Parameters:
          - EnvironmentName
      - Label:
          default: Lambda Layer (optional)
        Parameters:
          - Boto3LayerBucket
          - Boto3LayerKey

Resources:

  #============================================================================
  # 1. Admin Password Secret
  #============================================================================

  # Encryption note: this secret intentionally uses the AWS-managed Secrets
  # Manager KMS key (no KmsKeyId). See the CKV_AWS_149 skip in Metadata below.
  AdminPasswordSecret:
    Type: AWS::SecretsManager::Secret
    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_149
            comment: "AWS-managed key; ephemeral workshop secret, CMK adds cost without changing the threat model in a disposable account"
    DeletionPolicy: Delete
    Properties:
      Name: ac-admin-password
      Description: Admin password for workshop
      GenerateSecretString:
        SecretStringTemplate: '{}'
        GenerateStringKey: admin_password
        PasswordLength: 32
        RequireEachIncludedType: true
      Tags:
        - Key: Name
          Value: ac-admin-password
        - Key: Module
          Value: agentcore

  #--------------------------------------------------------------------------
  # Cognito Init Lambda — creates admin user, stores secrets
  #--------------------------------------------------------------------------

  CognitoInitLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'workshop-ac-cognito-init-role-${AWS::Region}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: CognitoAndSecretsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:AdminCreateUser
                  - cognito-idp:AdminAddUserToGroup
                  - cognito-idp:AdminSetUserPassword
                  - cognito-idp:DescribeUserPoolClient
                Resource:
                  Fn::ImportValue:
                    Fn::Sub: ${EnvironmentName}-CognitoUserPoolArn
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:UpdateSecret
                  - secretsmanager:CreateSecret
                  - secretsmanager:PutSecretValue
                  - secretsmanager:TagResource
                Resource:
                  - !Ref AdminPasswordSecret
                  - Fn::ImportValue:
                      Fn::Sub: ${EnvironmentName}-CognitoM2MClientSecretArn
                  - Fn::ImportValue:
                      Fn::Sub: ${EnvironmentName}-CognitoWebAppClientSecretArn
                  - !Sub arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${EnvironmentName}/registry/*
      Tags:
        - Key: Name
          Value: ac-cognito-init-role
        - Key: Module
          Value: agentcore

  CognitoInitLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/ac-cognito-init
      RetentionInDays: 7

  CognitoInitLambda:
    Type: AWS::Lambda::Function
    DependsOn: CognitoInitLogGroup
    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_115
            comment: "Inline workshop Lambda; reserved concurrency, DLQ, and VPC attachment add operational complexity without changing the threat model in a disposable workshop account"
          - id: CKV_AWS_116
            comment: "Inline workshop Lambda; reserved concurrency, DLQ, and VPC attachment add operational complexity without changing the threat model in a disposable workshop account"
          - id: CKV_AWS_117
            comment: "Inline workshop Lambda; calls only AWS control-plane APIs, no VPC-bound resources"
    Properties:
      FunctionName: ac-cognito-init
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt CognitoInitLambdaRole.Arn
      Timeout: 60
      MemorySize: 128
      Code:
        ZipFile: |
          import boto3, json, urllib.request, urllib.parse

          def send_response(event, context, status, reason=''):
              body = json.dumps({'Status': status, 'Reason': reason,
                                 'PhysicalResourceId': 'cognito-init',
                                 'StackId': event['StackId'],
                                 'RequestId': event['RequestId'],
                                 'LogicalResourceId': event['LogicalResourceId']})
              req = urllib.request.Request(event['ResponseURL'],
                                           data=body.encode(),
                                           headers={'Content-Type': ''}, method='PUT')
              urllib.request.urlopen(req)

          def handler(event, context):
              if event['RequestType'] == 'Delete':
                  try:
                      send_response(event, context, 'SUCCESS')
                  except Exception:
                      pass
                  return
              try:
                  props = event['ResourceProperties']
                  pool_id = props['UserPoolId']
                  group_name = props['AdminGroupName']
                  secret_arn = props['AdminPasswordSecretArn']

                  sm = boto3.client('secretsmanager')
                  secret = json.loads(sm.get_secret_value(SecretId=secret_arn)['SecretString'])
                  password = secret.get('admin_password', secret.get('password', ''))

                  idp = boto3.client('cognito-idp')

                  # Create admin user (suppress welcome email)
                  try:
                      idp.admin_create_user(
                          UserPoolId=pool_id,
                          Username='admin',
                          TemporaryPassword=password,
                          MessageAction='SUPPRESS',
                          UserAttributes=[{'Name': 'email', 'Value': 'admin@example.com'},
                                          {'Name': 'email_verified', 'Value': 'true'}]
                      )
                      # Set permanent password so no forced reset
                      idp.admin_set_user_password(
                          UserPoolId=pool_id, Username='admin',
                          Password=password, Permanent=True
                      )
                      print('Admin user created')
                  except idp.exceptions.UsernameExistsException:
                      print('Admin user already exists')

                  # Add to admin group
                  idp.admin_add_user_to_group(
                      UserPoolId=pool_id, Username='admin', GroupName=group_name
                  )
                  print(f'Admin added to {group_name}')

                  cognito_domain = props.get('CognitoDomain', '')
                  region = context.invoked_function_arn.split(':')[3]
                  token_url = f"https://{cognito_domain}.auth.{region}.amazoncognito.com/oauth2/token"

                  # Retrieve and store M2M client secret
                  m2m_client_id = props.get('M2MClientId')
                  m2m_secret_arn = props.get('M2MClientSecretArn')
                  m2m_client_secret = ''
                  if m2m_client_id and m2m_secret_arn:
                      try:
                          resp = idp.describe_user_pool_client(
                              UserPoolId=pool_id, ClientId=m2m_client_id
                          )
                          m2m_client_secret = resp['UserPoolClient'].get('ClientSecret', '')
                          sm.update_secret(
                              SecretId=m2m_secret_arn,
                              SecretString=json.dumps({
                                  'client_id': m2m_client_id,
                                  'client_secret': m2m_client_secret,
                                  'token_url': token_url
                              })
                          )
                          print('M2M client secret stored')
                      except Exception as e:
                          print(f'Warning: could not store M2M secret: {e}')

                  # Retrieve and store web app client secret
                  web_client_id = props.get('WebAppClientId')
                  web_secret_arn = props.get('WebAppClientSecretArn')
                  if web_client_id and web_secret_arn:
                      try:
                          resp = idp.describe_user_pool_client(
                              UserPoolId=pool_id, ClientId=web_client_id
                          )
                          web_client_secret = resp['UserPoolClient'].get('ClientSecret', '')
                          sm.update_secret(
                              SecretId=web_secret_arn,
                              SecretString=json.dumps({
                                  'client_id': web_client_id,
                                  'client_secret': web_client_secret
                              })
                          )
                          print('Web app client secret stored')
                      except Exception as e:
                          print(f'Warning: could not store web app client secret: {e}')

                  send_response(event, context, 'SUCCESS')
              except Exception as e:
                  print(f'Error: {e}')
                  send_response(event, context, 'FAILED', str(e))
      Tags:
        - Key: Name
          Value: ac-cognito-init
        - Key: Module
          Value: agentcore

  CognitoAdminInit:
    Type: Custom::CognitoInit
    DependsOn:
      - AdminPasswordSecret
    Properties:
      ServiceToken: !GetAtt CognitoInitLambda.Arn
      UserPoolId:
        Fn::ImportValue:
          Fn::Sub: ${EnvironmentName}-CognitoUserPoolId
      AdminGroupName: mcp-registry-admin
      AdminPasswordSecretArn: !Ref AdminPasswordSecret
      M2MClientId:
        Fn::ImportValue:
          Fn::Sub: ${EnvironmentName}-CognitoM2MClientId
      M2MClientSecretArn:
        Fn::ImportValue:
          Fn::Sub: ${EnvironmentName}-CognitoM2MClientSecretArn
      WebAppClientId:
        Fn::ImportValue:
          Fn::Sub: ${EnvironmentName}-CognitoWebAppClientId
      WebAppClientSecretArn:
        Fn::ImportValue:
          Fn::Sub: ${EnvironmentName}-CognitoWebAppClientSecretArn
      CognitoDomain:
        Fn::ImportValue:
          Fn::Sub: ${EnvironmentName}-CognitoDomain
      Version: '2.1'

  #============================================================================
  # 2. Persona IAM Roles (Registry access boundaries)
  #============================================================================

  RegistryAdminRole:
    Type: AWS::IAM::Role
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W11
            reason: >
              Scoping pattern applied: the policy is split into separate
              read-only and write statements with explicit Sids so the blast
              radius of each grant is visible, and every action is confined
              to the bedrock-agentcore service (no service wildcards). The
              Resource remains '*' because bedrock-agentcore registry,
              registry-record, policy-engine, and workload-identity IDs are
              generated by the service at runtime (participants create them
              live during Module 3b), so resource-level ARNs cannot be
              pre-declared in the template; most bedrock-agentcore control
              APIs do not support resource-level scoping for Create*/List*
              calls. Workshop Studio SCP on the sandbox account is the outer
              boundary (self-hosted: dedicated disposable account + optional
              static/cfn/self-service-scp.json). This role is deliberately
              separate from RegistryPublisherRole below to demonstrate
              separation-of-duties for participants.
    Properties:
      RoleName: !Sub 'workshop-ac-registry-admin-${AWS::Region}'
      Description: Admin persona - full CRUD and approval on AgentCore Registry
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:root
            Action: sts:AssumeRole
      Policies:
        - PolicyName: RegistryAdminPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Read-only: list/get/search across registry, identity, policy,
              # and credential-provider resources. Resource stays '*' because
              # IDs are runtime-generated (see cfn_nag W11 reason above).
              - Sid: AgentCoreReadOnly
                Effect: Allow
                Action:
                  - bedrock-agentcore:ListRegistries
                  - bedrock-agentcore:GetRegistry
                  - bedrock-agentcore:ListRegistryRecords
                  - bedrock-agentcore:GetRegistryRecord
                  - bedrock-agentcore:SearchRegistryRecords
                  - bedrock-agentcore:GetWorkloadIdentity
                  - bedrock-agentcore:ListWorkloadIdentities
                  - bedrock-agentcore:GetPolicyEngine
                  - bedrock-agentcore:ListPolicyEngines
                  - bedrock-agentcore:GetPolicy
                  - bedrock-agentcore:ListPolicies
                  - bedrock-agentcore:GetOAuth2CredentialProvider
                  - bedrock-agentcore:ListOAuth2CredentialProviders
                Resource: '*'
              # Write: registry + record lifecycle including approval
              # (UpdateRegistryRecordStatus) — the admin-only capability.
              - Sid: RegistryWrite
                Effect: Allow
                Action:
                  - bedrock-agentcore:CreateRegistry
                  - bedrock-agentcore:UpdateRegistry
                  - bedrock-agentcore:DeleteRegistry
                  - bedrock-agentcore:CreateRegistryRecord
                  - bedrock-agentcore:UpdateRegistryRecord
                  - bedrock-agentcore:DeleteRegistryRecord
                  - bedrock-agentcore:SubmitRegistryRecordForApproval
                  - bedrock-agentcore:UpdateRegistryRecordStatus
                Resource: '*'
              # Write: workload identity + OAuth2 credential provider lifecycle.
              # WARNING: wildcard covers all providers in the account; in
              # production scope to specific provider/identity names.
              - Sid: IdentityWrite
                Effect: Allow
                Action:
                  - bedrock-agentcore:CreateWorkloadIdentity
                  - bedrock-agentcore:UpdateWorkloadIdentity
                  - bedrock-agentcore:DeleteWorkloadIdentity
                  - bedrock-agentcore:CreateOAuth2CredentialProvider
                  - bedrock-agentcore:DeleteOAuth2CredentialProvider
                Resource: '*'
              # Write: policy engine + Cedar policy lifecycle (Module 3b step 7).
              - Sid: PolicyEngineWrite
                Effect: Allow
                Action:
                  - bedrock-agentcore:CreatePolicyEngine
                  - bedrock-agentcore:DeletePolicyEngine
                  - bedrock-agentcore:CreatePolicy
                  - bedrock-agentcore:UpdatePolicy
                  - bedrock-agentcore:DeletePolicy
                Resource: '*'
              # Token exchange: read-style data-plane calls used by the
              # identity walkthrough; no mutation.
              - Sid: TokenExchange
                Effect: Allow
                Action:
                  - bedrock-agentcore:GetWorkloadAccessToken
                  - bedrock-agentcore:GetResourceOAuth2Token
                Resource: '*'
      Tags:
        - Key: Name
          Value: ac-registry-admin
        - Key: Module
          Value: agentcore

  RegistryPublisherRole:
    Type: AWS::IAM::Role
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W11
            reason: >
              Scoping pattern applied: read-only and write actions are split
              into separate Sid'd statements, all confined to the
              bedrock-agentcore service, and the write statement explicitly
              excludes approval (UpdateRegistryRecordStatus) — that is the
              separation-of-duties boundary vs RegistryAdminRole above. The
              Resource remains '*' because registry and registry-record IDs
              are generated by the service at runtime (participants create
              record names live during Module 3b), so resource ARNs cannot be
              pre-declared in the template. Workshop Studio SCP on the
              sandbox account is the outer boundary (self-hosted: dedicated
              disposable account + optional static/cfn/self-service-scp.json).
    Properties:
      RoleName: !Sub 'workshop-ac-registry-publisher-${AWS::Region}'
      Description: Publisher persona - create/update/submit tools but cannot approve
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:root
            Action: sts:AssumeRole
      Policies:
        - PolicyName: RegistryPublisherPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Read-only: discovery of registries and records. Resource stays
              # '*' because IDs are runtime-generated (see cfn_nag W11 above).
              - Sid: RegistryReadOnly
                Effect: Allow
                Action:
                  - bedrock-agentcore:ListRegistries
                  - bedrock-agentcore:GetRegistry
                  - bedrock-agentcore:ListRegistryRecords
                  - bedrock-agentcore:GetRegistryRecord
                  - bedrock-agentcore:SearchRegistryRecords
                Resource: '*'
              # Write: record lifecycle WITHOUT approval — publishers can
              # create/update/submit but cannot set APPROVED status.
              - Sid: RegistryRecordWriteNoApproval
                Effect: Allow
                Action:
                  - bedrock-agentcore:CreateRegistryRecord
                  - bedrock-agentcore:UpdateRegistryRecord
                  - bedrock-agentcore:DeleteRegistryRecord
                  - bedrock-agentcore:SubmitRegistryRecordForApproval
                Resource: '*'
      Tags:
        - Key: Name
          Value: ac-registry-publisher
        - Key: Module
          Value: agentcore

  RegistryConsumerRole:
    Type: AWS::IAM::Role
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W11
            reason: >
              Scoping pattern applied: this persona is read-only (List/Get/
              Search only — no mutating actions), confined to the
              bedrock-agentcore service. The Resource remains '*' because
              registry and record IDs are generated by the service at runtime
              and List*/Search* APIs do not support resource-level scoping.
    Properties:
      RoleName: !Sub 'workshop-ac-registry-consumer-${AWS::Region}'
      Description: Consumer persona - read-only and search on registry records
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:root
            Action: sts:AssumeRole
      Policies:
        - PolicyName: RegistryConsumerPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Read-only: no write statement exists for this persona.
              - Sid: RegistryReadOnly
                Effect: Allow
                Action:
                  - bedrock-agentcore:ListRegistries
                  - bedrock-agentcore:GetRegistry
                  - bedrock-agentcore:GetRegistryRecord
                  - bedrock-agentcore:ListRegistryRecords
                  - bedrock-agentcore:SearchRegistryRecords
                Resource: '*'
      Tags:
        - Key: Name
          Value: ac-registry-consumer
        - Key: Module
          Value: agentcore

  #============================================================================
  # 3. AgentCore Gateway IAM Role
  #============================================================================

  AgentCoreGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'workshop-ac-gateway-role-${AWS::Region}'
      Description: Role assumed by AgentCore Gateway for tool dispatch
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - bedrock.amazonaws.com
                - bedrock-agentcore.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambdaTools
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !Sub arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:workshop-*
                  - !Sub arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:agentcore-*
                  - !Sub arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:ac-*
        - PolicyName: PolicyEngineAttach
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Required so UpdateGateway can attach a policyEngineConfiguration.
              # The service assumes this role as GenesisPolicyEngineCheck and
              # transitively checks AuthorizeAction, PartiallyAuthorizeActions,
              # and GetPolicyEngine against both the gateway and the policy
              # engine in a single UpdateGateway call. Any missing grant
              # surfaces as AccessDeniedException at the user-facing API.
              - Effect: Allow
                Action:
                  - bedrock-agentcore:AuthorizeAction
                  - bedrock-agentcore:PartiallyAuthorizeActions
                Resource:
                  - !Sub arn:${AWS::Partition}:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:gateway/*
                  - !Sub arn:${AWS::Partition}:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:policy-engine/*
              - Effect: Allow
                Action:
                  - bedrock-agentcore:GetPolicyEngine
                Resource:
                  - !Sub arn:${AWS::Partition}:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:policy-engine/*
      Tags:
        - Key: Name
          Value: ac-gateway-role
        - Key: Module
          Value: agentcore

  #============================================================================
  # 5. Interceptor Lambdas
  #============================================================================

  #--------------------------------------------------------------------------
  # Request Interceptor
  #--------------------------------------------------------------------------

  RequestInterceptorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/ac-gateway-request-interceptor
      RetentionInDays: 7

  RequestInterceptorRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'workshop-ac-request-interceptor-role-${AWS::Region}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Tags:
        - Key: Name
          Value: ac-request-interceptor-role
        - Key: Module
          Value: agentcore

  RequestInterceptorLambda:
    Type: AWS::Lambda::Function
    DependsOn: RequestInterceptorLogGroup
    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_115
            comment: "Inline workshop Lambda; reserved concurrency, DLQ, and VPC attachment add operational complexity without changing the threat model in a disposable workshop account"
          - id: CKV_AWS_116
            comment: "Inline workshop Lambda; reserved concurrency, DLQ, and VPC attachment add operational complexity without changing the threat model in a disposable workshop account"
          - id: CKV_AWS_117
            comment: "Inline workshop Lambda; calls only AWS control-plane APIs, no VPC-bound resources"
    Properties:
      FunctionName: ac-gateway-request-interceptor
      Description: Audit logging + group-based access control for tool invocations
      Runtime: python3.12
      Handler: index.request_interceptor_handler
      Role: !GetAtt RequestInterceptorRole.Arn
      MemorySize: 256
      Timeout: 10
      Environment:
        Variables:
          AUDIT_TABLE_NAME: ''
          TOOL_ACCESS_POLICY: '{"_default":["*"],"gateway-admins":["*"],"gateway-developers":["*flights*","*hotels*","*knowledge*","search_flights","get_flight_details","search_flights_by_budget","search_hotels","get_hotel_details","search_hotels_by_budget","search-knowledge-base"]}'
          LOG_LEVEL: INFO
      Code:
        ZipFile: |
          # Copyright Amazon.com, Inc. or its affiliates. All Rights Reserved.
          # SPDX-License-Identifier: Apache-2.0
          """AgentCore Gateway interceptor Lambda handlers."""
          import base64
          import fnmatch
          import json
          import logging
          import os
          import uuid
          from datetime import datetime, timezone

          import boto3

          logger = logging.getLogger(__name__)
          logger.setLevel(os.environ.get("LOG_LEVEL", "INFO"))

          AUDIT_TABLE_NAME = os.environ.get("AUDIT_TABLE_NAME", "")
          # AWS_REGION is always set by the Lambda runtime; AWS_DEFAULT_REGION
          # is the documented fallback. No region literal needed.
          AWS_REGION = os.environ.get("AWS_REGION") or os.environ.get("AWS_DEFAULT_REGION", "")
          BEDROCK_GUARDRAIL_ID = os.environ.get("BEDROCK_GUARDRAIL_ID", "")
          BEDROCK_GUARDRAIL_VERSION = os.environ.get("BEDROCK_GUARDRAIL_VERSION", "DRAFT")
          TOOL_ACCESS_POLICY = os.environ.get("TOOL_ACCESS_POLICY", "")

          _INTERNAL_FIELDS = {"gatewayTargetId", "embedding", "securityScanResult", "healthCheckMessage", "lastHealthCheck", "createdBy"}

          def _decode_jwt_payload(token):
              """Extract JWT claims without signature verification.

              The Gateway's CUSTOM_JWT authorizer validates the token signature
              via the Cognito OIDC discovery URL before the interceptor runs.
              This function only extracts claims from an already-validated token.
              """
              try:
                  parts = token.split(".")
                  if len(parts) < 2:
                      return {}
                  payload = parts[1]
                  payload += "=" * (4 - len(payload) % 4)
                  decoded = base64.urlsafe_b64decode(payload)
                  return json.loads(decoded)
              except Exception:
                  return {}

          def _extract_actor(headers):
              auth = headers.get("Authorization", headers.get("authorization", ""))
              if not auth.startswith("Bearer "):
                  return "unknown"
              claims = _decode_jwt_payload(auth[7:])
              return claims.get("sub", claims.get("client_id", "unknown"))

          def _extract_caller_groups(headers):
              auth = headers.get("Authorization", headers.get("authorization", ""))
              if not auth.startswith("Bearer "):
                  return []
              claims = _decode_jwt_payload(auth[7:])
              groups = claims.get("cognito:groups", [])
              return groups if isinstance(groups, list) else []

          def _load_access_policy():
              if not TOOL_ACCESS_POLICY:
                  return {}
              try:
                  policy = json.loads(TOOL_ACCESS_POLICY)
                  return policy if isinstance(policy, dict) else {}
              except (json.JSONDecodeError, TypeError):
                  logger.warning("Invalid TOOL_ACCESS_POLICY, allowing all access")
                  return {}

          def _is_tool_allowed(tool_name, caller_groups, policy):
              if not policy:
                  return True
              for group in caller_groups:
                  for pattern in policy.get(group, []):
                      if fnmatch.fnmatch(tool_name, pattern):
                          return True
              # Fallback: M2M clients have no cognito:groups — check _default
              if not caller_groups:
                  for pattern in policy.get("_default", []):
                      if fnmatch.fnmatch(tool_name, pattern):
                          return True
              return False

          def _extract_request(event):
              if "mcp" in event and "gatewayRequest" in event.get("mcp", {}):
                  req = event["mcp"]["gatewayRequest"]
                  return req.get("headers", {}), req.get("body", {})
              return event.get("headers", {}), event.get("body", {})

          def _extract_response(event):
              if "mcp" in event and "gatewayResponse" in event.get("mcp", {}):
                  resp = event["mcp"]["gatewayResponse"]
                  return resp.get("headers", {}), resp.get("body", {})
              return event.get("headers", {}), event.get("body", {})

          def _parse_body(body):
              if isinstance(body, str):
                  try:
                      return json.loads(body)
                  except (json.JSONDecodeError, TypeError):
                      return {}
              if isinstance(body, dict):
                  return body
              return {}

          def request_interceptor_handler(event, context):
              headers, raw_body = _extract_request(event)
              body = _parse_body(raw_body)
              method = body.get("method", "")
              policy = _load_access_policy()
              if method in ("tools/call", "tools/list"):
                  actor = _extract_actor(headers)
                  tool_name = body.get("params", {}).get("name", "") if method == "tools/call" else ""
                  request_id = getattr(context, "aws_request_id", str(uuid.uuid4()))
                  audit_entry = {
                      "audit": True,
                      "request_id": request_id,
                      "method": method,
                      "tool_name": tool_name,
                      "client_id": actor,
                      "timestamp": datetime.now(timezone.utc).isoformat(),
                  }
                  logger.info(json.dumps(audit_entry))
                  if AUDIT_TABLE_NAME:
                      try:
                          dynamo = boto3.resource("dynamodb", region_name=AWS_REGION)
                          table = dynamo.Table(AUDIT_TABLE_NAME)
                          table.put_item(Item={
                              "toolId": f"gateway:{tool_name}" if tool_name else "gateway:list",
                              "eventId": str(uuid.uuid4()),
                              "action": "GATEWAY_TOOLS_CALL" if method == "tools/call" else "GATEWAY_TOOLS_LIST",
                              "actor": actor, "timestamp": audit_entry["timestamp"],
                              "method": method, "toolName": tool_name,
                          })
                      except Exception as e:
                          logger.warning("Audit log write failed (non-fatal): %s", type(e).__name__)
              if method == "tools/call" and policy:
                  tool_name = body.get("params", {}).get("name", "")
                  caller_groups = _extract_caller_groups(headers)
                  if not _is_tool_allowed(tool_name, caller_groups, policy):
                      logger.warning("Access denied: groups=%s tool=%s", caller_groups, tool_name)
                      return {
                          "interceptorOutputVersion": "1.0",
                          "mcp": {"transformedGatewayRequest": {"headers": headers, "body": {
                              "jsonrpc": "2.0", "id": body.get("id", ""),
                              "error": {"code": -32600, "message": f"Access denied: your team does not have permission to call '{tool_name}'"},
                          }}},
                      }
              return {"interceptorOutputVersion": "1.0", "mcp": {"transformedGatewayRequest": {"headers": headers, "body": body}}}
      Tags:
        - Key: Name
          Value: ac-gateway-request-interceptor
        - Key: Module
          Value: agentcore

  # NOTE on LAMBDA_FUNCTION_PUBLIC_ACCESS_PROHIBITED (cfn-guard): every
  # AWS::Lambda::Permission in this template grants a specific AWS service
  # principal (bedrock-agentcore.amazonaws.com / events.amazonaws.com) and
  # pins SourceArn to an ARN in this account (${AWS::AccountId}), so no
  # cross-account or public invocation is possible. The cfn-guard rule
  # mis-compares service-principal permissions against the layer-permission
  # rule shape; these findings are false positives for
  # service-principal + SourceArn permissions.
  RequestInterceptorInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref RequestInterceptorLambda
      Action: lambda:InvokeFunction
      Principal: bedrock-agentcore.amazonaws.com
      SourceArn: !Sub arn:${AWS::Partition}:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:gateway/*

  #--------------------------------------------------------------------------
  # Response Interceptor
  #--------------------------------------------------------------------------

  ResponseInterceptorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/ac-gateway-response-interceptor
      RetentionInDays: 7

  ResponseInterceptorRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'workshop-ac-response-interceptor-role-${AWS::Region}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: BedrockGuardrails
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Scoped to guardrail/* in this account/region (not '*'): the
              # guardrail ID is created by participants in a notebook, so the
              # wildcard is on the runtime-generated ID segment only.
              - Sid: ApplyGuardrailOnly
                Effect: Allow
                Action:
                  - bedrock:ApplyGuardrail
                Resource:
                  - !Sub arn:${AWS::Partition}:bedrock:${AWS::Region}:${AWS::AccountId}:guardrail/*
      Tags:
        - Key: Name
          Value: ac-response-interceptor-role
        - Key: Module
          Value: agentcore

  ResponseInterceptorLambda:
    Type: AWS::Lambda::Function
    DependsOn: ResponseInterceptorLogGroup
    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_115
            comment: "Inline workshop Lambda; reserved concurrency, DLQ, and VPC attachment add operational complexity without changing the threat model in a disposable workshop account"
          - id: CKV_AWS_116
            comment: "Inline workshop Lambda; reserved concurrency, DLQ, and VPC attachment add operational complexity without changing the threat model in a disposable workshop account"
          - id: CKV_AWS_117
            comment: "Inline workshop Lambda; calls only AWS control-plane APIs, no VPC-bound resources"
    Properties:
      FunctionName: ac-gateway-response-interceptor
      Description: Field sanitization + Bedrock Guardrails on tool output
      Runtime: python3.12
      Handler: index.response_interceptor_handler
      Role: !GetAtt ResponseInterceptorRole.Arn
      MemorySize: 256
      Timeout: 10
      Environment:
        Variables:
          BEDROCK_GUARDRAIL_ID: ''
          BEDROCK_GUARDRAIL_VERSION: DRAFT
          TOOL_ACCESS_POLICY: '{"_default":["*"],"gateway-admins":["*"],"gateway-developers":["*flights*","*hotels*","*knowledge*","search_flights","get_flight_details","search_flights_by_budget","search_hotels","get_hotel_details","search_hotels_by_budget","search-knowledge-base"]}'
          LOG_LEVEL: INFO
      Code:
        ZipFile: |
          # Copyright Amazon.com, Inc. or its affiliates. All Rights Reserved.
          # SPDX-License-Identifier: Apache-2.0
          """AgentCore Gateway response interceptor."""
          import base64
          import fnmatch
          import json
          import logging
          import os

          import boto3

          logger = logging.getLogger(__name__)

          BEDROCK_GUARDRAIL_ID = os.environ.get("BEDROCK_GUARDRAIL_ID", "")
          BEDROCK_GUARDRAIL_VERSION = os.environ.get("BEDROCK_GUARDRAIL_VERSION", "DRAFT")
          TOOL_ACCESS_POLICY = os.environ.get("TOOL_ACCESS_POLICY", "")
          # AWS_REGION is always set by the Lambda runtime; AWS_DEFAULT_REGION
          # is the documented fallback. No region literal needed.
          AWS_REGION = os.environ.get("AWS_REGION") or os.environ.get("AWS_DEFAULT_REGION", "")

          _INTERNAL_FIELDS = {"gatewayTargetId", "embedding", "securityScanResult", "healthCheckMessage", "lastHealthCheck", "createdBy"}

          def _decode_jwt_payload(token):
              """Extract JWT claims without signature verification.

              The Gateway's CUSTOM_JWT authorizer validates the token signature
              via the Cognito OIDC discovery URL before the interceptor runs.
              This function only extracts claims from an already-validated token.
              """
              try:
                  parts = token.split(".")
                  if len(parts) < 2:
                      return {}
                  payload = parts[1]
                  payload += "=" * (4 - len(payload) % 4)
                  return json.loads(base64.urlsafe_b64decode(payload))
              except Exception:
                  return {}

          def _extract_caller_groups(headers):
              auth = headers.get("Authorization", headers.get("authorization", ""))
              if not auth.startswith("Bearer "):
                  return []
              claims = _decode_jwt_payload(auth[7:])
              groups = claims.get("cognito:groups", [])
              return groups if isinstance(groups, list) else []

          def _load_access_policy():
              if not TOOL_ACCESS_POLICY:
                  return {}
              try:
                  policy = json.loads(TOOL_ACCESS_POLICY)
                  return policy if isinstance(policy, dict) else {}
              except (json.JSONDecodeError, TypeError):
                  return {}

          def _is_tool_allowed(tool_name, caller_groups, policy):
              if not policy:
                  return True
              for group in caller_groups:
                  for pattern in policy.get(group, []):
                      if fnmatch.fnmatch(tool_name, pattern):
                          return True
              # Fallback: M2M clients have no cognito:groups — check _default
              if not caller_groups:
                  for pattern in policy.get("_default", []):
                      if fnmatch.fnmatch(tool_name, pattern):
                          return True
              return False

          def _extract_response(event):
              if "mcp" in event and "gatewayResponse" in event.get("mcp", {}):
                  resp = event["mcp"]["gatewayResponse"]
                  return resp.get("headers", {}), resp.get("body", {})
              return event.get("headers", {}), event.get("body", {})

          def _parse_body(body):
              if isinstance(body, str):
                  try:
                      return json.loads(body)
                  except (json.JSONDecodeError, TypeError):
                      return {}
              return body if isinstance(body, dict) else {}

          def response_interceptor_handler(event, context):
              headers, raw_body = _extract_response(event)
              body = _parse_body(raw_body)

              req_headers = {}
              if "mcp" in event and "gatewayRequest" in event.get("mcp", {}):
                  req_headers = event["mcp"]["gatewayRequest"].get("headers", {})

              policy = _load_access_policy()
              caller_groups = _extract_caller_groups(req_headers)

              result = body.get("result", {})
              if isinstance(result, dict) and "tools" in result:
                  tools = result["tools"]
                  if policy and req_headers:
                      tools = [t for t in tools if _is_tool_allowed(t.get("name", ""), caller_groups, policy)]
                      result["tools"] = tools
                  for tool in tools:
                      for field in _INTERNAL_FIELDS:
                          tool.pop(field, None)

              if BEDROCK_GUARDRAIL_ID and isinstance(result, dict) and "content" in result:
                  content_items = result.get("content", [])
                  text_parts = [item.get("text", "") for item in content_items if isinstance(item, dict) and item.get("type") == "text"]
                  if text_parts:
                      combined_text = "\n".join(text_parts)
                      try:
                          bedrock = boto3.client("bedrock-runtime", region_name=AWS_REGION)
                          guardrail_resp = bedrock.apply_guardrail(
                              guardrailIdentifier=BEDROCK_GUARDRAIL_ID,
                              guardrailVersion=BEDROCK_GUARDRAIL_VERSION,
                              source="OUTPUT",
                              content=[{"text": {"text": combined_text}}],
                          )
                          if guardrail_resp.get("action") == "GUARDRAIL_INTERVENED":
                              blocked_text = guardrail_resp["outputs"][0]["text"]
                              for item in content_items:
                                  if isinstance(item, dict) and item.get("type") == "text":
                                      item["text"] = blocked_text
                      except Exception as e:
                          # DESIGN CHOICE: fail-open — guardrail errors pass tool output through.
                          # For fail-closed (compliance-first), replace this block with:
                          #   return {"interceptorOutputVersion": "1.0", "mcp": {"transformedGatewayResponse": {
                          #       "statusCode": 500, "headers": headers,
                          #       "body": {"jsonrpc": "2.0", "error": {"code": -32603, "message": "Guardrail check failed"}}}}}
                          logger.warning("Guardrail check failed (fail-open): %s", e)
                          try:
                              cw = boto3.client("cloudwatch", region_name=AWS_REGION)
                              cw.put_metric_data(Namespace="AgentCoreGateway", MetricData=[{"MetricName": "GuardrailFailure", "Value": 1, "Unit": "Count"}])
                          except Exception:
                              pass

              return {"interceptorOutputVersion": "1.0", "mcp": {"transformedGatewayResponse": {"statusCode": 200, "headers": headers, "body": body}}}
      Tags:
        - Key: Name
          Value: ac-gateway-response-interceptor
        - Key: Module
          Value: agentcore

  ResponseInterceptorInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ResponseInterceptorLambda
      Action: lambda:InvokeFunction
      Principal: bedrock-agentcore.amazonaws.com
      SourceArn: !Sub arn:${AWS::Partition}:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:gateway/*

  #============================================================================
  # 6. AgentCore Gateway
  #============================================================================

  AgentCoreGateway:
    Type: AWS::BedrockAgentCore::Gateway
    Properties:
      Name: ac-tools-gateway
      Description: AgentCore Gateway for workshop tool invocations
      RoleArn: !GetAtt AgentCoreGatewayRole.Arn
      ProtocolType: MCP
      AuthorizerType: CUSTOM_JWT
      AuthorizerConfiguration:
        CustomJWTAuthorizer:
          DiscoveryUrl:
            Fn::Sub:
              - https://cognito-idp.${AWS::Region}.amazonaws.com/${PoolId}/.well-known/openid-configuration
              - PoolId:
                  Fn::ImportValue:
                    Fn::Sub: ${EnvironmentName}-CognitoUserPoolId
          AllowedClients:
            - Fn::ImportValue:
                Fn::Sub: ${EnvironmentName}-CognitoM2MClientId
      InterceptorConfigurations:
        - Interceptor:
            Lambda:
              Arn: !GetAtt RequestInterceptorLambda.Arn
          InterceptionPoints:
            - REQUEST
          InputConfiguration:
            PassRequestHeaders: true
        - Interceptor:
            Lambda:
              Arn: !GetAtt ResponseInterceptorLambda.Arn
          InterceptionPoints:
            - RESPONSE
          InputConfiguration:
            PassRequestHeaders: true

  #============================================================================
  # 7. Gateway Targets
  #============================================================================

  # Requires: workshop-tools-gateway-stack deployed first (consumes !ImportValue workshop-FlightsMcpLambdaArn)
  FlightsGatewayTarget:
    Type: AWS::BedrockAgentCore::GatewayTarget
    DependsOn: AgentCoreGateway
    Properties:
      GatewayIdentifier: !GetAtt AgentCoreGateway.GatewayIdentifier
      Name: tg-workshop-flights-mcp
      TargetConfiguration:
        Mcp:
          Lambda:
            LambdaArn: !ImportValue workshop-FlightsMcpLambdaArn
            ToolSchema:
              InlinePayload:
                - Name: search_flights
                  Description: "Search for available flights between two airports on a given date. Returns matching flights with pricing and schedule details."
                  InputSchema:
                    Type: object
                    Properties:
                      origin:
                        Type: string
                        Description: "Origin airport code (e.g., SFO, JFK, LAX)"
                      destination:
                        Type: string
                        Description: "Destination airport code (e.g., JFK, ORD, MIA)"
                      date:
                        Type: string
                        Description: "Travel date in YYYY-MM-DD format"
                      max_results:
                        Type: integer
                        Description: "Maximum number of results to return (default: 5)"
                    Required:
                      - origin
                      - destination
                      - date
                - Name: get_flight_details
                  Description: "Get detailed information about a specific flight by its flight ID."
                  InputSchema:
                    Type: object
                    Properties:
                      flight_id:
                        Type: string
                        Description: "The flight identifier (e.g., FL-1001)"
                    Required:
                      - flight_id
                - Name: search_flights_by_budget
                  Description: "Search for flights within a price budget between two airports. Optionally filter by date."
                  InputSchema:
                    Type: object
                    Properties:
                      origin:
                        Type: string
                        Description: "Origin airport code (e.g., SFO, JFK, LAX)"
                      destination:
                        Type: string
                        Description: "Destination airport code (e.g., JFK, ORD, MIA)"
                      max_price:
                        Type: number
                        Description: "Maximum price in USD"
                      date:
                        Type: string
                        Description: "Optional travel date in YYYY-MM-DD format"
                    Required:
                      - origin
                      - destination
                      - max_price
      CredentialProviderConfigurations:
        - CredentialProviderType: GATEWAY_IAM_ROLE

  # Requires: workshop-tools-gateway-stack deployed first (consumes !ImportValue workshop-HotelsMcpLambdaArn)
  HotelsGatewayTarget:
    Type: AWS::BedrockAgentCore::GatewayTarget
    DependsOn: AgentCoreGateway
    Properties:
      GatewayIdentifier: !GetAtt AgentCoreGateway.GatewayIdentifier
      Name: tg-workshop-hotels-mcp
      TargetConfiguration:
        Mcp:
          Lambda:
            LambdaArn: !ImportValue workshop-HotelsMcpLambdaArn
            ToolSchema:
              InlinePayload:
                - Name: search_hotels
                  Description: "Search for available hotels in a city for given check-in and check-out dates. Returns matching hotels with pricing and amenity details."
                  InputSchema:
                    Type: object
                    Properties:
                      city:
                        Type: string
                        Description: "City name (e.g., San Francisco, New York, Chicago)"
                      check_in:
                        Type: string
                        Description: "Check-in date in YYYY-MM-DD format"
                      check_out:
                        Type: string
                        Description: "Check-out date in YYYY-MM-DD format"
                      max_results:
                        Type: integer
                        Description: "Maximum number of results to return (default: 5)"
                    Required:
                      - city
                      - check_in
                      - check_out
                - Name: get_hotel_details
                  Description: "Get detailed information about a specific hotel by its hotel ID."
                  InputSchema:
                    Type: object
                    Properties:
                      hotel_id:
                        Type: string
                        Description: "The hotel identifier (e.g., HT-2001)"
                    Required:
                      - hotel_id
                - Name: search_hotels_by_budget
                  Description: "Search for hotels in a city within a nightly price budget. Optionally filter by check-in and check-out dates."
                  InputSchema:
                    Type: object
                    Properties:
                      city:
                        Type: string
                        Description: "City name (e.g., San Francisco, New York, Chicago)"
                      max_price_per_night:
                        Type: number
                        Description: "Maximum price per night in USD"
                      check_in:
                        Type: string
                        Description: "Optional check-in date in YYYY-MM-DD format"
                      check_out:
                        Type: string
                        Description: "Optional check-out date in YYYY-MM-DD format"
                    Required:
                      - city
                      - max_price_per_night
      CredentialProviderConfigurations:
        - CredentialProviderType: GATEWAY_IAM_ROLE

  # Requires: workshop-tools-gateway-stack deployed first (consumes !ImportValue agentcore-gateway-DemoToolLambdaArn)
  SearchKBGatewayTarget:
    Type: AWS::BedrockAgentCore::GatewayTarget
    DependsOn: AgentCoreGateway
    Properties:
      GatewayIdentifier: !GetAtt AgentCoreGateway.GatewayIdentifier
      Name: tg-workshop-kb-search
      TargetConfiguration:
        Mcp:
          Lambda:
            LambdaArn: !ImportValue agentcore-gateway-DemoToolLambdaArn
            ToolSchema:
              InlinePayload:
                - Name: search-knowledge-base
                  Description: "Search the enterprise knowledge base for relevant information. Returns matching documents based on keyword relevance."
                  InputSchema:
                    Type: object
                    Properties:
                      query:
                        Type: string
                        Description: "Search query (keywords or natural language)"
                      max_results:
                        Type: integer
                        Description: "Maximum number of results to return (default: 3)"
                    Required:
                      - query
      CredentialProviderConfigurations:
        - CredentialProviderType: GATEWAY_IAM_ROLE

  #============================================================================
  # 8. WorkloadIdentity
  #============================================================================

  WorkloadIdentity:
    Type: AWS::BedrockAgentCore::WorkloadIdentity
    Properties:
      Name: ac-agent-identity

  #============================================================================
  # 8b. Boto3 Lambda Layer (required for bedrock-agentcore-control SDK)
  #============================================================================
  # The Lambda python3.12 runtime ships with an older boto3 that does not
  # include the bedrock-agentcore-control service. This layer provides
  # a newer boto3 so the auto-review and sync Lambdas can call Registry
  # and Gateway APIs. When the Boto3LayerBucket parameter is empty, the
  # layer is not created and those Lambdas use the runtime's built-in SDK.

  Boto3LambdaLayer:
    Type: AWS::Lambda::LayerVersion
    Condition: HasBoto3Layer
    Properties:
      LayerName: ac-boto3-layer
      Description: Latest boto3/botocore for bedrock-agentcore-control API support
      CompatibleRuntimes:
        - python3.12
      Content:
        S3Bucket: !Ref Boto3LayerBucket
        S3Key: !Ref Boto3LayerKey

  #============================================================================
  # 9. EventBridge Auto-Review (Registry approval automation)
  #============================================================================

  AutoReviewLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'workshop-ac-auto-review-role-${AWS::Region}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: RegistryApproval
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Scoped to registry/* in this account/region. The registry ID
              # itself is generated at runtime (participants create it during
              # Module 3b), so a tighter per-registry ARN is not possible.
              - Sid: RegistryRecordRead
                Effect: Allow
                Action:
                  - bedrock-agentcore:GetRegistryRecord
                  - bedrock-agentcore:ListRegistryRecords
                Resource:
                  - !Sub arn:${AWS::Partition}:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:registry/*
              # Write: status transitions only — this Lambda's single job.
              - Sid: RegistryRecordStatusWrite
                Effect: Allow
                Action:
                  - bedrock-agentcore:UpdateRegistryRecordStatus
                Resource:
                  - !Sub arn:${AWS::Partition}:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:registry/*
      Tags:
        - Key: Name
          Value: ac-auto-review-role
        - Key: Module
          Value: agentcore

  AutoReviewLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/ac-auto-review
      RetentionInDays: 7

  AutoReviewLambda:
    Type: AWS::Lambda::Function
    DependsOn: AutoReviewLogGroup
    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_115
            comment: "Inline workshop Lambda; reserved concurrency, DLQ, and VPC attachment add operational complexity without changing the threat model in a disposable workshop account"
          - id: CKV_AWS_116
            comment: "Inline workshop Lambda; reserved concurrency, DLQ, and VPC attachment add operational complexity without changing the threat model in a disposable workshop account"
          - id: CKV_AWS_117
            comment: "Inline workshop Lambda; calls only AWS control-plane APIs, no VPC-bound resources"
    Properties:
      FunctionName: ac-auto-review
      Description: EventBridge-triggered Lambda that auto-reviews registry records
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt AutoReviewLambdaRole.Arn
      Layers: !If
        - HasBoto3Layer
        - [!Ref Boto3LambdaLayer]
        - !Ref AWS::NoValue
      MemorySize: 256
      Timeout: 30
      Environment:
        Variables:
          AUTO_APPROVE: 'false'
          LOG_LEVEL: INFO
      Code:
        ZipFile: |
          """Auto-review Lambda for Registry EventBridge events.

          Calls bedrock-agentcore-control via SigV4-signed HTTP so this works
          regardless of whether the bundled boto3 has the registry-record
          operations modeled. EventBridge only fires on PENDING_APPROVAL so
          the event itself is an authoritative trigger.

          Set AUTO_APPROVE=true to auto-approve records (dry-run by default).
          Sentinel: ac-auto-review-raw-http-v1
          """
          import json
          import logging
          import os
          import urllib.request

          import boto3
          from botocore.auth import SigV4Auth
          from botocore.awsrequest import AWSRequest

          logger = logging.getLogger(__name__)
          logger.setLevel(os.environ.get("LOG_LEVEL", "INFO"))

          AUTO_APPROVE = os.environ.get("AUTO_APPROVE", "false").lower() == "true"
          # AWS_REGION is always set by the Lambda runtime. No region literal needed.
          REGION = os.environ.get("AWS_REGION") or os.environ.get("AWS_DEFAULT_REGION") or ""
          SERVICE = "bedrock-agentcore"
          HOST = f"bedrock-agentcore-control.{REGION}.amazonaws.com"

          _session = boto3.session.Session()
          _creds = _session.get_credentials()


          def _signed_request(method, path, body=None):
              url = f"https://{HOST}{path}"
              body_bytes = json.dumps(body).encode("utf-8") if body is not None else b""
              headers = {"Content-Type": "application/json", "Host": HOST}
              req = AWSRequest(method=method, url=url, data=body_bytes, headers=headers)
              SigV4Auth(_creds, SERVICE, REGION).add_auth(req)
              prepared = urllib.request.Request(url, data=body_bytes, method=method)
              for k, v in req.headers.items():
                  prepared.add_header(k, v)
              try:
                  with urllib.request.urlopen(prepared, timeout=10) as resp:
                      return resp.status, resp.read().decode("utf-8")
              except urllib.error.HTTPError as e:
                  return e.code, e.read().decode("utf-8", errors="replace")


          def handler(event, context):
              logger.info("Event: source=%s, detail-type=%s", event.get('source',''), event.get('detail-type',''))

              detail = event.get("detail", {})
              registry_id = detail.get("registryId", "")
              # EventBridge emits `registryRecordId`; accept `recordId` too for compat.
              record_id = detail.get("registryRecordId") or detail.get("recordId", "")
              record_name = detail.get("recordName", "unknown")

              if not registry_id or not record_id:
                  logger.warning("Missing registryId or recordId in event")
                  return {"status": "SKIP", "reason": "missing IDs"}

              if not AUTO_APPROVE:
                  logger.info("AUTO_APPROVE is off — dry-run only (record=%s)", record_id)
                  return {"status": "NEEDS_REVIEW", "record": record_name}

              path = f"/registries/{registry_id}/records/{record_id}/status"
              body = {"status": "APPROVED", "statusReason": "Auto-approved by EventBridge review Lambda"}
              code, text = _signed_request("PATCH", path, body)
              if 200 <= code < 300:
                  logger.info("Auto-approved record: %s (HTTP %s)", record_id, code)
                  return {"status": "APPROVED", "record": record_name}
              logger.error("Auto-approve failed: HTTP %s %s", code, text)
              return {"status": "ERROR", "httpStatus": code, "body": text}
      Tags:
        - Key: Name
          Value: ac-auto-review
        - Key: Module
          Value: agentcore

  AutoReviewLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AutoReviewLambda
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !Sub arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:rule/ac-registry-auto-review

  # EventBridge rule: Registry record PENDING_APPROVAL -> auto-review Lambda
  #
  # The detail-type string below is not in the AgentCore service
  # documentation; it was reverse-engineered from the AWS Labs sample
  # `agentcore-samples/01-tutorials/10-Agent-Registry/01-advanced/admin-approval-workflow/cfn_eventbridge.yaml`
  # at path `RegistryStateChangeRule`. An earlier iteration of this
  # stack used "Registry Record State Change" with a
  # `detail.status: [PENDING_APPROVAL]` filter; that never produced a
  # single invocation in live testing against us-west-2 sandbox
  # accounts. Swapping to the officially-published phrase below matches
  # what the service actually emits.
  RegistryAutoReviewRule:
    Type: AWS::Events::Rule
    Properties:
      Name: ac-registry-auto-review
      Description: Triggers auto-review Lambda when a registry record enters PENDING_APPROVAL
      State: ENABLED
      EventPattern:
        source:
          - aws.bedrock-agentcore
        detail-type:
          - "Registry Record State changed to Pending Approval"
      Targets:
        - Id: auto-review-lambda
          Arn: !GetAtt AutoReviewLambda.Arn

  #============================================================================
  # 10. Registry → Gateway Sync (approval-driven automation)
  #============================================================================

  RegistryGatewaySyncRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'workshop-ac-registry-gateway-sync-role-${AWS::Region}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: RegistryGatewaySync
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Read-only: fetch approved records. Scoped to registry/* in
              # this account/region; the registry ID is runtime-generated so
              # a tighter per-registry ARN is not possible.
              - Sid: RegistryRead
                Effect: Allow
                Action:
                  - bedrock-agentcore:GetRegistryRecord
                  - bedrock-agentcore:ListRegistryRecords
                  - bedrock-agentcore:SearchRegistryRecords
                Resource:
                  - !Sub arn:${AWS::Partition}:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:registry/*
              # Read-only: inspect existing gateway targets before syncing.
              - Sid: GatewayTargetRead
                Effect: Allow
                Action:
                  - bedrock-agentcore:GetGatewayTarget
                  - bedrock-agentcore:ListGatewayTargets
                Resource:
                  - !Sub arn:${AWS::Partition}:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:gateway/*
              # Write: target lifecycle. Scoped to gateway/* in this
              # account/region; the gateway ID is runtime-generated by
              # AWS::BedrockAgentCore::Gateway so it cannot be inlined here.
              - Sid: GatewayTargetWrite
                Effect: Allow
                Action:
                  - bedrock-agentcore:CreateGatewayTarget
                  - bedrock-agentcore:DeleteGatewayTarget
                Resource:
                  - !Sub arn:${AWS::Partition}:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:gateway/*
      Tags:
        - Key: Name
          Value: ac-registry-gateway-sync-role
        - Key: Module
          Value: agentcore

  RegistryGatewaySyncLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/ac-registry-gateway-sync
      RetentionInDays: 7

  RegistryGatewaySyncLambda:
    Type: AWS::Lambda::Function
    DependsOn: RegistryGatewaySyncLogGroup
    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_115
            comment: "Inline workshop Lambda; reserved concurrency, DLQ, and VPC attachment add operational complexity without changing the threat model in a disposable workshop account"
          - id: CKV_AWS_116
            comment: "Inline workshop Lambda; reserved concurrency, DLQ, and VPC attachment add operational complexity without changing the threat model in a disposable workshop account"
          - id: CKV_AWS_117
            comment: "Inline workshop Lambda; calls only AWS control-plane APIs, no VPC-bound resources"
    Properties:
      FunctionName: ac-registry-gateway-sync
      Description: >
        Syncs approved Registry records to AgentCore Gateway targets.
        Triggered by EventBridge when a record is APPROVED.
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt RegistryGatewaySyncRole.Arn
      Layers: !If
        - HasBoto3Layer
        - [!Ref Boto3LambdaLayer]
        - !Ref AWS::NoValue
      MemorySize: 256
      Timeout: 60
      Environment:
        Variables:
          GATEWAY_ID: !GetAtt AgentCoreGateway.GatewayIdentifier
          LOG_LEVEL: INFO
      Code:
        ZipFile: |
          """Registry → Gateway Sync Lambda.

          When a registry record is APPROVED, this Lambda:
          1. Fetches the full record from the Registry
          2. Extracts the MCP tool schema from the descriptor
          3. Creates (or updates) a corresponding Gateway target

          Only MCP-type records are synced. A2A and other types are logged and skipped.
          Static targets (created by CloudFormation) are never overwritten.
          """
          import json
          import logging
          import os

          import boto3

          logger = logging.getLogger(__name__)
          logger.setLevel(os.environ.get("LOG_LEVEL", "INFO"))

          GATEWAY_ID = os.environ.get("GATEWAY_ID", "")

          cp = boto3.client("bedrock-agentcore-control")


          # Static targets managed by CloudFormation — never overwrite
          STATIC_TARGETS = {
              "tg-workshop-flights-mcp",
              "tg-workshop-hotels-mcp",
              "tg-workshop-kb-search",
          }


          def _get_existing_targets():
              """List existing gateway target names."""
              targets = set()
              try:
                  paginator = cp.get_paginator("list_gateway_targets")
                  for page in paginator.paginate(gatewayIdentifier=GATEWAY_ID):
                      for t in page.get("gatewayTargets", []):
                          targets.add(t.get("name", ""))
              except Exception as e:
                  logger.warning("Failed to list targets: %s", e)
              return targets


          def _build_target_name(record_name):
              """Build a gateway target name from a registry record name."""
              return f"tg-{record_name}"


          def handler(event, context):
              logger.info("Event: source=%s, detail-type=%s", event.get('source',''), event.get('detail-type',''))

              detail = event.get("detail", {})
              registry_id = detail.get("registryId", "")
              # EventBridge emits `registryRecordId`; accept `recordId` too for compat.
              record_id = detail.get("registryRecordId") or detail.get("recordId", "")
              record_name = detail.get("recordName", "unknown")
              status = detail.get("status", "")

              if status != "APPROVED":
                  logger.info("Ignoring non-APPROVED event: status=%s", status)
                  return {"status": "SKIP", "reason": f"status is {status}"}

              if not registry_id or not record_id:
                  logger.warning("Missing registryId or recordId")
                  return {"status": "SKIP", "reason": "missing IDs"}

              if not GATEWAY_ID:
                  logger.error("GATEWAY_ID not configured")
                  return {"status": "ERROR", "reason": "no GATEWAY_ID"}

              # Fetch the full record
              try:
                  record = cp.get_registry_record(
                      registryId=registry_id, recordId=record_id
                  )
              except Exception as e:
                  logger.error("Failed to get record %s: %s", record_id, e)
                  return {"status": "ERROR", "reason": str(e)}

              descriptor_type = record.get("descriptorType", "")
              if descriptor_type != "MCP":
                  logger.info(
                      "Skipping non-MCP record: name=%s type=%s", record_name, descriptor_type
                  )
                  return {"status": "SKIP", "reason": f"type is {descriptor_type}"}

              target_name = _build_target_name(record_name)

              # Never overwrite CloudFormation-managed targets
              if target_name in STATIC_TARGETS:
                  logger.info("Skipping static target: %s", target_name)
                  return {"status": "SKIP", "reason": "static CFN target"}

              # Check if target already exists
              existing = _get_existing_targets()
              if target_name in existing:
                  logger.info("Target already exists: %s", target_name)
                  return {"status": "EXISTS", "target": target_name}

              # Extract MCP descriptor — we need a URL or Lambda ARN
              descriptors = record.get("descriptors", {})
              mcp = descriptors.get("mcp", {})

              # For URL-based sync, the record contains the endpoint URL
              endpoint_url = ""
              tools_descriptor = mcp.get("tools", {})
              server_url = mcp.get("serverUrl", "")

              if not server_url:
                  logger.warning(
                      "Record %s has no serverUrl — cannot create URL-based target",
                      record_name,
                  )
                  return {
                      "status": "SKIP",
                      "reason": "no serverUrl in MCP descriptor",
                  }

              # Build the tool schema from the registry descriptor
              tool_schemas = []
              inline_tools = tools_descriptor if isinstance(tools_descriptor, list) else []
              for tool in inline_tools:
                  schema_entry = {
                      "name": tool.get("name", ""),
                      "description": tool.get("description", ""),
                  }
                  if "inputSchema" in tool:
                      schema_entry["inputSchema"] = tool["inputSchema"]
                  tool_schemas.append(schema_entry)

              try:
                  create_params = {
                      "gatewayIdentifier": GATEWAY_ID,
                      "name": target_name,
                      "targetConfiguration": {
                          "mcp": {
                              "openApiSseUrl": {
                                  "url": server_url,
                              },
                          },
                      },
                      "credentialProviderConfigurations": [
                          {"credentialProviderType": "GATEWAY_IAM_ROLE"}
                      ],
                  }

                  # Add tool schema if we have tools
                  if tool_schemas:
                      create_params["targetConfiguration"]["mcp"]["openApiSseUrl"][
                          "toolSchema"
                      ] = {"inlinePayload": tool_schemas}

                  result = cp.create_gateway_target(**create_params)
                  logger.info(
                      "Created gateway target: name=%s id=%s",
                      target_name,
                      result.get("gatewayTargetId", ""),
                  )
                  return {
                      "status": "CREATED",
                      "target": target_name,
                      "targetId": result.get("gatewayTargetId", ""),
                  }
              except Exception as e:
                  logger.error("Failed to create target %s: %s", target_name, e)
                  return {"status": "ERROR", "reason": str(e)}
      Tags:
        - Key: Name
          Value: ac-registry-gateway-sync
        - Key: Module
          Value: agentcore

  RegistryGatewaySyncPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref RegistryGatewaySyncLambda
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt RegistryApprovedRule.Arn

  # EventBridge rule: Registry record APPROVED → sync to Gateway
  RegistryApprovedRule:
    Type: AWS::Events::Rule
    Properties:
      Name: ac-registry-approved-sync
      Description: Syncs approved registry records to AgentCore Gateway targets
      State: ENABLED
      EventPattern:
        source:
          - aws.bedrock-agentcore
        detail-type:
          - Registry Record State Change
        detail:
          status:
            - APPROVED
      Targets:
        - Id: registry-gateway-sync
          Arn: !GetAtt RegistryGatewaySyncLambda.Arn

  #============================================================================
  # 11. Outputs & Exports
  #============================================================================

Outputs:

  GatewayId:
    Description: AgentCore Gateway ID
    Value: !GetAtt AgentCoreGateway.GatewayIdentifier
    Export:
      Name: ac-GatewayId

  GatewayUrl:
    Description: AgentCore Gateway MCP endpoint URL
    Value: !Sub https://${AgentCoreGateway.GatewayIdentifier}.gateway.bedrock-agentcore.${AWS::Region}.amazonaws.com/mcp
    Export:
      Name: ac-GatewayUrl

  WorkloadIdentityArn:
    Description: WorkloadIdentity ARN for workshop agents
    Value: !GetAtt WorkloadIdentity.WorkloadIdentityArn
    Export:
      Name: ac-WorkloadIdentityArn

  WorkloadIdentityName:
    Description: WorkloadIdentity name for token exchange
    Value: ac-agent-identity
    Export:
      Name: ac-WorkloadIdentityName

  RegistryAdminRoleArn:
    Description: Registry Admin persona role ARN
    Value: !GetAtt RegistryAdminRole.Arn
    Export:
      Name: ac-RegistryAdminRoleArn

  RegistryPublisherRoleArn:
    Description: Registry Publisher persona role ARN
    Value: !GetAtt RegistryPublisherRole.Arn
    Export:
      Name: ac-RegistryPublisherRoleArn

  RegistryConsumerRoleArn:
    Description: Registry Consumer persona role ARN
    Value: !GetAtt RegistryConsumerRole.Arn
    Export:
      Name: ac-RegistryConsumerRoleArn

  GatewayRoleArn:
    Description: IAM Role ARN for AgentCore Gateway
    Value: !GetAtt AgentCoreGatewayRole.Arn
    Export:
      Name: ac-GatewayRoleArn

  RequestInterceptorArn:
    Description: Request Interceptor Lambda ARN
    Value: !GetAtt RequestInterceptorLambda.Arn
    Export:
      Name: ac-RequestInterceptorArn

  ResponseInterceptorArn:
    Description: Response Interceptor Lambda ARN
    Value: !GetAtt ResponseInterceptorLambda.Arn
    Export:
      Name: ac-ResponseInterceptorArn

  AutoReviewLambdaArn:
    Description: Auto-review Lambda ARN (EventBridge target)
    Value: !GetAtt AutoReviewLambda.Arn
    Export:
      Name: ac-AutoReviewLambdaArn

  AdminPasswordSecretArn:
    Description: Admin password secret ARN
    Value: !Ref AdminPasswordSecret
    Export:
      Name: ac-AdminPasswordSecretArn
