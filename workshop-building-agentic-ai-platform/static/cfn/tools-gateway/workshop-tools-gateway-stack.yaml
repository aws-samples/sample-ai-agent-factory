    Type: AWS::Lambda::Url
    Properties:
      TargetFunctionArn: !Ref OrderProcessingAgentLambda
      AuthType: AWS_IAM

  OrderProcessingAgentFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref OrderProcessingAgentLambda
      Action: lambda:InvokeFunctionUrl
      Principal: !Sub '${AWS::AccountId}'
      FunctionUrlAuthType: AWS_IAM

