      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-request-interceptor-role

  RequestInterceptorLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Delete
    Properties:
      LogGroupName: /aws/lambda/agentcore-gateway-request-interceptor
      RetentionInDays: 7

  RequestInterceptorLambda:
    Type: AWS::Lambda::Function
    DependsOn: RequestInterceptorLogGroup
    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_115
            comment: "Inline workshop Lambda; reserved concurrency, DLQ, and VPC attachment add operational complexity without changing the threat model in a disposable workshop account"
          - id: CKV_AWS_116
            comment: "Inline workshop Lambda; reserved concurrency, DLQ, and VPC attachment add operational complexity without changing the threat model in a disposable workshop account"
          - id: CKV_AWS_117
            comment: "Inline workshop Lambda; calls only AWS control-plane APIs, no VPC-bound resources"
    Properties:
      FunctionName: agentcore-gateway-request-interceptor
      Description: Audit logging + group-based access control for tool invocations
      Runtime: python3.12
      Handler: index.request_interceptor_handler
      Role: !GetAtt RequestInterceptorRole.Arn
      MemorySize: 256
      Timeout: 10
      Environment:
        Variables:
          AUDIT_TABLE_NAME: ''  # Optional: set to DynamoDB table name for audit
          TOOL_ACCESS_POLICY: ''  # JSON: {"group": ["tool-pattern", ...]}
          LOG_LEVEL: INFO
      Code:
        ZipFile: |
          # Copyright Amazon.com, Inc. or its affiliates. All Rights Reserved.
          # SPDX-License-Identifier: Apache-2.0
          """AgentCore Gateway interceptor Lambda handlers."""
          import base64
          import fnmatch
          import json
          import logging
          import os
          import uuid
          from datetime import datetime, timezone

          import boto3

          logger = logging.getLogger(__name__)
          logger.setLevel(os.environ.get("LOG_LEVEL", "INFO"))

          AUDIT_TABLE_NAME = os.environ.get("AUDIT_TABLE_NAME", "")
          # AWS_REGION is always set by the Lambda runtime; AWS_DEFAULT_REGION
          # is the documented fallback. No region literal needed.
          AWS_REGION = os.environ.get("AWS_REGION") or os.environ.get("AWS_DEFAULT_REGION", "")
          BEDROCK_GUARDRAIL_ID = os.environ.get("BEDROCK_GUARDRAIL_ID", "")
          BEDROCK_GUARDRAIL_VERSION = os.environ.get("BEDROCK_GUARDRAIL_VERSION", "DRAFT")
          TOOL_ACCESS_POLICY = os.environ.get("TOOL_ACCESS_POLICY", "")

          _INTERNAL_FIELDS = {"gatewayTargetId", "embedding", "securityScanResult", "healthCheckMessage", "lastHealthCheck", "createdBy"}

          def _decode_jwt_payload(token):
              try:
                  parts = token.split(".")
                  if len(parts) < 2:
                      return {}
                  payload = parts[1]
                  payload += "=" * (4 - len(payload) % 4)
                  decoded = base64.urlsafe_b64decode(payload)
                  return json.loads(decoded)
              except Exception:
                  return {}

          def _extract_actor(headers):
              auth = headers.get("Authorization", headers.get("authorization", ""))
              if not auth.startswith("Bearer "):
                  return "unknown"
              claims = _decode_jwt_payload(auth[7:])
              return claims.get("sub", claims.get("client_id", "unknown"))

          def _extract_caller_groups(headers):
              auth = headers.get("Authorization", headers.get("authorization", ""))
              if not auth.startswith("Bearer "):
                  return []
              claims = _decode_jwt_payload(auth[7:])
              groups = claims.get("cognito:groups", [])
              return groups if isinstance(groups, list) else []

          def _load_access_policy():
              if not TOOL_ACCESS_POLICY:
                  return {}
              try:
                  policy = json.loads(TOOL_ACCESS_POLICY)
                  return policy if isinstance(policy, dict) else {}
              except (json.JSONDecodeError, TypeError):
                  logger.warning("Invalid TOOL_ACCESS_POLICY, allowing all access")
                  return {}

          def _is_tool_allowed(tool_name, caller_groups, policy):
              if not policy:
                  return True
              for group in caller_groups:
                  for pattern in policy.get(group, []):
                      if fnmatch.fnmatch(tool_name, pattern):
                          return True
              if not caller_groups:
                  for pattern in policy.get("_default", []):
                      if fnmatch.fnmatch(tool_name, pattern):
                          return True
              return False

          def _extract_request(event):
              if "mcp" in event and "gatewayRequest" in event.get("mcp", {}):
                  req = event["mcp"]["gatewayRequest"]
                  return req.get("headers", {}), req.get("body", {})
              return event.get("headers", {}), event.get("body", {})

          def _extract_response(event):
              if "mcp" in event and "gatewayResponse" in event.get("mcp", {}):
                  resp = event["mcp"]["gatewayResponse"]
                  return resp.get("headers", {}), resp.get("body", {})
              return event.get("headers", {}), event.get("body", {})

          def _parse_body(body):
              if isinstance(body, str):
                  try:
                      return json.loads(body)
                  except (json.JSONDecodeError, TypeError):
                      return {}
              if isinstance(body, dict):
                  return body
              return {}

          def request_interceptor_handler(event, context):
              headers, raw_body = _extract_request(event)
              body = _parse_body(raw_body)
              method = body.get("method", "")
              policy = _load_access_policy()
              if method in ("tools/call", "tools/list"):
                  actor = _extract_actor(headers)
                  tool_name = body.get("params", {}).get("name", "") if method == "tools/call" else ""
                  request_id = getattr(context, "aws_request_id", str(uuid.uuid4()))
                  audit_entry = {
                      "audit": True,
                      "request_id": request_id,
                      "method": method,
                      "tool_name": tool_name,
                      "client_id": actor,
                      "timestamp": datetime.now(timezone.utc).isoformat(),
                  }
                  logger.info(json.dumps(audit_entry))
                  if AUDIT_TABLE_NAME:
                      try:
                          dynamo = boto3.resource("dynamodb", region_name=AWS_REGION)
                          table = dynamo.Table(AUDIT_TABLE_NAME)
                          table.put_item(Item={
                              "toolId": f"gateway:{tool_name}" if tool_name else "gateway:list",
                              "eventId": str(uuid.uuid4()),
                              "action": "GATEWAY_TOOLS_CALL" if method == "tools/call" else "GATEWAY_TOOLS_LIST",
                              "actor": actor, "timestamp": audit_entry["timestamp"],
                              "method": method, "toolName": tool_name,
                          })
                      except Exception as e:
                          logger.warning("Audit log write failed (non-fatal): %s", type(e).__name__)
              if method == "tools/call" and policy:
                  tool_name = body.get("params", {}).get("name", "")
                  caller_groups = _extract_caller_groups(headers)
                  if not _is_tool_allowed(tool_name, caller_groups, policy):
                      logger.warning("Access denied: groups=%s tool=%s", caller_groups, tool_name)
                      return {
                          "interceptorOutputVersion": "1.0",
                          "mcp": {"transformedGatewayRequest": {"headers": headers, "body": {
                              "jsonrpc": "2.0", "id": body.get("id", ""),
                              "error": {"code": -32600, "message": f"Access denied: your team does not have permission to call '{tool_name}'"},
                          }}},
                      }
              return {"interceptorOutputVersion": "1.0", "mcp": {"transformedGatewayRequest": {"headers": headers, "body": body}}}
      Tags:
        - Key: Name
          Value: agentcore-gateway-request-interceptor
        - Key: Module
          Value: tools-gateway

