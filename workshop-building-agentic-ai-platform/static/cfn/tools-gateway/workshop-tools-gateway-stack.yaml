  #============================================================================
  # Product Info Tool Lambda — workshop-product-info-tool
  #============================================================================

  ProductInfoToolLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-product-info-tool-role-${AWS::Region}
      Description: Execution role for the product-info Lambda tool invoked by AgentCore Gateway.
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-product-info-tool-role

  ProductInfoToolLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Delete
    Properties:
      LogGroupName: /aws/lambda/workshop-product-info-tool
      RetentionInDays: 7

  ProductInfoToolLambda:
    Type: AWS::Lambda::Function
    DependsOn: ProductInfoToolLogGroup
    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_115
            comment: "Inline workshop Lambda; reserved concurrency, DLQ, and VPC attachment add operational complexity without changing the threat model in a disposable workshop account"
          - id: CKV_AWS_116
            comment: "Inline workshop Lambda; reserved concurrency, DLQ, and VPC attachment add operational complexity without changing the threat model in a disposable workshop account"
          - id: CKV_AWS_117
            comment: "Inline workshop Lambda; serves mock data only, no VPC-bound resources"
    Properties:
      FunctionName: workshop-product-info-tool
      Description: MCP-compatible Lambda returning product details by ID
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt ProductInfoToolLambdaRole.Arn
      MemorySize: 128
      Timeout: 10
      Code:
        ZipFile: |
          # Copyright Amazon.com, Inc. or its affiliates. All Rights Reserved.
          # SPDX-License-Identifier: Apache-2.0
          """MCP-compatible Lambda: workshop-product-info-tool."""
          import json
          import logging

          logger = logging.getLogger(__name__)
          logger.setLevel("INFO")

          PRODUCTS = {
              "PROD-001": {"product_id": "PROD-001", "name": "Enterprise AI Platform License", "description": "Annual license for the Enterprise Agentic AI Platform, includes all modules.", "price": 49999.99, "currency": "USD", "stock_level": 500, "category": "Software"},
              "PROD-002": {"product_id": "PROD-002", "name": "GPU Compute Credits (1000 hours)", "description": "Pre-paid GPU compute credits for model training and inference workloads.", "price": 2500.00, "currency": "USD", "stock_level": 10000, "category": "Compute"},
              "PROD-003": {"product_id": "PROD-003", "name": "Professional Services - Platform Setup", "description": "Expert-led deployment and configuration of the agentic AI platform.", "price": 15000.00, "currency": "USD", "stock_level": 20, "category": "Services"},
              "PROD-004": {"product_id": "PROD-004", "name": "Data Connector Pack", "description": "Pre-built connectors for S3, RDS, DynamoDB, and OpenSearch data sources.", "price": 999.99, "currency": "USD", "stock_level": 1000, "category": "Software"},
          }

          TOOL_DEFINITION = {
              "name": "get_product_info",
              "description": "Returns product details for a given product ID including name, description, price, and stock level.",
              "inputSchema": {
                  "type": "object",
                  "properties": {"product_id": {"type": "string", "description": "The product identifier (e.g., PROD-001)"}},
                  "required": ["product_id"],
              },
          }

          def _tool_name_from_context(context):
              try:
                  raw = (context.client_context.custom or {}).get("bedrockAgentCoreToolName", "")
              except AttributeError:
                  raw = ""
              return raw.split("___")[-1] if raw else ""

          def _exec(tool_name, arguments):
              if tool_name != "get_product_info":
                  return {"error": f"Unknown tool: {tool_name}"}
              product_id = arguments.get("product_id", "")
              product = PRODUCTS.get(product_id)
              if product is None:
                  return {"error": f"Product '{product_id}' not found. Available: {', '.join(PRODUCTS.keys())}"}
              return product

          def handler(event, context):
              # Gateway invocation — tool name in client_context, args are the event
              gw_tool = _tool_name_from_context(context)
              if gw_tool:
                  arguments = event if isinstance(event, dict) else {}
                  return _exec(gw_tool, arguments)

              # Direct MCP JSON-RPC invocation
              body = event
              if isinstance(body, str):
                  body = json.loads(body)
              if isinstance(body, dict) and "mcp" in body and "gatewayRequest" in body.get("mcp", {}):
                  body = body["mcp"]["gatewayRequest"].get("body", {})
                  if isinstance(body, str):
                      body = json.loads(body)
              if not isinstance(body, dict):
                  body = {}
              method = body.get("method", "")
              request_id = body.get("id", 1)
              if method == "tools/list":
                  return {"jsonrpc": "2.0", "id": request_id, "result": {"tools": [TOOL_DEFINITION]}}
              if method == "tools/call":
                  params = body.get("params", {})
                  result = _exec(params.get("name", ""), params.get("arguments", {}))
                  text = result if isinstance(result, str) else json.dumps(result, indent=2)
                  return {"jsonrpc": "2.0", "id": request_id, "result": {"content": [{"type": "text", "text": text}]}}
              return {"jsonrpc": "2.0", "id": request_id, "error": {"code": -32601, "message": f"Method not supported: {method}"}}
      Tags:
        - Key: Name
          Value: workshop-product-info-tool
        - Key: Module
          Value: tools-gateway

