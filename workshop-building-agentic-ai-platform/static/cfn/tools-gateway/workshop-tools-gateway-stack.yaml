AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Module 4: AgentCore Gateway — Tools Gateway Stack.
  Provisions the governed Path B alongside Module 3's NGINX-based Path A.
  Creates Lambda functions, IAM roles, EventBridge schedule, and Cognito groups.
  All identity imports come from Module 3's CFN exports (EnvironmentName=workshop).

Parameters:
  EnvironmentName:
    Type: String
    Default: workshop
    Description: >
      Environment name prefix — must match Module 3's EnvironmentName so
      Fn::ImportValue references resolve correctly.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Environment
        Parameters:
          - EnvironmentName

Resources:

  #============================================================================
  # Cognito Groups (extend Module 3's User Pool)
  #============================================================================

  GatewayAdminsGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: gateway-admins
      UserPoolId: !ImportValue
        Fn::Sub: ${EnvironmentName}-CognitoUserPoolId
      Description: AgentCore Gateway administrators

  GatewayDevelopersGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: gateway-developers
      UserPoolId: !ImportValue
        Fn::Sub: ${EnvironmentName}-CognitoUserPoolId
      Description: AgentCore Gateway developers

  #============================================================================
  # AgentCore Gateway IAM Role
  # Assumed by bedrock-agentcore service to invoke Lambda tool targets
  #============================================================================

  AgentCoreGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'workshop-agentcore-gateway-role-${AWS::Region}'
      Description: Role assumed by AgentCore Gateway for tool dispatch
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - bedrock.amazonaws.com
                - bedrock-agentcore.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambdaTools
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !Sub arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:workshop-*
                  - !Sub arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:agentcore-*
      Tags:
        - Key: Name
          Value: agentcore-gateway-role
        - Key: Module
          Value: tools-gateway

  #============================================================================
  # Sync Lambda — reads Registry API, creates AgentCore Gateway targets
  #============================================================================

  SyncLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-agentcore-sync-role-${AWS::Region}
      Description: Execution role for the Registry-to-Gateway sync Lambda - reads Registry API secrets, creates AgentCore Gateway targets, writes CloudWatch logs.
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SyncLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: SecretsManagerRead
                Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Sub arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${EnvironmentName}-*
                  - !Sub arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${EnvironmentName}/*
              # Read-only: inspect existing gateway targets before syncing.
              # Scoped to gateway/* in this account/region; the gateway ID is
              # created at runtime by create_gateway.py so it cannot be
              # inlined here.
              - Sid: AgentCoreGatewayTargetsRead
                Effect: Allow
                Action:
                  - bedrock-agentcore:GetGatewayTarget
                  - bedrock-agentcore:ListGatewayTargets
                Resource:
                  - !Sub arn:${AWS::Partition}:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:gateway/*
              # Write: target lifecycle, same runtime-generated-ID scoping.
              - Sid: AgentCoreGatewayTargetsWrite
                Effect: Allow
                Action:
                  - bedrock-agentcore:CreateGatewayTarget
                  - bedrock-agentcore:DeleteGatewayTarget
                  - bedrock-agentcore:SynchronizeGatewayTargets
                Resource:
                  - !Sub arn:${AWS::Partition}:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:gateway/*
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-agentcore-sync-role

  SyncLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    # Workshop: Delete on teardown. Production: use Retain.
    DeletionPolicy: Delete
    Properties:
      LogGroupName: /aws/lambda/agentcore-gateway-sync
      RetentionInDays: 7

  SyncLambda:
    Type: AWS::Lambda::Function
    DependsOn: SyncLambdaLogGroup
    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_115
            comment: "Inline workshop Lambda; reserved concurrency, DLQ, and VPC attachment add operational complexity without changing the threat model in a disposable workshop account"
          - id: CKV_AWS_116
            comment: "Inline workshop Lambda; reserved concurrency, DLQ, and VPC attachment add operational complexity without changing the threat model in a disposable workshop account"
          - id: CKV_AWS_117
            comment: "Inline workshop Lambda; calls AWS APIs and the public Registry endpoint, no VPC-bound resources"
    Properties:
      FunctionName: agentcore-gateway-sync
      Description: Syncs MCP servers from Registry API to AgentCore Gateway targets
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt SyncLambdaRole.Arn
      MemorySize: 256
      Timeout: 120
      Environment:
        Variables:
          REGISTRY_URL: !ImportValue
            Fn::Sub: ${EnvironmentName}-RegistryUrl
          M2M_SECRET_NAME: !Sub ${EnvironmentName}-registry-api-token
          GATEWAY_ID: ''  # Set after create_gateway.py runs
          CLOUDFRONT_URL: !ImportValue
            Fn::Sub: ${EnvironmentName}-MainCloudFrontUrl
          SYNC_FILTER_TAGS: ''
          LOG_LEVEL: INFO
      Code:
        ZipFile: |
          # Copyright Amazon.com, Inc. or its affiliates. All Rights Reserved.
          # SPDX-License-Identifier: Apache-2.0
          """Sync Lambda: Registry API -> AgentCore Gateway targets.

          This single-file Lambda merges sync_lambda.py, registry_client.py, and
          gateway_sync.py into one ZipFile-compatible module for CloudFormation.
          """
          import base64
          import json
          import logging
          import os
          import re
          import ssl
          import time
          from urllib.parse import quote
          from urllib.request import Request, urlopen

          import boto3
          from botocore.exceptions import ClientError

          logger = logging.getLogger(__name__)
          logger.setLevel(os.environ.get("LOG_LEVEL", "INFO"))

          GATEWAY_ID = os.environ.get("GATEWAY_ID", "")
          REGISTRY_URL = os.environ.get("REGISTRY_URL", "")
          M2M_SECRET_NAME = os.environ.get("M2M_SECRET_NAME", "")
          CLOUDFRONT_URL = os.environ.get("CLOUDFRONT_URL", "")
          # AWS_REGION is always set by the Lambda runtime; AWS_DEFAULT_REGION
          # is the documented fallback. No region literal needed.
          AWS_REGION = os.environ.get("AWS_REGION") or os.environ.get("AWS_DEFAULT_REGION", "")
          SYNC_FILTER_TAGS = [
              t.strip() for t in os.environ.get("SYNC_FILTER_TAGS", "").split(",") if t.strip()
          ]

          _TOKEN_BUFFER_SECONDS = 60
          _TIMEOUT = 30

          # URL patterns that should never be used as gateway targets
          _BLOCKED_URL_PATTERNS = [
              r"^https?://localhost", r"^https?://127\.", r"^https?://0\.0\.0\.0",
              r"^https?://169\.254\.", r"^https?://10\.",
              r"^https?://172\.(1[6-9]|2[0-9]|3[01])\.",
              r"^https?://192\.168\.", r"^https?://\[?::1\]?",
              r"^https?://\[?fd[0-9a-f]{2}:", r"^https?://\[?fe80:",
          ]

          # ── Registry Client ──

          def _http(method, url, headers, data=None):
              req = Request(url, data=data, headers=headers, method=method)
              ctx = ssl.create_default_context()
              with urlopen(req, timeout=_TIMEOUT, context=ctx) as resp:
                  body = json.loads(resp.read())
                  return resp.status, body

          def _build_cognito_token_url(creds, region):
              token_url = creds.get("token_url", "")
              if token_url and ".amazoncognito.com" in token_url:
                  return token_url
              cognito_domain = creds.get("cognito_domain", "")
              if not cognito_domain:
                  raise ValueError("No token_url or cognito_domain in credentials")
              if ".amazoncognito.com" in cognito_domain:
                  if not cognito_domain.startswith("https://"):
                      cognito_domain = f"https://{cognito_domain}"
                  return f"{cognito_domain}/oauth2/token"
              prefix = cognito_domain.replace("https://", "").replace("http://", "")
              return f"https://{prefix}.auth.{region}.amazoncognito.com/oauth2/token"

          class RegistryClient:
              def __init__(self, registry_url, m2m_secret_name, region=AWS_REGION):
                  self.registry_url = registry_url.rstrip("/")
                  self._m2m_secret_name = m2m_secret_name
                  self._region = region
                  self._token = None
                  self._token_expiry = 0
                  self._creds = None

              def _load_credentials(self):
                  if self._creds is None:
                      sm = boto3.client("secretsmanager", region_name=self._region)
                      secret = sm.get_secret_value(SecretId=self._m2m_secret_name)
                      self._creds = json.loads(secret["SecretString"])
                  return self._creds

              def _get_token(self):
                  now = time.time()
                  if self._token and now < self._token_expiry:
                      return self._token
                  creds = self._load_credentials()
                  if creds.get("api_token"):
                      self._token = creds["api_token"]
                      self._token_expiry = now + 86400
                      return self._token
                  token_url = _build_cognito_token_url(creds, self._region)
                  client_id = creds["client_id"]
                  client_secret = creds["client_secret"]
                  scopes = creds.get("scopes", "")
                  basic = base64.b64encode(f"{client_id}:{client_secret}".encode()).decode()
                  body = f"grant_type=client_credentials&scope={quote(scopes)}".encode()
                  req = Request(token_url, data=body, method="POST")
                  req.add_header("Content-Type", "application/x-www-form-urlencoded")
                  req.add_header("Authorization", f"Basic {basic}")
                  ctx = ssl.create_default_context()
                  with urlopen(req, timeout=10, context=ctx) as resp:
                      data = json.loads(resp.read())
                  self._token = data["access_token"]
                  expires_in = data.get("expires_in", 3600)
                  self._token_expiry = now + expires_in - _TOKEN_BUFFER_SECONDS
                  return self._token

              def _headers(self):
                  return {"Authorization": f"Bearer {self._get_token()}"}

              def list_servers(self):
                  _, data = _http("GET", f"{self.registry_url}/api/servers", self._headers())
                  if isinstance(data, list):
                      return data
                  return data.get("servers", data.get("items", []))

          # ── Gateway Sync Service ──

          class GatewaySyncService:
              def __init__(self, region=AWS_REGION):
                  self._client = boto3.client("bedrock-agentcore-control", region_name=region)
                  self._region = region

              def build_target_config(self, server):
                  proxy_url = server.get("proxy_pass_url", "")
                  tags = server.get("tags", [])
                  if isinstance(tags, str):
                      tags = [t.strip() for t in tags.split(",")]
                  tool_list = server.get("tool_list", [])
                  if isinstance(tool_list, str):
                      try:
                          tool_list = json.loads(tool_list)
                      except (json.JSONDecodeError, TypeError):
                          tool_list = []
                  name = server.get("display_name") or server.get("server_name") or server.get("name", "")
                  if proxy_url.startswith("lambda://"):
                      lambda_arn = proxy_url.replace("lambda://", "")
                      if not lambda_arn.startswith("arn:aws:lambda:"):
                          raise ValueError(f"Invalid Lambda ARN: {lambda_arn}")
                      def _sanitize_schema(schema):
                          if not isinstance(schema, dict):
                              return {"type": "object"}
                          return {k: v for k, v in schema.items() if k not in ("$schema", "additionalProperties", "$id", "$comment")}
                      normalized_tools = []
                      for t in (tool_list or [{"name": name}]):
                          normalized_tools.append({
                              "name": t.get("name", name),
                              "description": t.get("description", f"Tool from {name}"),
                              "inputSchema": _sanitize_schema(t.get("inputSchema", {"type": "object"})),
                          })
                      if not normalized_tools:
                          normalized_tools = [{"name": name, "description": f"Tool provided by {name}", "inputSchema": {"type": "object"}}]
                      return {
                          "name": name,
                          "targetConfiguration": {"mcp": {"lambda": {"lambdaArn": lambda_arn, "toolSchema": {"inlinePayload": normalized_tools}}}},
                          "credentialProviderConfigurations": [{"credentialProviderType": "GATEWAY_IAM_ROLE"}],
                      }
                  if proxy_url.startswith("http://") or proxy_url.startswith("https://"):
                      for pattern in _BLOCKED_URL_PATTERNS:
                          if re.match(pattern, proxy_url, re.IGNORECASE):
                              raise ValueError(f"Blocked URL pattern: {proxy_url}")
                      return {
                          "name": name,
                          "targetConfiguration": {"mcp": {"mcpServer": {"endpoint": proxy_url}}},
                          "credentialProviderConfigurations": [{"credentialProviderType": "GATEWAY_IAM_ROLE"}],
                      }
                  return None

              def create_target(self, gateway_id, target_config):
                  name = target_config.get("name", "unknown")
                  try:
                      resp = self._client.create_gateway_target(
                          gatewayIdentifier=gateway_id,
                          name=f"tg-{name}",
                          **{k: v for k, v in target_config.items() if k != "name"},
                      )
                      target_id = resp["targetId"]
                      logger.info("Created target %s for %s", target_id, name)
                      return target_id
                  except ClientError as e:
                      code = e.response["Error"]["Code"]
                      if code == "ConflictException":
                          logger.info("Target %s already exists, skipping", name)
                          return "existing"
                      logger.error("Failed to create target for %s: %s", name, e)
                      return None
                  except Exception as e:
                      logger.error("Failed to create target for %s: %s", name, e)
                      return None

              def list_targets(self, gateway_id):
                  try:
                      resp = self._client.list_gateway_targets(gatewayIdentifier=gateway_id)
                      return resp.get("items", [])
                  except ClientError as e:
                      logger.error("Failed to list targets: %s", e)
                      return []

          # ── Handler ──

          def handler(event, context):
              if not GATEWAY_ID:
                  logger.warning("GATEWAY_ID not set -- skipping sync")
                  return {"synced": 0, "created": 0, "skipped": 0, "errors": 0}
              if not REGISTRY_URL or not M2M_SECRET_NAME:
                  logger.error("REGISTRY_URL or M2M_SECRET_NAME not set")
                  return {"synced": 0, "created": 0, "skipped": 0, "errors": 0}

              registry = RegistryClient(REGISTRY_URL, M2M_SECRET_NAME, AWS_REGION)
              sync_svc = GatewaySyncService(region=AWS_REGION)

              try:
                  servers = registry.list_servers()
                  logger.info("Fetched %d servers from Registry", len(servers))
              except Exception as e:
                  logger.error("Failed to fetch servers from Registry: %s", e)
                  return {"synced": 0, "created": 0, "skipped": 0, "errors": 1}

              existing_targets = sync_svc.list_targets(GATEWAY_ID)
              existing_names = {t.get("name", "") for t in existing_targets}
              logger.info("Found %d existing targets", len(existing_names))

              created = 0
              skipped = 0
              filtered = 0
              errors = 0

              for server in servers:
                  name = server.get("display_name") or server.get("server_name") or server.get("name", "")
                  target_name = f"tg-{name}"
                  if target_name in existing_names:
                      skipped += 1
                      continue

                  proxy_url = server.get("proxy_pass_url", "")

                  if SYNC_FILTER_TAGS:
                      server_tags = server.get("tags", [])
                      if isinstance(server_tags, str):
                          server_tags = [t.strip() for t in server_tags.split(",")]
                      if not any(tag in SYNC_FILTER_TAGS for tag in server_tags):
                          filtered += 1
                          continue

                  try:
                      if proxy_url.startswith("lambda://"):
                          config = sync_svc.build_target_config(server)
                      else:
                          skipped += 1
                          continue
                      if config is None:
                          skipped += 1
                          continue
                      result = sync_svc.create_target(GATEWAY_ID, config)
                      if result:
                          created += 1
                      else:
                          errors += 1
                  except ValueError as e:
                      logger.warning("Invalid target config for %s: %s", name, e)
                      skipped += 1
                  except Exception as e:
                      logger.error("Error processing server %s: %s", name, e)
                      errors += 1

              logger.info(
                  "Sync complete: %d created, %d skipped, %d filtered, %d errors (from %d servers)",
                  created, skipped, filtered, errors, len(servers),
              )
              return {"synced": len(servers), "created": created, "skipped": skipped, "filtered": filtered, "errors": errors}
      Tags:
        - Key: Name
          Value: agentcore-gateway-sync
        - Key: Module
          Value: tools-gateway

  #============================================================================
  # Demo Tool Lambda — search-knowledge-base
  #============================================================================

  DemoToolLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-demo-tool-role-${AWS::Region}
      Description: Execution role for the demo search-knowledge-base Lambda tool invoked by AgentCore Gateway.
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-demo-tool-role

  DemoToolLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Delete
    Properties:
      LogGroupName: /aws/lambda/workshop-search-knowledge-base
      RetentionInDays: 7

  DemoToolLambda:
    Type: AWS::Lambda::Function
    DependsOn: DemoToolLogGroup
    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_115
            comment: "Inline workshop Lambda; reserved concurrency, DLQ, and VPC attachment add operational complexity without changing the threat model in a disposable workshop account"
          - id: CKV_AWS_116
            comment: "Inline workshop Lambda; reserved concurrency, DLQ, and VPC attachment add operational complexity without changing the threat model in a disposable workshop account"
          - id: CKV_AWS_117
            comment: "Inline workshop Lambda; serves mock data only, no VPC-bound resources"
    Properties:
      FunctionName: workshop-search-knowledge-base
      Description: Demo MCP tool — simple keyword search over sample knowledge base
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt DemoToolLambdaRole.Arn
      MemorySize: 128
      Timeout: 10
      Code:
        ZipFile: |
          # Copyright Amazon.com, Inc. or its affiliates. All Rights Reserved.
          # SPDX-License-Identifier: Apache-2.0
          """Demo MCP tool Lambda: search-knowledge-base.

          AgentCore Gateway invokes Lambda targets with:
            event   = tool arguments (flat dict, e.g. {"query": "..."})
            context.client_context.custom["bedrockAgentCoreToolName"] = "{target}___{tool}"
          Return value is wrapped by the Gateway into an MCP content block.
          """
          import json
          import logging

          logger = logging.getLogger(__name__)
          logger.setLevel("INFO")

          _KNOWLEDGE_BASE = [
              {"title": "Return Policy",
               "content": "Items can be returned within 30 days of purchase with original receipt. Electronics must be unopened. Clothing can be tried on but must have tags attached.",
               "tags": ["returns", "policy", "refund"]},
              {"title": "Shipping Information",
               "content": "Standard shipping takes 5-7 business days. Express shipping takes 1-2 business days. Free shipping on orders over $50. International shipping available to select countries.",
               "tags": ["shipping", "delivery", "international"]},
              {"title": "Product Warranty",
               "content": "All electronics come with a 1-year manufacturer warranty. Extended warranty available for purchase. Warranty covers defects in materials and workmanship.",
               "tags": ["warranty", "electronics", "coverage"]},
              {"title": "Account Management",
               "content": "Customers can manage their account at account.example.com. Password resets are available via email. Two-factor authentication is recommended for all accounts.",
               "tags": ["account", "security", "password"]},
          ]

          TOOL_DEFINITION = {
              "name": "search-knowledge-base",
              "description": "Search the enterprise knowledge base for relevant information. Returns matching documents based on keyword relevance.",
              "inputSchema": {
                  "type": "object",
                  "properties": {
                      "query": {"type": "string", "description": "Search query (keywords or natural language)"},
                      "max_results": {"type": "integer", "description": "Maximum number of results to return (default: 3)", "default": 3},
                  },
                  "required": ["query"],
              },
          }

          def _search(query, max_results=3):
              query_lower = query.lower()
              scored = []
              for entry in _KNOWLEDGE_BASE:
                  score = 0
                  for word in query_lower.split():
                      if word in entry["title"].lower():
                          score += 2
                      if word in entry["content"].lower():
                          score += 1
                      if word in " ".join(entry["tags"]):
                          score += 3
                  if score > 0:
                      scored.append((score, entry))
              scored.sort(key=lambda x: x[0], reverse=True)
              return [e for _, e in scored[:max_results]]

          def _tool_name_from_context(context):
              try:
                  raw = (context.client_context.custom or {}).get("bedrockAgentCoreToolName", "")
              except AttributeError:
                  raw = ""
              return raw.split("___")[-1] if raw else ""

          def _exec(tool_name, arguments):
              """Structured result — Gateway JSON-encodes this into content[].text."""
              if tool_name != "search-knowledge-base":
                  return {"error": f"Unknown tool: {tool_name}"}
              query = arguments.get("query", "")
              if not query:
                  return {"error": "Missing required parameter: query"}
              results = _search(query, arguments.get("max_results", 3))
              return {"query": query, "count": len(results), "results": results}

          def _format_text(result):
              """Human-readable text for the direct MCP path (tools/call)."""
              if not isinstance(result, dict) or "results" not in result:
                  return json.dumps(result, indent=2)
              results = result["results"]
              query = result.get("query", "")
              if not results:
                  return f"No results found for '{query}'."
              parts = [f"Found {len(results)} result(s) for '{query}':\n"]
              for i, r in enumerate(results, 1):
                  parts.append(f"{i}. **{r['title']}**\n   {r['content']}\n")
              return "\n".join(parts)

          def handler(event, context):
              # Path 1: Gateway invocation — tool name in client_context, args are the event
              gw_tool = _tool_name_from_context(context)
              if gw_tool:
                  arguments = event if isinstance(event, dict) else {}
                  return _exec(gw_tool, arguments)

              # Path 2: direct MCP JSON-RPC invocation (tools/list or tools/call)
              body = event
              if isinstance(body, str):
                  body = json.loads(body)
              if isinstance(body, dict) and "mcp" in body and "gatewayRequest" in body.get("mcp", {}):
                  body = body["mcp"]["gatewayRequest"].get("body", {})
                  if isinstance(body, str):
                      body = json.loads(body)
              if not isinstance(body, dict):
                  body = {}
              method = body.get("method", "")
              req_id = body.get("id", 1)
              if method == "tools/list":
                  return {"jsonrpc": "2.0", "id": req_id, "result": {"tools": [TOOL_DEFINITION]}}
              if method == "tools/call":
                  params = body.get("params", {})
                  result = _exec(params.get("name", ""), params.get("arguments", {}))
                  return {"jsonrpc": "2.0", "id": req_id, "result": {"content": [{"type": "text", "text": _format_text(result)}]}}
              return {"jsonrpc": "2.0", "id": req_id, "error": {"code": -32601, "message": f"Method not found: {method}"}}
      Tags:
        - Key: Name
          Value: workshop-search-knowledge-base
        - Key: Module
          Value: tools-gateway

  # NOTE on LAMBDA_FUNCTION_PUBLIC_ACCESS_PROHIBITED (cfn-guard): every
  # AWS::Lambda::Permission in this template is non-public by construction —
  # each one either (a) grants a specific AWS service principal
  # (bedrock.amazonaws.com / bedrock-agentcore.amazonaws.com /
  # events.amazonaws.com) AND pins SourceArn to an ARN in this account, or
  # (b) grants only this account's ID as the principal with
  # FunctionUrlAuthType: AWS_IAM (Function URL permissions). No cross-account
  # or anonymous invocation is possible. The cfn-guard rule mis-compares
  # service-principal permissions against the layer-permission rule shape;
  # these findings are false positives for service-principal + SourceArn
  # (or account-principal + AWS_IAM) permissions.

  # Allow AgentCore Gateway role to invoke the demo tool
  DemoToolGatewayInvokePermission:
