          ]
          # Alias common city names / airport codes to cities in the mock
          # dataset so the agent can say "NYC" or "TYO" and still hit data.
          CITY_ALIASES = {
              "tyo": "tokyo", "nrt": "tokyo", "hnd": "tokyo", "japan": "tokyo",
              "lon": "london", "lhr": "london", "uk": "london",
              "par": "paris", "cdg": "paris", "france": "paris",
              "syd": "sydney", "australia": "sydney",
              "dxb": "dubai", "uae": "dubai",
              "sel": "seoul", "icn": "seoul", "korea": "seoul",
              "sin": "singapore",
              "bkk": "bangkok", "thailand": "bangkok",
              "fra": "frankfurt", "germany": "frankfurt",
              "zrh": "zurich", "switzerland": "zurich",
          }
          def _normalize_city(city):
              if not city:
                  return ""
              c = city.strip().lower()
              return CITY_ALIASES.get(c, c)
          def _exec(name, args):
              # Accept both arg-name forms (the CFN ToolSchema for the Module 3b
              # AgentCore gateway uses check_in/check_out; the module-4a tools
              # gateway uses checkin_date/checkout_date - support both).
              city = _normalize_city(args.get("city",""))
              checkin = args.get("checkin_date") or args.get("check_in") or ""
              checkout = args.get("checkout_date") or args.get("check_out") or ""
              if name == "search_hotels":
                  r = [h for h in HOTELS if h["city"].lower() == city]
                  return r[:args.get("max_results", 5)]
              if name == "get_hotel_details":
                  return next((h for h in HOTELS if h["hotel_id"] == args.get("hotel_id")), {"error": "Not found"})
              if name == "search_hotels_by_budget":
                  max_price = args.get("max_price_per_night") or args.get("max_price")
                  if max_price is None or max_price <= 0:
                      return {"error": "max_price_per_night must be a positive number"}
                  r = [h for h in HOTELS if h["city"].lower() == city and h["price_per_night"] <= max_price]
                  return r
              return {"error": f"Unknown tool: {name}"}
          def _tool_name_from_context(context):
              try:
                  raw = (context.client_context.custom or {}).get("bedrockAgentCoreToolName", "")
              except AttributeError:
                  raw = ""
              return raw.split("___")[-1] if raw else ""
          def handler(event, context):
              # Gateway invocation — tool name in client_context, args are the event
              gw_tool = _tool_name_from_context(context)
              if gw_tool:
                  arguments = event if isinstance(event, dict) else {}
                  return _exec(gw_tool, arguments)
              # Direct MCP JSON-RPC invocation (tools/list or tools/call)
              body = event
              if isinstance(body, str):
                  body = json.loads(body)
              if isinstance(body, dict) and "mcp" in body and "gatewayRequest" in body.get("mcp", {}):
                  body = body["mcp"]["gatewayRequest"].get("body", {})
                  if isinstance(body, str):
                      body = json.loads(body)
              if not isinstance(body, dict):
                  body = {}
              method = body.get("method", "")
              rid = body.get("id", 1)
              if method == "tools/list":
                  return {"jsonrpc": "2.0", "id": rid, "result": {"tools": TOOLS}}
              if method == "tools/call":
                  p = body.get("params", {})
                  result = _exec(p.get("name", ""), p.get("arguments", {}))
                  return {"jsonrpc": "2.0", "id": rid, "result": {"content": [{"type": "text", "text": json.dumps(result, indent=2)}]}}
              return {"jsonrpc": "2.0", "id": rid, "error": {"code": -32601, "message": f"Unsupported: {method}"}}
