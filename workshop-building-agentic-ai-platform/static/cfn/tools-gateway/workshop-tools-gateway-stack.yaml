          TOOLS = [
              {"name": "search_hotels", "description": "Search hotels by city, check-in/out dates, and guests.", "inputSchema": {"type": "object", "properties": {"city": {"type": "string", "description": "City name (e.g. Tokyo)"}, "checkin_date": {"type": "string", "description": "Check-in date (e.g. 2026-09-15)"}, "checkout_date": {"type": "string", "description": "Check-out date (e.g. 2026-09-18)"}, "guests": {"type": "integer", "description": "Number of guests"}, "max_results": {"type": "integer", "description": "Max results (default 5)"}}, "required": ["city", "checkin_date", "checkout_date", "guests"]}},
