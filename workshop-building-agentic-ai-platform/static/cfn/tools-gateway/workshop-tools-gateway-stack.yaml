":"LAX","destination":"ICN","departure_time":"2026-09-15T12:00:00","arrival_time":"2026-09-16T17:30:00","price":820.0,"currency":"USD","seats_available":44},{"flight_id":"FL-010","airline":"Thai Airways","flight_number":"TG 795","origin":"LAX","destination":"BKK","departure_time":"2026-09-15T23:50:00","arrival_time":"2026-09-17T06:20:00","price":760.0,"currency":"USD","seats_available":38},{"flight_id":"FL-011","airline":"Air France","flight_number":"AF 65","origin":"JFK","destination":"CDG","departure_time":"2026-09-15T18:00:00","arrival_time":"2026-09-16T07:30:00","price":680.0,"currency":"USD","seats_available":72},{"flight_id":"FL-012","airline":"Lufthansa","flight_number":"LH 401","origin":"JFK","destination":"FRA","departure_time":"2026-09-15T17:30:00","arrival_time":"2026-09-16T07:15:00","price":720.0,"currency":"USD","seats_available":29},{"flight_id":"FL-013","airline":"Emirates","flight_number":"EK 202","origin":"JFK","destination":"DXB","departure_time":"2026-09-15T23:15:00","arrival_time":"2026-09-16T19:45:00","price":1050.0,"currency":"USD","seats_available":51},{"flight_id":"FL-014","airline":"Swiss International","flight_number":"LX 23","origin":"JFK","destination":"ZRH","departure_time":"2026-09-15T20:45:00","arrival_time":"2026-09-16T10:30:00","price":750.0,"currency":"USD","seats_available":33},{"flight_id":"FL-015","airline":"Japan Airlines","flight_number":"JL 514","origin":"SFO","destination":"TYO","departure_time":"2026-09-16T10:30:00","arrival_time":"2026-09-17T14:45:00","price":870.0,"currency":"USD","seats_available":38},{"flight_id":"FL-016","airline":"ANA","flight_number":"NH 109","origin":"SFO","destination":"TYO","departure_time":"2026-09-17T23:55:00","arrival_time":"2026-09-19T05:10:00","price":800.0,"currency":"USD","seats_available":52},{"flight_id":"FL-017","airline":"British Airways","flight_number":"BA 288","origin":"LAX","destination":"LHR","departure_time":"2026-09-16T21:40:00","arrival_time":"2026-09-17T16:15:00","price":910.0,"currency":"USD","seats_available":41},{"flight_id":"FL-018","airline":"Air France","flight_number":"AF 67","origin":"JFK","destination":"CDG","departure_time":"2026-09-16T18:00:00","arrival_time":"2026-09-17T07:30:00","price":700.0,"currency":"USD","seats_available":65},{"flight_id":"FL-019","airline":"Emirates","flight_number":"EK 204","origin":"JFK","destination":"DXB","departure_time":"2026-09-17T23:15:00","arrival_time":"2026-09-18T19:45:00","price":1080.0,"currency":"USD","seats_available":47},{"flight_id":"FL-020","airline":"Qantas","flight_number":"QF 14","origin":"LAX","destination":"SYD","departure_time":"2026-09-17T22:30:00","arrival_time":"2026-09-19T08:45:00","price":1400.0,"currency":"USD","seats_available":12}]')
          TOOLS = [
              {"name": "search_flights", "description": "Search flights by origin, destination, and departure date.", "inputSchema": {"type": "object", "properties": {"origin": {"type": "string", "description": "IATA airport code (e.g. SFO)"}, "destination": {"type": "string", "description": "IATA airport code (e.g. TYO)"}, "date": {"type": "string", "description": "Date prefix (e.g. 2026-09-15)"}, "max_results": {"type": "integer", "description": "Max results (default 5)"}}, "required": ["origin", "destination", "date"]}},
              {"name": "get_flight_details", "description": "Get full details of a flight by ID.", "inputSchema": {"type": "object", "properties": {"flight_id": {"type": "string", "description": "Flight ID (e.g. FL-001)"}}, "required": ["flight_id"]}},
              {"name": "search_flights_by_budget", "description": "Search flights filtered by max price.", "inputSchema": {"type": "object", "properties": {"origin": {"type": "string"}, "destination": {"type": "string"}, "date": {"type": "string"}, "max_price": {"type": "number", "description": "Maximum ticket price"}}, "required": ["origin", "destination", "date", "max_price"]}},
          ]
          # Alias common airport codes to the codes used in the mock dataset so
          # the agent can say "NRT" or "HND" and still match the "TYO" data.
          AIRPORT_ALIASES = {
              "NRT": "TYO", "HND": "TYO", "TYO": "TYO",
              "LGA": "JFK", "EWR": "JFK", "JFK": "JFK",
              "ICN": "ICN", "GMP": "ICN",
              "CDG": "CDG", "ORY": "CDG",
              "LHR": "LHR", "LGW": "LHR", "STN": "LHR",
              "HKG": "HKG", "SIN": "SIN", "BKK": "BKK",
              "DXB": "DXB", "DOH": "DXB",
              "SFO": "SFO", "LAX": "LAX", "SYD": "SYD", "FRA": "FRA", "ZRH": "ZRH",
          }
          def _normalize(code):
              if not code:
                  return ""
              return AIRPORT_ALIASES.get(code.upper(), code.upper())
          def _exec(name, args):
              if name == "search_flights":
                  origin = _normalize(args.get("origin",""))
                  dest = _normalize(args.get("destination",""))
                  date = args.get("date","") or args.get("departure_date","") or ""
                  r = [f for f in FLIGHTS if f["origin"].upper() == origin and f["destination"].upper() == dest and (not date or f["departure_time"].startswith(date))]
                  return r[:args.get("max_results", 5)]
              if name == "get_flight_details":
                  return next((f for f in FLIGHTS if f["flight_id"] == args.get("flight_id")), {"error": "Not found"})
              if name == "search_flights_by_budget":
                  max_price = args.get("max_price")
                  if max_price is None or max_price <= 0:
                      return {"error": "max_price must be a positive number"}
                  origin = _normalize(args.get("origin",""))
                  dest = _normalize(args.get("destination",""))
                  date = args.get("date","") or args.get("departure_date","") or ""
                  r = [f for f in FLIGHTS if f["origin"].upper() == origin and f["destination"].upper() == dest and (not date or f["departure_time"].startswith(date)) and f["price"] <= max_price]
                  return r
              return {"error": f"Unknown tool: {name}"}
          def _tool_name_from_context(context):
              try:
                  raw = (context.client_context.custom or {}).get("bedrockAgentCoreToolName", "")
              except AttributeError:
                  raw = ""
              return raw.split("___")[-1] if raw else ""
          def handler(event, context):
              # Gateway invocation — tool name in client_context, args are the event
              gw_tool = _tool_name_from_context(context)
              if gw_tool:
                  arguments = event if isinstance(event, dict) else {}
                  return _exec(gw_tool, arguments)
              # Direct MCP JSON-RPC invocation (tools/list or tools/call)
              body = event
              if isinstance(body, str):
                  body = json.loads(body)
              if isinstance(body, dict) and "mcp" in body and "gatewayRequest" in body.get("mcp", {}):
                  body = body["mcp"]["gatewayRequest"].get("body", {})
                  if isinstance(body, str):
                      body = json.loads(body)
              if not isinstance(body, dict):
                  body = {}
              method = body.get("method", "")
              rid = body.get("id", 1)
              if method == "tools/list":
                  return {"jsonrpc": "2.0", "id": rid, "result": {"tools": TOOLS}}
              if method == "tools/call":
                  p = body.get("params", {})
                  result = _exec(p.get("name", ""), p.get("arguments", {}))
                  return {"jsonrpc": "2.0", "id": rid, "result": {"content": [{"type": "text", "text": json.dumps(result, indent=2)}]}}
              return {"jsonrpc": "2.0", "id": rid, "error": {"code": -32601, "message": f"Unsupported: {method}"}}
      Tags:
        - Key: Name
          Value: workshop-flights-mcp
        - Key: Module
          Value: tools-gateway

