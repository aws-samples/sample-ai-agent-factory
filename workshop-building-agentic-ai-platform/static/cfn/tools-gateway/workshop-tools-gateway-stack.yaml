                  if policy and req_headers:
                      tools = [t for t in tools if _is_tool_allowed(t.get("name", ""), caller_groups, policy)]
                      result["tools"] = tools
                  for tool in tools:
                      for field in _INTERNAL_FIELDS:
                          tool.pop(field, None)

              if BEDROCK_GUARDRAIL_ID and isinstance(result, dict) and "content" in result:
                  content_items = result.get("content", [])
                  text_parts = [item.get("text", "") for item in content_items if isinstance(item, dict) and item.get("type") == "text"]
                  if text_parts:
                      combined_text = "\n".join(text_parts)
                      try:
                          bedrock = boto3.client("bedrock-runtime", region_name=AWS_REGION)
                          guardrail_resp = bedrock.apply_guardrail(
                              guardrailIdentifier=BEDROCK_GUARDRAIL_ID,
                              guardrailVersion=BEDROCK_GUARDRAIL_VERSION,
                              source="OUTPUT",
                              content=[{"text": {"text": combined_text}}],
                          )
                          if guardrail_resp.get("action") == "GUARDRAIL_INTERVENED":
                              blocked_text = guardrail_resp["outputs"][0]["text"]
                              for item in content_items:
                                  if isinstance(item, dict) and item.get("type") == "text":
                                      item["text"] = blocked_text
                      except Exception as e:
                          logger.warning("Guardrail check failed (fail-open): %s", e)
                          try:
                              cw = boto3.client("cloudwatch", region_name=AWS_REGION)
                              cw.put_metric_data(Namespace="AgentCoreGateway", MetricData=[{"MetricName": "GuardrailFailure", "Value": 1, "Unit": "Count"}])
                          except Exception:
                              pass

              return {"interceptorOutputVersion": "1.0", "mcp": {"transformedGatewayResponse": {"statusCode": 200, "headers": headers, "body": body}}}
      Tags:
        - Key: Name
          Value: agentcore-gateway-response-interceptor
        - Key: Module
          Value: tools-gateway

  ResponseInterceptorInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ResponseInterceptorLambda
      Action: lambda:InvokeFunction
      Principal: bedrock-agentcore.amazonaws.com
      SourceArn: !Sub arn:${AWS::Partition}:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:gateway/*

  #============================================================================
  # EventBridge Schedule — triggers Sync Lambda every 5 minutes
  #============================================================================

  SyncScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: agentcore-gateway-sync-schedule
      Description: Triggers Registry-to-Gateway sync every 5 minutes
      ScheduleExpression: rate(5 minutes)
      State: ENABLED
      Targets:
        - Arn: !GetAtt SyncLambda.Arn
          Id: SyncLambdaTarget

  SyncSchedulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SyncLambda
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt SyncScheduleRule.Arn

#============================================================================
# Outputs
#============================================================================
Outputs:

  GatewayRoleArn:
    Description: IAM Role ARN for AgentCore Gateway
    Value: !GetAtt AgentCoreGatewayRole.Arn
    Export:
      Name: agentcore-gateway-RoleArn

  SyncLambdaArn:
    Description: Sync Lambda ARN
    Value: !GetAtt SyncLambda.Arn
    Export:
      Name: agentcore-gateway-SyncLambdaArn

  SyncLambdaName:
    Description: Sync Lambda function name
    Value: !Ref SyncLambda
    Export:
      Name: agentcore-gateway-SyncLambdaName

  GatewayIdSsmParam:
    Description: SSM parameter name where create_gateway.py stores the Gateway ID
    Value: !Sub /agentcore-gateway/${EnvironmentName}/gateway-id

  RequestInterceptorArn:
    Description: Request Interceptor Lambda ARN
    Value: !GetAtt RequestInterceptorLambda.Arn
    Export:
      Name: agentcore-gateway-RequestInterceptorArn

  ResponseInterceptorArn:
    Description: Response Interceptor Lambda ARN
    Value: !GetAtt ResponseInterceptorLambda.Arn
    Export:
      Name: agentcore-gateway-ResponseInterceptorArn

  DemoToolLambdaArn:
    Description: Demo search-knowledge-base Lambda ARN
    Value: !GetAtt DemoToolLambda.Arn
    Export:
      Name: agentcore-gateway-DemoToolLambdaArn

  ProductInfoToolArn:
    Description: Product info tool Lambda ARN (used by Module 3)
    Value: !GetAtt ProductInfoToolLambda.Arn
    Export:
      Name: agentcore-gateway-ProductInfoToolArn

  # Shared Lambda ARN exports (consumed by AgentCore stack for Gateway targets)
  FlightsMcpLambdaArn:
    Description: Flights MCP Lambda ARN (shared with AgentCore stack)
    Value: !GetAtt FlightsMcpLambda.Arn
    Export:
      Name: workshop-FlightsMcpLambdaArn

  HotelsMcpLambdaArn:
    Description: Hotels MCP Lambda ARN (shared with AgentCore stack)
    Value: !GetAtt HotelsMcpLambda.Arn
    Export:
      Name: workshop-HotelsMcpLambdaArn

  OrderProcessingAgentLambdaArn:
    Description: Order Processing Agent Lambda ARN (shared with AgentCore stack)
    Value: !GetAtt OrderProcessingAgentLambda.Arn
    Export:
      Name: workshop-OrderProcessingAgentLambdaArn

  ProductInfoToolFunctionUrl:
    Description: Product info tool Lambda Function URL (used by Module 3 registration)
    Value: !GetAtt ProductInfoToolFunctionUrl.FunctionUrl

  OrderAgentEndpoint:
    Description: Order processing agent Lambda Function URL (used by Module 3 A2A registration)
    Value: !GetAtt OrderProcessingAgentFunctionUrl.FunctionUrl

  FlightsMcpFunctionUrl:
    Description: Flights MCP Lambda Function URL (used by Module 3 registration)
    Value: !GetAtt FlightsMcpFunctionUrl.FunctionUrl
    Export:
      Name: workshop-FlightsMcpFunctionUrl

  HotelsMcpFunctionUrl:
    Description: Hotels MCP Lambda Function URL (used by Module 3 registration)
    Value: !GetAtt HotelsMcpFunctionUrl.FunctionUrl
    Export:
      Name: workshop-HotelsMcpFunctionUrl

  # Convenience outputs: re-export Module 3 values so participants can read
  # all configuration from a single stack. cfn-lint W6001 is expected here.
  CognitoUserPoolId:
    Description: Cognito User Pool ID (from Module 3)
    Value: !ImportValue
      Fn::Sub: ${EnvironmentName}-CognitoUserPoolId

  CognitoDomain:
    Description: Cognito domain (from Module 3)
    Value: !ImportValue
      Fn::Sub: ${EnvironmentName}-CognitoDomain

  RegistryUrl:
    Description: Registry URL (from Module 3)
    Value: !ImportValue
      Fn::Sub: ${EnvironmentName}-RegistryUrl

  CloudFrontUrl:
    Description: CloudFront URL (from Module 3)
    Value: !ImportValue
      Fn::Sub: ${EnvironmentName}-MainCloudFrontUrl

  M2MClientId:
    Description: Cognito M2M Client ID (from Module 3)
    Value: !ImportValue
      Fn::Sub: ${EnvironmentName}-CognitoM2MClientId
