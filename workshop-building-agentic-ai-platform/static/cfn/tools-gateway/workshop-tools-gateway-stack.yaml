    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ProductInfoToolLambda
      Action: lambda:InvokeFunction
      Principal: bedrock.amazonaws.com
      SourceArn: !GetAtt AgentCoreGatewayRole.Arn

