  #============================================================================
  # Order Processing Agent Lambda — workshop-order-processing-agent
  #============================================================================

  OrderProcessingAgentLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Delete
    Properties:
      LogGroupName: /aws/lambda/workshop-order-processing-agent
      RetentionInDays: 7

  OrderProcessingAgentLambda:
    Type: AWS::Lambda::Function
    DependsOn:
      - OrderProcessingAgentLogGroup
      - ProductInfoToolLambdaRole
    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_115
            comment: "Inline workshop Lambda; reserved concurrency, DLQ, and VPC attachment add operational complexity without changing the threat model in a disposable workshop account"
          - id: CKV_AWS_116
            comment: "Inline workshop Lambda; reserved concurrency, DLQ, and VPC attachment add operational complexity without changing the threat model in a disposable workshop account"
          - id: CKV_AWS_117
            comment: "Inline workshop Lambda; serves mock data only, no VPC-bound resources"
    Properties:
      FunctionName: workshop-order-processing-agent
      Description: A2A-compatible Lambda simulating an order processing agent
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt ProductInfoToolLambdaRole.Arn
      MemorySize: 128
      Timeout: 10
      Code:
        ZipFile: |
          import json, logging, uuid
          from datetime import datetime
          logger = logging.getLogger(__name__)
          logger.setLevel("INFO")
          ORDERS = {}
          AGENT_CARD = {
              "name": "Order Processing Agent",
              "description": "Specialist agent for order creation, status checks, and cancellations",
              "url": "",
              "version": "1.0.0",
              "capabilities": {"streaming": False, "pushNotifications": False},
              "skills": [
                  {"id": "create_order", "name": "Create Order", "description": "Creates a new order for a given product and quantity"},
                  {"id": "check_order_status", "name": "Check Order Status", "description": "Returns the current status of an order by order ID"},
                  {"id": "cancel_order", "name": "Cancel Order", "description": "Cancels an existing order if it has not yet shipped"},
              ],
          }
          def _handle_skill(skill_id, params):
              if skill_id == "create_order":
                  order_id = f"ORD-{uuid.uuid4().hex[:8].upper()}"
                  order = {"order_id": order_id, "product_id": params.get("product_id", "PROD-001"), "quantity": params.get("quantity", 1), "status": "confirmed", "created_at": datetime.utcnow().isoformat()}
                  ORDERS[order_id] = order
                  return order
              elif skill_id == "check_order_status":
                  oid = params.get("order_id", "")
                  return ORDERS.get(oid, {"order_id": oid, "status": "not_found"})
              elif skill_id == "cancel_order":
                  oid = params.get("order_id", "")
                  if oid in ORDERS and ORDERS[oid]["status"] != "shipped":
                      ORDERS[oid]["status"] = "cancelled"
                      return ORDERS[oid]
                  return {"order_id": oid, "status": "not_found_or_shipped"}
              return {"error": f"Unknown skill: {skill_id}"}
          def handler(event, context):
              method = event.get("requestContext", {}).get("http", {}).get("method", "")
              path = event.get("rawPath", "/")
              if method == "GET" and "agent.json" in path:
                  return {"statusCode": 200, "headers": {"Content-Type": "application/json"}, "body": json.dumps(AGENT_CARD)}
              body = json.loads(event.get("body", "{}")) if isinstance(event.get("body"), str) else event.get("body", {})
              skill_id = body.get("skill_id", body.get("params", {}).get("skill_id", ""))
              params = body.get("params", body.get("arguments", {}))
              result = _handle_skill(skill_id, params)
              return {"statusCode": 200, "headers": {"Content-Type": "application/json"}, "body": json.dumps(result)}
      Tags:
        - Key: Name
          Value: workshop-order-processing-agent
        - Key: Module
          Value: tools-gateway

