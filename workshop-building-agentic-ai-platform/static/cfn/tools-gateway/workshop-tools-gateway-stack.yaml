  RequestInterceptorRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-request-interceptor-role-${AWS::Region}
      Description: Execution role for the AgentCore Gateway request interceptor Lambda - enforces Cedar policies on incoming tool calls.
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
