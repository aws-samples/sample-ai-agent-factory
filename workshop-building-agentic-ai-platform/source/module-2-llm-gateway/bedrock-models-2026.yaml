# ============================================================================
# USAGE NOTES
# ============================================================================
#
# 1. CONVERSE API SUPPORT:
#    - Most text/chat models support Converse API (best for tool calling)
#    - Embedding, rerank, and image generation models DO NOT support Converse API
#    - Use supports_converse_api: true to identify compatible models
#
# 2. TOOL CALLING / FUNCTION CALLING:
#    - Claude 3+, Nova, Llama 3.1+, Mistral Large, Cohere Command R, Jamba 1.5
#    - Check supports_function_calling: true
#
# 3. VISION SUPPORT:
#    - Claude 3+ (except 3.5 Haiku), Nova, Llama 3.2/4, Pixtral
#    - Check supports_vision: true
#
# 4. LITELLM ROUTING:
#    - Use bedrock/ prefix for default routing
#    - Use bedrock/converse/ for explicit Converse API routing
#    - LiteLLM automatically selects the best API route
#
# 5. REGIONAL AVAILABILITY:
#    - Check AWS Bedrock console for model availability in your region
#    - Some models may require requesting access
#
# 6. PRICING:
#    - See AWS Bedrock pricing page for current rates
#    - Pricing varies by model and region
#
# ============================================================================
